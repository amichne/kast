name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflow-contracts:
    name: Workflow release contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Test release workflow contract
        shell: bash
        run: ./.github/scripts/test-release-workflow-contract.sh

      - name: Test Kast build contract
        shell: bash
        run: ./.github/scripts/test-kast-build-contract.sh

      - name: Test docs navigation contract
        shell: bash
        run: ./.github/scripts/test-docs-navigation-contract.sh

      - name: Test docs content contract
        shell: bash
        run: ./.github/scripts/test-docs-content-contract.sh

      - name: Test Copilot extension contract
        shell: bash
        run: node ./.github/scripts/test-copilot-extension-contract.mjs

      - name: Test Kast hook policy
        shell: bash
        run: ./.github/scripts/test-kast-hooks.sh

      - name: Test workspace repo coordination
        shell: bash
        run: ./.github/scripts/test-workspace-sync-status.sh

      - name: Test release asset verifier
        shell: bash
        run: ./.github/scripts/test-release-asset-verifier.sh

      - name: Test release provenance assembler
        shell: bash
        run: ./.github/scripts/test-release-provenance-assembler.sh

      - name: Test release provenance merge
        shell: bash
        run: ./.github/scripts/test-release-provenance-merge.sh

      - name: Test CI Gradle retry helper
        shell: bash
        run: ./.github/scripts/test-ci-gradle-retry.sh

      - name: Test Homebrew package renderer
        shell: bash
        run: packaging/homebrew/scripts/test-formulas.py

      - name: Smoke Ubuntu/Debian bundle contract
        shell: bash
        run: ./scripts/smoke-ubuntu-debian-bundle.sh

      - name: Smoke Devin headless runtime contract
        shell: bash
        run: ./scripts/smoke-devin-headless-runtime.sh

  maven-publication-contract:
    name: Maven publication metadata
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Publish public modules to Maven local
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :build-logic:test
          :analysis-api:publishToMavenLocal
          :analysis-server:publishToMavenLocal
          :index-store:publishToMavenLocal
          -Pkast.publish.target=local
          -Pversion=0.0.0-ci

  rust-cli:
    name: Rust CLI
    runs-on: ubuntu-22.04
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust formatting
        working-directory: cli-rs
        run: cargo fmt --all -- --check

      - name: Check Rust lints
        working-directory: cli-rs
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test Rust CLI
        working-directory: cli-rs
        run: cargo test --locked --all-targets --all-features

      - name: Build Rust CLI
        working-directory: cli-rs
        run: KAST_VERSION=0.0.0-ci cargo build --release --locked

      - name: Test LSP config smoke
        shell: bash
        run: >
          KAST_LSP_TEST_COMMAND="$GITHUB_WORKSPACE/cli-rs/target/release/kast"
          KAST_LSP_REQUEST_TIMEOUT_MS=1000
          node ./.github/scripts/test-lsp-config.mjs

      - name: Package Rust CLI CI asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist cli-rs/target/package/kast-v0.0.0-ci-linux-x64
          cp cli-rs/target/release/kast cli-rs/target/package/kast-v0.0.0-ci-linux-x64/kast
          chmod 755 cli-rs/target/package/kast-v0.0.0-ci-linux-x64/kast
          (cd cli-rs/target/package/kast-v0.0.0-ci-linux-x64 && zip -9 -q "$GITHUB_WORKSPACE/dist/kast-v0.0.0-ci-linux-x64.zip" kast)

      - name: Upload Rust CLI CI asset
        uses: actions/upload-artifact@v6
        with:
          name: kast-rust-cli-linux-x64
          path: dist/kast-v0.0.0-ci-linux-x64.zip
          if-no-files-found: error
          retention-days: 1

  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: workflow-contracts
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/idea-distributions
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Test JVM backend modules
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :analysis-api:test
          :analysis-server:test
          :backend-shared:compileKotlin
          :backend-headless:test

      - name: Build headless backend distribution
        run: ./scripts/ci-gradle-retry.sh ./gradlew :backend-headless:portableDistZip

      - name: Assert headless distribution excludes fat jar
        shell: bash
        run: |
          set -euo pipefail
          if find backend-headless/build/portable-dist -name '*-all.jar' -print -quit | grep -q .; then
            echo "Headless portable distribution must not contain fat jars" >&2
            find backend-headless/build/portable-dist -name '*-all.jar' -print >&2
            exit 1
          fi

      - name: Upload build-and-test test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-and-test-reports-${{ matrix.os }}
          path: |
            **/build/test-results/test/*.xml
            **/build/reports/tests/test/
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload headless backend distribution
        uses: actions/upload-artifact@v6
        with:
          name: kast-headless-${{ matrix.os }}
          path: backend-headless/build/distributions/backend-headless-*-portable.zip
          if-no-files-found: error
          retention-days: 1

      - name: Build agent headless backend distribution
        if: matrix.os == 'ubuntu-latest'
        run: ./scripts/ci-gradle-retry.sh ./gradlew :backend-headless:portableDistZip -PkastHeadlessIdeaHomeProfile=agent

  install-ubuntu-debian-container:
    name: Ubuntu/Debian install container (${{ matrix.container-image }}, Java ${{ matrix.java-version }})
    runs-on: ubuntu-24.04
    needs:
      - build-and-test
      - rust-cli
    strategy:
      fail-fast: false
      matrix:
        container-image:
          - ubuntu:22.04
          - ubuntu:24.04
        java-version:
          - "21"
    steps:
      - uses: actions/checkout@v5

      - name: Download headless backend distribution
        uses: actions/download-artifact@v7
        with:
          name: kast-headless-ubuntu-latest
          path: backend-headless/build/distributions

      - name: Download Rust CLI CI asset
        uses: actions/download-artifact@v7
        with:
          name: kast-rust-cli-linux-x64
          path: dist

      - name: Resolve Rust CLI CI asset
        shell: bash
        run: |
          set -euo pipefail
          cli_asset="dist/kast-v0.0.0-ci-linux-x64.zip"
          [[ -f "$cli_asset" ]] || { echo "Missing Rust CLI CI asset: ${cli_asset}" >&2; exit 1; }
          printf 'KAST_RUST_CLI_TAG=%s\n' "v0.0.0-ci" >> "$GITHUB_ENV"
          printf 'KAST_RUST_CLI_ASSET=%s\n' "$cli_asset" >> "$GITHUB_ENV"

      - name: Package Ubuntu/Debian CI bundle
        shell: bash
        run: |
          set -euo pipefail
          backend_asset="$(find backend-headless/build/distributions -maxdepth 1 -name 'backend-headless-*-portable.zip' -print -quit)"
          [[ -n "$backend_asset" ]] || { echo "Missing headless backend portable zip" >&2; exit 1; }
          bundle_asset="dist/kast-ubuntu-debian-headless-x86_64-${KAST_RUST_CLI_TAG}.tar.gz"

          ./scripts/package-ubuntu-debian-bundle.sh \
            --cli-archive "$KAST_RUST_CLI_ASSET" \
            --backend-archive "$backend_asset" \
            --version "$KAST_RUST_CLI_TAG" \
            --output "$bundle_asset"

          printf 'KAST_UBUNTU_DEBIAN_BUNDLE=%s\n' "$bundle_asset" >> "$GITHUB_ENV"

      - name: Validate Ubuntu/Debian bundle in Ubuntu container
        env:
          KAST_UBUNTU_DEBIAN_CONTAINER_IMAGE: ${{ matrix.container-image }}
          KAST_UBUNTU_DEBIAN_JAVA_VERSION: ${{ matrix.java-version }}
        shell: bash
        run: BUNDLE_PATH="$KAST_UBUNTU_DEBIAN_BUNDLE" ./scripts/validate-ubuntu-debian-bundle-in-docker.sh

  devin-headless-runtime:
    name: Devin headless runtime
    runs-on: ubuntu-22.04
    needs:
      - workflow-contracts
      - rust-cli
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/headless-idea-distributions
          key: headless-idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Download Rust CLI CI asset
        uses: actions/download-artifact@v7
        with:
          name: kast-rust-cli-linux-x64
          path: dist

      - name: Build agent headless backend distribution
        run: ./scripts/ci-gradle-retry.sh ./gradlew :backend-headless:portableDistZip -PkastHeadlessIdeaHomeProfile=agent -Pversion=9.8.7

      - name: Package and verify Devin runtime
        shell: bash
        run: |
          set -euo pipefail
          version="v9.8.7"
          cli_asset="dist/kast-v0.0.0-ci-linux-x64.zip"
          backend_asset="$(find backend-headless/build/distributions -maxdepth 1 -name 'backend-headless-*-portable.zip' -print -quit)"
          bundle_asset="dist/kast-devin-headless-runtime-linux-x64-${version}.tar.gz"
          [[ -f "$cli_asset" ]] || { echo "Missing Rust CLI CI asset: ${cli_asset}" >&2; exit 1; }
          [[ -n "$backend_asset" ]] || { echo "Missing agent headless backend portable zip" >&2; exit 1; }

          ./scripts/package-devin-headless-runtime.sh \
            --cli-archive "$cli_asset" \
            --backend-archive "$backend_asset" \
            --version "$version" \
            --output "$bundle_asset"

          extract_dir="$RUNNER_TEMP/kast-devin-runtime"
          rm -rf "$extract_dir"
          mkdir -p "$extract_dir"
          tar -xzf "$bundle_asset" -C "$extract_dir"
          prefix="${extract_dir}/kast-devin-headless-runtime-linux-x64-${version}"
          "$prefix/scripts/setup-kast-devin-runtime.sh" --prefix "$prefix"
          "$prefix/scripts/verify-kast-devin-runtime.sh" --prefix "$prefix"

      - name: Upload Devin runtime artifact
        uses: actions/upload-artifact@v6
        with:
          name: kast-devin-headless-runtime-linux-x64
          path: |
            dist/kast-devin-headless-runtime-linux-x64-v9.8.7.tar.gz
            dist/kast-devin-headless-runtime-linux-x64-v9.8.7.tar.gz.sha256
          if-no-files-found: error
          retention-days: 1

  analysis-server-transport:
    name: Analysis server transport
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Smoke analysis-server socket transport
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :analysis-server:test
          --tests io.github.amichne.kast.server.AnalysisServerSocketTest

  test-idea-plugin:
    name: IDEA plugin
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/idea-distributions
            ~/.cache/pluginVerifier/ides
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Test IDEA plugin
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :backend-idea:test
          -PexcludeTags=performance

      - name: Build and verify IDEA plugin distribution
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :backend-idea:buildPlugin
          :backend-idea:verifyPluginStructure
          :backend-idea:verifyPluginXmlPresent
          :backend-idea:verifyPlugin

      - name: Upload IDEA plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: kast-idea-plugin
          path: backend-idea/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 1

      - name: Run IDEA plugin performance baselines
        run: ./scripts/ci-gradle-retry.sh ./gradlew :backend-idea:test -PincludeTags=performance
