name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache IDEA distribution
        uses: actions/cache@v5
        with:
          path: ~/.gradle/kast/idea-distributions
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Build headless backend runtime libs
        run: ./gradlew --no-daemon :backend-headless:syncRuntimeLibs

      - name: Export headless backend environment
        run: |
          KAST_RUNTIME_LIBS_DIR="$GITHUB_WORKSPACE/backend-headless/build/runtime-libs"
          echo "KAST_HEADLESS_RUNTIME_LIBS_DIR=${KAST_RUNTIME_LIBS_DIR}" >> "$GITHUB_ENV"
