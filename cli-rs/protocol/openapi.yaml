      type: object
      properties:
        workspaceRoot:
          "$ref": "#/components/schemas/WorkspaceRoot"
        backendName:
          "$ref": "#/components/schemas/BackendName"
        normalizedQuery:
          "$ref": "#/components/schemas/NormalizedQuery"
        projection:
          "$ref": "#/components/schemas/Projection"
        limit:
          "$ref": "#/components/schemas/Limit"
      additionalProperties: false
      required:
        - workspaceRoot
        - backendName
        - normalizedQuery
        - projection
        - limit
