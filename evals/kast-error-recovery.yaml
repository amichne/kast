# kast-error-recovery.yaml — Error recovery and graceful failure eval suite
#
# Each case validates that the agent handles error conditions gracefully
# without crashing, returning structured failure responses.

suite: kast-error-recovery
workspace: evals/fixtures/sample-workspace

cases:
  - id: missing-symbol-graceful-failure
    name: "Resolve non-existent symbol returns ok=false"
    prompt: >
      Resolve the symbol `NonExistentSymbol123` in the workspace. It does not
      exist — confirm that the resolution fails gracefully.
    assertions:
      - type: tool_used
        tool: kast-resolve.sh
      - type: output_field_equals
        tool: kast-resolve.sh
        field: ok
        expected: false

  - id: rename-nonexistent-symbol
    name: "Rename non-existent symbol returns ok=false without crash"
    prompt: >
      Rename the symbol `NonExistentSymbol123` to `StillDoesNotExist`. The
      symbol does not exist — confirm the rename fails gracefully without
      crashing.
    assertions:
      - type: tool_used
        tool: kast-rename.sh
      - type: output_field_equals
        tool: kast-rename.sh
        field: ok
        expected: false

  - id: diagnostics-on-nonexistent-file
    name: "Diagnostics on missing file fails gracefully"
    prompt: >
      Run diagnostics on `lib/src/main/kotlin/sample/lib/DoesNotExist.kt`.
      The file does not exist — confirm that diagnostics fails gracefully.
    assertions:
      - type: tool_used
        tool: kast-diagnostics.sh
      - type: output_field_equals
        tool: kast-diagnostics.sh
        field: ok
        expected: false

  - id: query-during-indexing
    name: "Agent handles INDEXING state gracefully"
    prompt: >
      Check the workspace status. If the daemon is in INDEXING state, confirm
      that queries return partial results or a clear message rather than
      crashing. Run a resolve for `Greeter` and report the result.
    assertions:
      - type: tool_used
        tool: kast-resolve.sh
