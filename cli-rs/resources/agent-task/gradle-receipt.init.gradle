import groovy.json.JsonOutput
import java.nio.charset.StandardCharsets
import java.nio.file.Files
import java.nio.file.StandardCopyOption
import java.util.Locale
import org.gradle.BuildResult
import org.gradle.api.Task
import org.gradle.api.tasks.TaskState
import org.gradle.api.tasks.testing.Test

def nonBlankEnvironment = { String name ->
    def value = System.getenv(name)
    value == null || value.trim().isEmpty() ? null : value
}

def outcomeReceiptValue = nonBlankEnvironment("KAST_AGENT_TASK_GRADLE_RECEIPT")
def inputSha256 = nonBlankEnvironment("KAST_AGENT_TASK_INPUT_SHA256")
def modelReceiptValue = nonBlankEnvironment("KAST_AGENT_TASK_GRADLE_MODEL_RECEIPT")
def workspaceRootValue = nonBlankEnvironment("KAST_AGENT_TASK_WORKSPACE_ROOT")
def outcomeMode = outcomeReceiptValue != null || inputSha256 != null
def modelMode = modelReceiptValue != null || workspaceRootValue != null

if (!outcomeMode && !modelMode) {
    throw new GradleException("Kast agent-task init script requires a receipt mode")
}
if (outcomeMode && (outcomeReceiptValue == null || inputSha256 == null)) {
    throw new GradleException("KAST_AGENT_TASK_GRADLE_RECEIPT and KAST_AGENT_TASK_INPUT_SHA256 must be set together")
}
if (inputSha256 != null && !(inputSha256 ==~ /[0-9a-f]{64}/)) {
    throw new GradleException("KAST_AGENT_TASK_INPUT_SHA256 must be a lowercase SHA-256 digest")
}
if (modelMode && (modelReceiptValue == null || workspaceRootValue == null)) {
    throw new GradleException("KAST_AGENT_TASK_GRADLE_MODEL_RECEIPT and KAST_AGENT_TASK_WORKSPACE_ROOT must be set together")
}

def requireAbsoluteFile = { String value, String name ->
    def file = new File(value)
    if (!file.isAbsolute()) {
        throw new GradleException("${name} must be absolute: ${value}")
    }
    file
}

def outcomeReceipt = outcomeReceiptValue == null
    ? null
    : requireAbsoluteFile(outcomeReceiptValue, "KAST_AGENT_TASK_GRADLE_RECEIPT")
def modelReceipt = modelReceiptValue == null
    ? null
    : requireAbsoluteFile(modelReceiptValue, "KAST_AGENT_TASK_GRADLE_MODEL_RECEIPT")
def workspaceRoot = workspaceRootValue == null
    ? null
    : requireAbsoluteFile(workspaceRootValue, "KAST_AGENT_TASK_WORKSPACE_ROOT").canonicalFile
if (workspaceRoot != null && !workspaceRoot.isDirectory()) {
    throw new GradleException("KAST_AGENT_TASK_WORKSPACE_ROOT is not a directory: ${workspaceRoot}")
}

def workspaceRelative = { File candidate ->
    def canonical = candidate.canonicalFile.toPath()
    def workspace = workspaceRoot.toPath()
    if (!canonical.startsWith(workspace)) {
        throw new GradleException("Gradle model directory is outside the exact workspace: ${candidate}")
    }
    def relative = workspace.relativize(canonical).toString().replace(File.separator, "/")
    relative.isEmpty() ? "." : relative
}

def atomicWriteJson = { File target, Map<String, Object> payload ->
    def parent = target.toPath().getParent()
    if (parent == null) {
        throw new GradleException("Kast Gradle receipt has no parent: ${target}")
    }
    Files.createDirectories(parent)
    def temporary = Files.createTempFile(parent, ".kast-agent-task-gradle-", ".json")
    try {
        def bytes = (JsonOutput.toJson(payload) + "\n").getBytes(StandardCharsets.UTF_8)
        Files.write(temporary, bytes)
        Files.move(
            temporary,
            target.toPath(),
            StandardCopyOption.ATOMIC_MOVE,
            StandardCopyOption.REPLACE_EXISTING,
        )
    } finally {
        Files.deleteIfExists(temporary)
    }
}

def rootGradle = gradle
while (rootGradle.parent != null) {
    rootGradle = rootGradle.parent
}
def shared = rootGradle.extensions.extraProperties

if (outcomeMode) {
    def stateKey = "kastAgentTaskOutcomeState"
    if (!shared.has(stateKey)) {
        shared.set(stateKey, [tasks: Collections.synchronizedMap(new LinkedHashMap<String, String>())])
    }
    def outcomeState = shared.get(stateKey)
    gradle.taskGraph.afterTask { Task task, TaskState state ->
        def normalizedSkipMessage = state.skipMessage
            ?.replace('-', '_')
            ?.toUpperCase(Locale.ROOT)
        def outcome
        if (state.failure != null) {
            outcome = "FAILED"
        } else if (state.noSource) {
            outcome = "NO_SOURCE"
        } else if (normalizedSkipMessage == "FROM_CACHE") {
            outcome = "FROM_CACHE"
        } else if (state.upToDate) {
            outcome = "UP_TO_DATE"
        } else if (state.skipped) {
            outcome = "SKIPPED"
        } else {
            outcome = "SUCCESS"
        }
        synchronized (outcomeState.tasks) {
            def existing = outcomeState.tasks.get(task.path)
            if (existing != null && existing != outcome) {
                throw new GradleException("Conflicting outcomes for observed task ${task.path}")
            }
            outcomeState.tasks.put(task.path, outcome)
        }
    }

    if (gradle.is(rootGradle) && !shared.has("kastAgentTaskOutcomeWriter")) {
        shared.set("kastAgentTaskOutcomeWriter", true)
        rootGradle.buildFinished { BuildResult result ->
            def tasks
            synchronized (outcomeState.tasks) {
                tasks = outcomeState.tasks.entrySet()
                    .sort { left, right -> left.key <=> right.key }
                    .collect { entry -> [path: entry.key, outcome: entry.value] }
            }
            atomicWriteJson(outcomeReceipt, [
                schemaVersion: 1,
                inputSha256: inputSha256,
                buildFailed: result.failure != null || tasks.any { task -> task.outcome == "FAILED" },
                tasks: tasks,
            ])
        }
    }
}

if (modelMode) {
    def stateKey = "kastAgentTaskModelState"
    if (!shared.has(stateKey)) {
        shared.set(stateKey, [builds: Collections.synchronizedMap(new LinkedHashMap<String, Object>())])
    }
    def modelState = shared.get(stateKey)

    gradle.settingsEvaluated { settings ->
        def buildRoot = workspaceRelative(settings.settingsDir)
        synchronized (modelState.builds) {
            if (!modelState.builds.containsKey(buildRoot)) {
                modelState.builds.put(buildRoot, [
                    buildRoot: buildRoot,
                    projects: Collections.synchronizedMap(new LinkedHashMap<String, Object>()),
                ])
            }
        }
    }

    gradle.projectsEvaluated {
        def buildRoot = workspaceRelative(gradle.rootProject.projectDir)
        def build
        synchronized (modelState.builds) {
            build = modelState.builds.get(buildRoot)
            if (build == null) {
                build = [
                    buildRoot: buildRoot,
                    projects: Collections.synchronizedMap(new LinkedHashMap<String, Object>()),
                ]
                modelState.builds.put(buildRoot, build)
            }
        }

        gradle.rootProject.allprojects.each { project ->
            def sourceSetModels = []
            def sourceSetBuildTasks = new LinkedHashSet<String>()
            def sourceSets = project.extensions.findByName("sourceSets")
            if (sourceSets != null) {
                sourceSets.toList().sort { left, right -> left.name <=> right.name }.each { sourceSet ->
                    def buildTasks = new LinkedHashSet<String>()
                    def candidateNames = [sourceSet.classesTaskName]
                    for (language in ["java", "kotlin"]) {
                        try {
                            candidateNames.add(sourceSet.getCompileTaskName(language))
                        } catch (MissingMethodException ignored) {
                            // This source-set implementation does not expose language compilation tasks.
                        }
                    }
                    candidateNames.findAll { name -> name != null }.each { name ->
                        def task = project.tasks.findByName(name.toString())
                        if (task != null) buildTasks.add(task.path)
                    }
                    sourceSetBuildTasks.addAll(buildTasks)
                    sourceSetModels.add([
                        name: sourceSet.name,
                        sourceDirectories: sourceSet.allSource.srcDirs
                            .collect { directory -> workspaceRelative(directory) }
                            .sort()
                            .unique(),
                        buildTasks: buildTasks.toList().sort(),
                    ])
                }
            }

            def taskModels = project.tasks.toList()
                .sort { left, right -> left.path <=> right.path }
                .collect { task ->
                    def kind
                    def reportDirectories = []
                    if (task instanceof Test) {
                        kind = "TEST"
                        try {
                            def binary = task.binaryResultsDirectory.orNull?.asFile
                            if (binary != null) reportDirectories.add(workspaceRelative(binary))
                        } catch (MissingPropertyException ignored) {
                            // Preserve an empty report set when this Gradle version cannot prove it.
                        }
                        try {
                            def junit = task.reports.junitXml.outputLocation.orNull?.asFile
                            if (junit != null) reportDirectories.add(workspaceRelative(junit))
                        } catch (MissingPropertyException ignored) {
                            // Preserve an empty report set when this Gradle version cannot prove it.
                        }
                    } else if (
                        sourceSetBuildTasks.contains(task.path) ||
                        task.group == "build" ||
                        task.name in ["build", "check", "assemble", "classes", "testClasses"]
                    ) {
                        kind = "BUILD"
                    } else {
                        kind = "OTHER"
                    }
                    [
                        path: task.path,
                        kind: kind,
                        testReportDirectories: reportDirectories.sort().unique(),
                    ]
                }
            def projectModel = [
                projectPath: project.path,
                projectDirectory: workspaceRelative(project.projectDir),
                sourceSets: sourceSetModels,
                tasks: taskModels,
            ]
            synchronized (build.projects) {
                build.projects.put(project.path, projectModel)
            }
        }
    }

    if (gradle.is(rootGradle) && !shared.has("kastAgentTaskModelWriter")) {
        shared.set("kastAgentTaskModelWriter", true)
        rootGradle.buildFinished {
            def builds
            synchronized (modelState.builds) {
                builds = modelState.builds.values()
                    .sort { left, right -> left.buildRoot <=> right.buildRoot }
                    .collect { build ->
                        def projects
                        synchronized (build.projects) {
                            projects = build.projects.values()
                                .sort { left, right -> left.projectPath <=> right.projectPath }
                        }
                        [buildRoot: build.buildRoot, projects: projects]
                    }
            }
            atomicWriteJson(modelReceipt, [
                schemaVersion: 1,
                workspaceRoot: workspaceRoot.path,
                builds: builds,
            ])
        }
    }
}
