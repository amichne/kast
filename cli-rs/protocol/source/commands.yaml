$schema: ./commands.schema.json
categories:
  database:
  - database/metrics
  mutation:
  - mutation/submit
  raw:
  - raw/resolve
  - raw/references
  - raw/call-hierarchy
  - raw/type-hierarchy
  - raw/semantic-insertion-point
  - raw/diagnostics
  - raw/rename
  - raw/optimize-imports
  - raw/apply-edits
  - raw/workspace-refresh
  - raw/file-outline
  - raw/workspace-symbol
  - raw/workspace-search
  - raw/workspace-files
  - raw/workspace-files-continuation
  - raw/implementations
  - raw/code-actions
  - raw/completions
  symbol:
  - symbol/scaffold
  - symbol/discover
  - symbol/query
  - symbol/resolve
  - selector/identity
  - symbol/references
  - symbol/callers
  - symbol/implementations
  - symbol/hierarchy
  - symbol/rename
  - symbol/write-and-validate
  - symbol/add-file
  - symbol/add-declaration
  - symbol/add-implementation
  - symbol/add-statement
  - symbol/replace-declaration
  system:
  - health
  - runtime/status
  - runtime/shutdown
  - runtime/restart
  - capabilities
commands:
  capabilities:
    category: system
    dataSource: backend
    method: capabilities
    request:
      fields: {}
    responseType: BackendCapabilities
    summary: Advertised read and mutation capabilities
  database/metrics:
    category: database
    dataSource: sqlite
    failureType: METRICS_FAILURE
    method: database/metrics
    notes:
    - Use this as the source-index database backing for kast agent impact and kast developer inspect metrics.
    - Use fanIn, fanOut, deadCode, impact, coupling, search, or graph for supported metrics.
    request:
      fields:
        depth:
          optional: true
          type: integer
        fileGlob:
          nullable: true
          optional: true
          type: string
        folderFilter:
          nullable: true
          optional: true
          type: string
        limit:
          optional: true
          type: integer
        metric:
          enum:
          - fanIn
          - fanOut
          - deadCode
          - impact
          - coupling
          - search
          - graph
          type: string
        offset:
          optional: true
          type: integer
        subject:
          fields:
            declarationFile:
              type: string
            declarationStartOffset:
              type: integer
            fqName:
              type: string
            kind:
              enum:
              - CLASS
              - INTERFACE
              - OBJECT
              - FUNCTION
              - PROPERTY
              type: string
          optional: true
          required:
          - fqName
          - declarationFile
          - declarationStartOffset
          - kind
          type: object
        symbol:
          nullable: true
          optional: true
          type: string
        workspaceRoot:
          nullable: true
          optional: true
          type: string
      required:
      - metric
    responseType: RustMetricsResponse
    successType: METRICS_SUCCESS
    summary: Query source-index metrics
    tool:
      description: 'Query source-index metrics: fanIn, fanOut, deadCode, impact, coupling, search, graph. Use this database-backed view for architecture, blast-radius, and impact questions before wider semantic traversal.'
      name: kast_metrics
  health:
    category: system
    dataSource: backend
    method: health
    request:
      fields: {}
    responseType: HealthResponse
    summary: Basic health check
  mutation/submit:
    category: mutation
    dataSource: backend
    method: mutation/submit
    request:
      fields:
        type:
          enum:
          - RENAME
          - ADD_FILE
          - ADD_DECLARATION
          - ADD_IMPLEMENTATION
          - ADD_STATEMENT
          - REPLACE_DECLARATION
          type: string
        workspaceTaskId:
          description: Active exact-workspace task identity injected by the Kast CLI.
          sample: 00000000-0000-0000-0000-000000000420
          type: string
      required:
      - type
      - workspaceTaskId
    responseType: KastMutationExecutionResult
    summary: Execute an idempotent semantic mutation and return its terminal result
    variants:
      ADD_DECLARATION:
        fields:
          idempotencyKey:
            type: string
          request:
            type: object
          workspaceTaskId:
            sample: 00000000-0000-0000-0000-000000000420
            type: string
        required:
        - workspaceTaskId
        - idempotencyKey
        - request
        sample:
          idempotencyKey: add-example-declaration
          request:
            contentFile: /tmp/declaration.kt
            placement:
              anchor:
                anchor: file-bottom
                type: AT_ANCHOR
              scope:
                insideFile: /workspace/src/main/kotlin/com/example/Example.kt
                type: FILE_SCOPE
          type: ADD_DECLARATION
      ADD_FILE:
        fields:
          idempotencyKey:
            type: string
          request:
            type: object
          workspaceTaskId:
            sample: 00000000-0000-0000-0000-000000000420
            type: string
        required:
        - workspaceTaskId
        - idempotencyKey
        - request
        sample:
          idempotencyKey: add-example-file
          request:
            contentFile: /tmp/Added.kt
            filePath: /workspace/src/main/kotlin/com/example/Added.kt
          type: ADD_FILE
      ADD_IMPLEMENTATION:
        fields:
          idempotencyKey:
            type: string
          request:
            type: object
          workspaceTaskId:
            sample: 00000000-0000-0000-0000-000000000420
            type: string
        required:
        - workspaceTaskId
        - idempotencyKey
        - request
        sample:
          idempotencyKey: add-example-implementation
          request:
            contentFile: /tmp/implementation.kt
            placement:
              anchor:
                anchor: body-end
                type: AT_ANCHOR
              scope:
                insideScope: com.example.Widget
                type: NAMED_SCOPE
          type: ADD_IMPLEMENTATION
      ADD_STATEMENT:
        fields:
          idempotencyKey:
            type: string
          request:
            type: object
          workspaceTaskId:
            sample: 00000000-0000-0000-0000-000000000420
            type: string
        required:
        - workspaceTaskId
        - idempotencyKey
        - request
        sample:
          idempotencyKey: add-example-statement
          request:
            anchor: body-end
            contentFile: /tmp/statement.kt
            insideScope: com.example.Widget.render
          type: ADD_STATEMENT
      RENAME:
        fields:
          idempotencyKey:
            type: string
          request:
            type: object
          workspaceTaskId:
            sample: 00000000-0000-0000-0000-000000000420
            type: string
        required:
        - workspaceTaskId
        - idempotencyKey
        - request
        sample:
          idempotencyKey: rename-order-service-process
          request:
            newName: processSafely
            symbol: com.example.OrderService.process
            type: RENAME_BY_SYMBOL_REQUEST
          type: RENAME
      REPLACE_DECLARATION:
        fields:
          idempotencyKey:
            type: string
          request:
            type: object
          workspaceTaskId:
            sample: 00000000-0000-0000-0000-000000000420
            type: string
        required:
        - workspaceTaskId
        - idempotencyKey
        - request
        sample:
          idempotencyKey: replace-example-declaration
          request:
            contentFile: /tmp/replacement.kt
            symbol: com.example.Widget.render
          type: REPLACE_DECLARATION
  raw/apply-edits:
    category: raw
    dataSource: backend
    method: raw/apply-edits
    request:
      fields:
        edits:
          items: object
          type: array
        fileHashes:
          items: object
          type: array
        fileOperations:
          items: object
          optional: true
          type: array
      required:
      - edits
      - fileHashes
    responseType: ApplyEditsResult
    summary: Apply a prepared edit plan with conflict detection
  raw/call-hierarchy:
    category: raw
    dataSource: backend
    method: raw/call-hierarchy
    request:
      fields:
        depth:
          optional: true
          type: integer
        direction:
          enum:
          - INCOMING
          - OUTGOING
          type: string
        maxChildrenPerNode:
          optional: true
          type: integer
        maxTotalCalls:
          optional: true
          type: integer
        position:
          fields:
            filePath:
              type: string
            offset:
              type: integer
          required:
          - filePath
          - offset
          type: object
        timeoutMillis:
          nullable: true
          optional: true
          type: integer
      required:
      - position
      - direction
    responseType: CallHierarchyResult
    summary: Expand a bounded incoming or outgoing call tree
  raw/code-actions:
    category: raw
    dataSource: backend
    method: raw/code-actions
    request:
      fields:
        diagnosticCode:
          nullable: true
          optional: true
          type: string
        position:
          fields:
            filePath:
              type: string
            offset:
              type: integer
          required:
          - filePath
          - offset
          type: object
      required:
      - position
    responseType: CodeActionsResult
    summary: Return available code actions at a file position
  raw/completions:
    category: raw
    dataSource: backend
    method: raw/completions
    request:
      fields:
        kindFilter:
          items: string
          nullable: true
          optional: true
          type: array
        maxResults:
          optional: true
          type: integer
        position:
          fields:
            filePath:
              type: string
            offset:
              type: integer
          required:
          - filePath
          - offset
          type: object
      required:
      - position
    responseType: CompletionsResult
    summary: Return completion candidates available at a file position
  raw/diagnostics:
    category: raw
    dataSource: backend
    method: raw/diagnostics
    notes:
    - The first page computes exact severity counts and cardinality while capturing a server-held diagnostic snapshot.
    - pageToken is an opaque, one-use handle bound to the ordered files, maxResults, and Kotlin PSI generation; continuations reuse the snapshot without refresh or recomputation.
    - Unknown, replayed, mismatched, evicted, or stale page tokens fail with a typed conflict.
    request:
      fields:
        filePaths:
          items: string
          type: array
        maxResults:
          optional: true
          type: integer
        pageToken:
          nullable: true
          optional: true
          sample: 00000000-0000-4000-8000-000000000337
          type: string
      required:
      - filePaths
    responseType: DiagnosticsResult
    summary: Run Kotlin diagnostics on listed files
    tool:
      description: Run Kotlin diagnostics on listed files. Run after any mutation that did not already validate; treat dirty results as a failed change.
      name: kast_diagnostics
  raw/file-outline:
    category: raw
    dataSource: backend
    method: raw/file-outline
    request:
      fields:
        filePath:
          type: string
      required:
      - filePath
    responseType: FileOutlineResult
    summary: Get a hierarchical symbol outline for a file
    tool:
      description: Get a hierarchical symbol outline for a Kotlin file. Returns nested declarations with signatures and locations. Lighter than scaffold when only the structural overview is needed.
      name: kast_file_outline
  raw/implementations:
    category: raw
    dataSource: backend
    method: raw/implementations
    request:
      fields:
        maxResults:
          optional: true
          type: integer
        position:
          fields:
            filePath:
              type: string
            offset:
              type: integer
          required:
          - filePath
          - offset
          type: object
      required:
      - position
    responseType: ImplementationsResult
    summary: Find concrete implementations and subclasses for a declaration
  raw/optimize-imports:
    category: raw
    dataSource: backend
    method: raw/optimize-imports
    request:
      fields:
        filePaths:
          items: string
          type: array
      required:
      - filePaths
    responseType: ImportOptimizeResult
    summary: Optimize imports for one or more files
  raw/references:
    category: raw
    dataSource: backend
    method: raw/references
    notes:
    - maxResults bounds the returned page and the server-held INDEX or lazy IDEA continuation work.
    - pageToken is an opaque, one-use handle bound to the workspace, query options, evidence source, and source generation.
    - Unknown, replayed, mismatched, evicted, or stale page tokens fail with a typed conflict.
    request:
      fields:
        includeDeclaration:
          optional: true
          type: boolean
        includeUsageSiteScope:
          optional: true
          type: boolean
        maxResults:
          optional: true
          type: integer
        pageToken:
          nullable: true
          optional: true
          sample: 00000000-0000-4000-8000-000000000337
          type: string
        position:
          fields:
            filePath:
              type: string
            offset:
              type: integer
          required:
          - filePath
          - offset
          type: object
      required:
      - position
    responseType: ReferencesResult
    summary: Find all references to the symbol at a file position
  raw/rename:
    category: raw
    dataSource: backend
    method: raw/rename
    request:
      fields:
        dryRun:
          optional: true
          type: boolean
        newName:
          type: string
        position:
          fields:
            filePath:
              type: string
            offset:
              type: integer
          required:
          - filePath
          - offset
          type: object
      required:
      - position
      - newName
    responseType: RenameResult
    summary: Plan a symbol rename by file position
  raw/resolve:
    category: raw
    dataSource: backend
    method: raw/resolve
    request:
      fields:
        includeDeclarationScope:
          optional: true
          type: boolean
        includeDocumentation:
          optional: true
          type: boolean
        position:
          fields:
            filePath:
              type: string
            offset:
              type: integer
          required:
          - filePath
          - offset
          type: object
      required:
      - position
    responseType: SymbolResult
    summary: Resolve the symbol at a file position
  raw/semantic-insertion-point:
    category: raw
    dataSource: backend
    method: raw/semantic-insertion-point
    request:
      fields:
        position:
          fields:
            filePath:
              type: string
            offset:
              type: integer
          required:
          - filePath
          - offset
          type: object
        target:
          enum:
          - CLASS_BODY_START
          - CLASS_BODY_END
          - FILE_TOP
          - FILE_BOTTOM
          - AFTER_IMPORTS
          type: string
      required:
      - position
      - target
    responseType: SemanticInsertionResult
    summary: Find the best insertion point for a new declaration
  raw/type-hierarchy:
    category: raw
    dataSource: backend
    method: raw/type-hierarchy
    request:
      fields:
        depth:
          optional: true
          type: integer
        direction:
          enum:
          - SUPERTYPES
          - SUBTYPES
          - BOTH
          optional: true
          type: string
        maxResults:
          optional: true
          type: integer
        position:
          fields:
            filePath:
              type: string
            offset:
              type: integer
          required:
          - filePath
          - offset
          type: object
      required:
      - position
    responseType: TypeHierarchyResult
    summary: Expand supertypes and subtypes from a resolved symbol
  raw/workspace-files:
    category: raw
    dataSource: backend
    method: raw/workspace-files
    notes:
    - A metadata request captures a server-held generation-bound inventory and returns its opaque reusable snapshotToken.
    - File pages echo kindDomain and snapshotToken, require one exact moduleName and a positive server-bounded maxFilesPerModule, and pass the preceding nextPageToken as pageToken.
    - Each module page reports returnedFileCount equal to files.size; nextPageToken is non-null exactly when filesTruncated is true and another page remains.
    - Unknown, replayed, mismatched, evicted, or stale snapshot and page handles fail instead of restarting enumeration.
    request:
      fields:
        includeFiles:
          optional: true
          type: boolean
        kindDomain:
          description: Closed source-only, script-only, or mixed Kotlin file domain fingerprinted by the workspace snapshot.
          enum:
          - SOURCE_ONLY
          - SCRIPT_ONLY
          - MIXED
          optional: true
          type: string
        maxFilesPerModule:
          nullable: true
          optional: true
          type: integer
        moduleName:
          nullable: true
          optional: true
          type: string
        pageToken:
          description: Opaque single-use exact-module page handle returned as nextPageToken by the preceding page.
          nullable: true
          optional: true
          sample: 00000000-0000-4000-8000-000000000339
          type: string
        snapshotToken:
          description: Opaque reusable generation-bound workspace snapshot handle returned by the metadata request.
          nullable: true
          optional: true
          sample: 00000000-0000-4000-8000-000000000338
          type: string
    responseType: WorkspaceFilesResult
    summary: List generation-bound workspace modules and Kotlin file pages
    tool:
      description: Enumerate compiler/project-model Kotlin modules and generation-bound source or script file pages. Capture snapshotToken from the module inventory, then request exact-module pages with kindDomain and snapshotToken until nextPageToken is absent.
      name: kast_workspace_files
  raw/workspace-files-continuation:
    category: raw
    dataSource: backend
    method: raw/workspace-files-continuation
    notes:
    - This internal method is not a backend capability or public agent command.
    - ISSUE stores the supplied typed state and returns an opaque canonical random pageToken; CONSUME atomically claims a single-use handle and returns only a non-owning state projection.
    - The exact workspace root, backend, normalized query, projection, and limit must match when consuming a handle.
    request:
      fields:
        action:
          enum:
          - ISSUE
          - CONSUME
          type: string
      required:
      - action
    responseType: WorkspaceFilesContinuationResult
    responseVariants:
    - ISSUED
    - CONSUMED
    summary: Issue or consume server-held public workspace-file continuation state
    variantDiscriminator: action
    variants:
      CONSUME:
        fields:
          identity:
            fields:
              backendName:
                type: string
              limit:
                type: integer
              normalizedQuery:
                type: string
              projection:
                type: string
              workspaceRoot:
                type: string
            required:
            - workspaceRoot
            - backendName
            - normalizedQuery
            - projection
            - limit
            type: object
          pageToken:
            sample: 00000000-0000-4000-8000-000000000340
            type: string
        required:
        - identity
        - pageToken
      ISSUE:
        fields:
          identity:
            fields:
              backendName:
                type: string
              limit:
                type: integer
              normalizedQuery:
                type: string
              projection:
                type: string
              workspaceRoot:
                type: string
            required:
            - workspaceRoot
            - backendName
            - normalizedQuery
            - projection
            - limit
            type: object
          state:
            fields:
              compositionStampDigest:
                sample: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
                type: string
              cumulativeReturnedCount:
                type: integer
              identity:
                fields:
                  backendName:
                    type: string
                  limit:
                    type: integer
                  normalizedQuery:
                    type: string
                  projection:
                    type: string
                  workspaceRoot:
                    type: string
                required:
                - workspaceRoot
                - backendName
                - normalizedQuery
                - projection
                - limit
                type: object
              lastRelativePath:
                type: string
            required:
            - identity
            - compositionStampDigest
            - lastRelativePath
            - cumulativeReturnedCount
            type: object
        required:
        - identity
        - state
  raw/workspace-refresh:
    category: raw
    dataSource: backend
    method: raw/workspace-refresh
    request:
      fields:
        filePaths:
          items: string
          optional: true
          type: array
    responseType: RefreshResult
    summary: Force a targeted or full workspace state refresh
  raw/workspace-search:
    category: raw
    dataSource: backend
    method: raw/workspace-search
    request:
      fields:
        caseSensitive:
          optional: true
          type: boolean
        fileGlob:
          nullable: true
          optional: true
          type: string
        maxResults:
          optional: true
          type: integer
        pattern:
          type: string
        regex:
          optional: true
          type: boolean
      required:
      - pattern
    responseType: WorkspaceSearchResult
    summary: Search workspace file contents by text or regex
    tool:
      defaultArgs:
        caseSensitive: false
      description: Search file contents across the workspace for text patterns. Supports substring and regex matching with optional file glob filtering. Use this instead of grep/rg for searching string literals, comments, and arbitrary text in Kotlin source files.
      name: kast_workspace_search
  raw/workspace-symbol:
    category: raw
    dataSource: backend
    method: raw/workspace-symbol
    request:
      fields:
        includeDeclarationScope:
          optional: true
          type: boolean
        kind:
          enum:
          - CLASS
          - INTERFACE
          - OBJECT
          - FUNCTION
          - PROPERTY
          - PARAMETER
          - UNKNOWN
          nullable: true
          optional: true
          type: string
        maxResults:
          optional: true
          type: integer
        pattern:
          type: string
        regex:
          optional: true
          type: boolean
      required:
      - pattern
    responseType: WorkspaceSymbolResult
    summary: Search the workspace for symbols by name pattern
    tool:
      description: Search the workspace for Kotlin symbols by name pattern. Supports substring matching (default) and regex. Use to find declarations across the codebase because it understands Kotlin symbol names, kinds, and declaration scopes.
      name: kast_workspace_symbol
  runtime/restart:
    category: system
    dataSource: backend
    method: runtime/restart
    request:
      fields: {}
    responseType: RuntimeLifecycleResponse
    summary: Ask the runtime host to restart after this response is flushed
  runtime/shutdown:
    category: system
    dataSource: backend
    method: runtime/shutdown
    request:
      fields: {}
    responseType: RuntimeLifecycleResponse
    summary: Ask the runtime host to shut down after this response is flushed
  runtime/status:
    category: system
    dataSource: backend
    method: runtime/status
    request:
      fields: {}
    responseType: RuntimeStatusResponse
    summary: Detailed runtime state including indexing progress
  selector/identity:
    category: symbol
    dataSource: backend
    method: selector/identity
    notes:
    - selectorHandle is opaque and must be carried unchanged from exact symbol resolution.
    - The backend authenticates workspace, backend, semantic generation, and requested operation family without invoking symbol lookup.
    - AVAILABLE returns only the compact authenticated identity needed by local composite commands; the CLI does not reconstruct selector flags.
    request:
      fields:
        family:
          enum:
          - REFERENCES
          - CALLERS
          - CALLEES
          - IMPLEMENTATIONS
          - HIERARCHY
          - IMPACT
          - RENAME
          - REPLACE_DECLARATION
          sample: IMPACT
          type: string
        selectorHandle:
          sample: ksh1.example-selector-handle
          type: string
        workspaceRoot:
          nullable: true
          optional: true
          type: string
      required:
      - selectorHandle
      - family
    responseType: KastSelectorIdentityResponse
    responseVariants:
    - AVAILABLE
    - SELECTOR_HANDLE_REJECTED
    successType: AVAILABLE
    summary: Authenticate an opaque selector handle for one operation family and recover its compact exact identity
  symbol/add-declaration:
    category: symbol
    dataSource: backend
    failureType: SCOPE_MUTATION_FAILURE
    method: symbol/add-declaration
    request:
      fields:
        contentFile:
          type: string
        placement:
          fields:
            anchor:
              fields:
                anchor:
                  enum:
                  - body-start
                  - body-end
                  - file-top
                  - file-bottom
                  - after-imports
                  optional: true
                  type: string
                containingType:
                  nullable: true
                  optional: true
                  type: string
                fileHint:
                  nullable: true
                  optional: true
                  type: string
                kind:
                  enum:
                  - class
                  - interface
                  - object
                  - function
                  - property
                  nullable: true
                  optional: true
                  type: string
                symbol:
                  optional: true
                  type: string
                type:
                  enum:
                  - AT_ANCHOR
                  - AFTER_SYMBOL
                  - BEFORE_SYMBOL
                  type: string
              required:
              - type
              type: object
            scope:
              fields:
                containingType:
                  nullable: true
                  optional: true
                  type: string
                fileHint:
                  nullable: true
                  optional: true
                  type: string
                insideFile:
                  optional: true
                  type: string
                insideScope:
                  optional: true
                  type: string
                kind:
                  enum:
                  - class
                  - interface
                  - object
                  - function
                  - property
                  nullable: true
                  optional: true
                  type: string
                type:
                  enum:
                  - NAMED_SCOPE
                  - FILE_SCOPE
                  type: string
              required:
              - type
              type: object
          required:
          - scope
          - anchor
          sample:
            anchor:
              anchor: body-end
              type: AT_ANCHOR
            scope:
              insideScope: com.example.Widget
              type: NAMED_SCOPE
          type: object
        workspaceRoot:
          nullable: true
          optional: true
          type: string
      required:
      - placement
      - contentFile
    responseType: KastScopeMutationResponse
    successType: SCOPE_MUTATION_SUCCESS
    summary: Insert declaration content into a file or named Kotlin scope and validate the result
  symbol/add-file:
    category: symbol
    dataSource: backend
    failureType: SCOPE_MUTATION_FAILURE
    method: symbol/add-file
    request:
      fields:
        contentFile:
          type: string
        filePath:
          type: string
        workspaceRoot:
          nullable: true
          optional: true
          type: string
      required:
      - filePath
      - contentFile
    responseType: KastScopeMutationResponse
    successType: SCOPE_MUTATION_SUCCESS
    summary: Create a Kotlin file from a content file and validate the result
  symbol/add-implementation:
    category: symbol
    dataSource: backend
    failureType: SCOPE_MUTATION_FAILURE
    method: symbol/add-implementation
    request:
      fields:
        contentFile:
          type: string
        placement:
          fields:
            anchor:
