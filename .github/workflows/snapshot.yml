name: Publish Snapshot

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      snapshot-version:
        description: "Snapshot version, for example 0.8.0-SNAPSHOT"
        required: false
        type: string

permissions:
  actions: read
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: snapshot-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      snapshot-version: ${{ steps.snapshot-version.outputs.value }}
      publish-snapshot: ${{ steps.snapshot-version.outputs.publish }}
      source-sha: ${{ steps.snapshot-version.outputs.source-sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Set up Java for manual snapshot validation
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle for manual snapshot validation
        if: github.event_name == 'workflow_dispatch'
        uses: gradle/actions/setup-gradle@v5

      - name: Resolve snapshot version
        id: snapshot-version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ github.event.inputs.snapshot-version }}"
          require_snapshot=false
          publish_snapshot=false
          source_sha="$GITHUB_SHA"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            require_snapshot=true
          fi
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            source_sha="${{ github.event.workflow_run.head_sha }}"
          fi

          if [[ -z "$version" ]]; then
            base="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo v0.0.0)"
            version="${base#v}-SNAPSHOT"
          fi

          if [[ "$require_snapshot" == "true" && "$version" != *-SNAPSHOT ]]; then
            echo "ERROR: snapshot version must end with -SNAPSHOT" >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            publish_snapshot=true
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_run" && "$version" == *-SNAPSHOT ]]; then
            publish_snapshot=true
          fi

          printf 'value=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'publish=%s\n' "$publish_snapshot" >> "$GITHUB_OUTPUT"
          printf 'source-sha=%s\n' "$source_sha" >> "$GITHUB_OUTPUT"

      - name: Download CI Maven publication ledger
        if: github.event_name == 'workflow_run' && steps.snapshot-version.outputs.publish == 'true'
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-maven-publication
          path: ci-ledgers
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Run local publication checks for manual snapshot
        if: github.event_name == 'workflow_dispatch' && steps.snapshot-version.outputs.publish == 'true'
        run: >
          ./gradlew
          test
          :analysis-api:publishToMavenLocal
          :analysis-server:publishToMavenLocal
          :index-store:publishToMavenLocal
          -Pkast.publish.target=local
          -Pversion="${{ steps.snapshot-version.outputs.value }}"
          --no-daemon
          --stacktrace

      - name: Record manual snapshot publication ledger
        if: github.event_name == 'workflow_dispatch' && steps.snapshot-version.outputs.publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ci-ledgers
          printf 'gitSha=%s\nsourceRef=%s\nworkflowRunId=%s\n' \
            "$GITHUB_SHA" \
            "$GITHUB_REF" \
            "$GITHUB_RUN_ID" \
            > ci-ledgers/maven-publication-validation.txt
          scripts/verify-ci-artifact-ledger.py record \
            --output ci-ledgers/maven-publication.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind ci-maven-publication-validation \
            --artifact-name ci-maven-publication-validation \
            --artifact-path ci-ledgers/maven-publication-validation.txt \
            --producer-job snapshot-validate \
            --build-command-id snapshot-manual-publish-to-local

      - name: Verify snapshot publication ledger
        if: steps.snapshot-version.outputs.publish == 'true'
        shell: bash
        run: >
          scripts/verify-ci-artifact-ledger.py verify
          --ledger ci-ledgers/maven-publication.json
          --git-sha "${{ steps.snapshot-version.outputs.source-sha }}"
          --require-kind ci-maven-publication-validation

      - name: Upload snapshot publication ledger
        if: steps.snapshot-version.outputs.publish == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: snapshot-artifact-ledger-maven-publication
          path: ci-ledgers/maven-publication.json
          if-no-files-found: error
          retention-days: 3

  publish-github-packages:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.publish-snapshot == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.source-sha }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Download snapshot publication ledger
        uses: actions/download-artifact@v7
        with:
          name: snapshot-artifact-ledger-maven-publication
          path: ci-ledgers

      - name: Verify snapshot publication ledger
        shell: bash
        run: >
          scripts/verify-ci-artifact-ledger.py verify
          --ledger ci-ledgers/maven-publication.json
          --git-sha "${{ needs.validate.outputs.source-sha }}"
          --require-kind ci-maven-publication-validation

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew publishAllPublicationsToGitHubPackagesRepository \
            -Pkast.publish.target=github \
            -Pversion="${{ needs.validate.outputs.snapshot-version }}" \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace

  publish-maven-central:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.publish-snapshot == 'true'
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.validate.outputs.source-sha }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Download snapshot publication ledger
        uses: actions/download-artifact@v7
        with:
          name: snapshot-artifact-ledger-maven-publication
          path: ci-ledgers

      - name: Verify snapshot publication ledger
        shell: bash
        run: >
          scripts/verify-ci-artifact-ledger.py verify
          --ledger ci-ledgers/maven-publication.json
          --git-sha "${{ needs.validate.outputs.source-sha }}"
          --require-kind ci-maven-publication-validation

      - name: Check Maven Central and signing secrets
        id: gate
        shell: bash
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
        run: |
          set -euo pipefail
          if [[ -z "${ORG_GRADLE_PROJECT_mavenCentralUsername:-}" || -z "${ORG_GRADLE_PROJECT_mavenCentralPassword:-}" || -z "${SIGNING_GPG_PRIVATE_KEY:-}" || -z "${SIGNING_GPG_KEY_NAME:-}" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        if: steps.gate.outputs.publish == 'true'
        env:
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
        shell: bash
        run: |
          set -euo pipefail
          if ! printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | gpg --batch --import; then
            printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          fi

      - name: Publish to Maven Central snapshots
        if: steps.gate.outputs.publish == 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
          SIGNING_GPG_PASSPHRASE: ${{ secrets.SIGNING_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          signing_args=()
          if [[ -n "${SIGNING_GPG_KEY_NAME:-}" ]]; then
            signing_args=(-Psigning.gnupg.keyName="$SIGNING_GPG_KEY_NAME")
            if [[ -n "${SIGNING_GPG_PASSPHRASE:-}" ]]; then
              signing_args+=(-Psigning.gnupg.passphrase="$SIGNING_GPG_PASSPHRASE")
            fi
          fi
          ./gradlew publishToMavenCentral "${signing_args[@]}" \
            -Pkast.publish.target=snapshot \
            -Pversion="${{ needs.validate.outputs.snapshot-version }}" \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace
