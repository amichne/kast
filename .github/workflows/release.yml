name: Release
run-name: >-
  Release
  ${{
    github.event_name == 'workflow_dispatch'
      && format('{0} ({1})', inputs.release_type, github.ref_name)
      || github.ref_name
  }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: >
          Release type. Stable releases increment the latest vX.Y.Z tag.
          Beta releases append the short commit SHA.
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch
          - beta

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Preflight stable release automation
    runs-on: ubuntu-latest
    steps:
      - name: Classify release
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        shell: bash
        run: |
          set -euo pipefail
          requires_homebrew=false
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$RELEASE_TYPE" != "beta" ]]; then
              requires_homebrew=true
            fi
          elif [[ "$REF_NAME" == v* && "$REF_NAME" != *-* ]]; then
            requires_homebrew=true
          fi
          printf 'requires_homebrew=%s\n' "$requires_homebrew" >> "$GITHUB_OUTPUT"

      - name: Require Homebrew token for stable releases
        if: steps.classify.outputs.requires_homebrew == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::error::Missing HOMEBREW_TAP_TOKEN secret; stable releases cannot update amichne/homebrew-kast."
            exit 1
          fi

  bump-version:
    name: Bump version (${{ inputs.release_type }})
    needs: [release-preflight]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next semver tag and push
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          release_type="${{ inputs.release_type }}"
          short_sha="${GITHUB_SHA:0:7}"
          latest_stable="$(git tag --list 'v*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)"
          if [[ -z "$latest_stable" ]]; then
            latest_stable="v0.0.0"
          fi
          base="${latest_stable#v}"
          IFS='.' read -r major minor patch <<< "$base"
          major="${major:-0}"
          minor="${minor:-0}"
          patch="${patch:-0}"

          case "$release_type" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              new_tag="v${major}.${minor}.${patch}"
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              new_tag="v${major}.${minor}.${patch}"
              ;;
            patch)
              patch=$((patch + 1))
              new_tag="v${major}.${minor}.${patch}"
              ;;
            beta)
              patch=$((patch + 1))
              new_tag="v${major}.${minor}.${patch}-beta.${short_sha}"
              ;;
            *)
              echo "Unknown release_type: ${release_type}" >&2
              exit 1
              ;;
          esac

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$new_tag"
          git push origin "$new_tag"
          printf 'release_tag=%s\n' "$new_tag" >> "$GITHUB_OUTPUT"

  prepare-release:
    name: Prepare release
    needs: [release-preflight, bump-version]
    if: always() && needs.release-preflight.result == 'success' && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.release-tag.outputs.value }}
      release_version: ${{ steps.release-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ needs.bump-version.outputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          [[ "$tag" == v* ]] || { echo "release tag must start with v: $tag" >&2; exit 1; }
          printf 'value=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release-tag.outputs.value }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release already exists: $tag"
          else
            gh release create "$tag" \
              --draft \
              --verify-tag \
              --title "$tag" \
              --generate-notes
          fi

  validate-jvm:
    name: Validate JVM and Maven publications
    needs: [prepare-release]
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Run JVM tests and local publication checks
        run: >
          ./gradlew
          test
          :analysis-api:publishToMavenLocal
          :analysis-server:publishToMavenLocal
          :index-store:publishToMavenLocal
          -Pkast.publish.target=local
          -Pversion="${{ needs.prepare-release.outputs.release_version }}"
          --no-daemon
          --stacktrace

  publish-maven-central:
    name: Publish Maven Central
    needs:
      - prepare-release
      - validate-jvm
    if: always() && needs.prepare-release.result == 'success' && needs.validate-jvm.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.gate.outputs.publish }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Check Maven Central and signing secrets
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for secret_name in \
            ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME \
            ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD \
            SIGNING_GPG_KEY_NAME \
            SIGNING_GPG_PRIVATE_KEY \
            SIGNING_GPG_PASSPHRASE
          do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "Missing ${secret_name} secret"
              missing=1
            fi
          done
          if [[ "$missing" -eq 1 ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_PASSPHRASE: ${{ secrets.SIGNING_GPG_PASSPHRASE }}

      - name: Import GPG key
        if: steps.gate.outputs.publish == 'true'
        env:
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
        shell: bash
        run: |
          set -euo pipefail
          if ! printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | gpg --batch --import; then
            printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          fi
          gpg --list-secret-keys --keyid-format=long "$SIGNING_GPG_KEY_NAME"

      - name: Publish to Maven Central
        if: steps.gate.outputs.publish == 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
          SIGNING_GPG_PASSPHRASE: ${{ secrets.SIGNING_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          signing_args=(-Psigning.gnupg.keyName="$SIGNING_GPG_KEY_NAME")
          if [[ -n "${SIGNING_GPG_PASSPHRASE:-}" ]]; then
            signing_args+=(-Psigning.gnupg.passphrase="$SIGNING_GPG_PASSPHRASE")
          fi
          ./gradlew publishAndReleaseToMavenCentral "${signing_args[@]}" \
            -Pkast.publish.target=release \
            -Pversion="${{ needs.prepare-release.outputs.release_version }}" \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace

  build-cli:
    name: Build Rust CLI asset (${{ matrix.asset_id }})
    needs: [prepare-release]
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_id: linux-x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - asset_id: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - asset_id: macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - asset_id: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Rust CLI
        working-directory: cli-rs
        shell: bash
        run: |
          set -euo pipefail
          KAST_VERSION="${{ needs.prepare-release.outputs.release_version }}" \
            cargo build --release --locked --target "${{ matrix.target }}"

      - name: Smoke Rust CLI
        working-directory: cli-rs
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/kast"
          "$bin" --help >/dev/null
          "$bin" version | grep -F "Kast CLI" >/dev/null

      - name: Package CLI asset
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-${tag}-${{ matrix.asset_id }}.zip"
          staging_dir="$RUNNER_TEMP/kast-${{ matrix.asset_id }}"
          rm -rf "$staging_dir" dist
          mkdir -p "$staging_dir" dist
          cp "cli-rs/target/${{ matrix.target }}/release/kast" "$staging_dir/kast"
          chmod 755 "$staging_dir/kast"
          (cd "$staging_dir" && zip -9 -q "$GITHUB_WORKSPACE/dist/${asset_name}" kast)
          python3 - "$GITHUB_WORKSPACE/dist/${asset_name}" "dist/build-provenance-cli-${{ matrix.asset_id }}.json" <<'PY'
          import hashlib
          import json
          import os
          import sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          output = Path(sys.argv[2])
          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "cli-${{ matrix.asset_id }}",
              "assetName": asset.name,
              "assetDigest": "sha256:" + digest,
          }
          output.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload CLI asset
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          gh release upload "$tag" "dist/kast-${tag}-${{ matrix.asset_id }}.zip" --clobber

      - name: Upload CLI build artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rust-cli-${{ matrix.asset_id }}-${{ github.run_id }}
          path: dist/
          if-no-files-found: warn

  build-intellij-plugin:
    name: Build IDEA plugin
    needs: [prepare-release]
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - uses: actions/cache@v5
        with:
          path: ~/.gradle/kast/intellij-distributions
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Build IDEA plugin
        run: >
          ./gradlew
          :backend-intellij:buildPlugin
          :backend-intellij:verifyPluginStructure
          :backend-intellij:verifyPluginXmlPresent
          -Pversion="${{ needs.prepare-release.outputs.release_version }}"

      - name: Upload IDEA plugin asset
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-intellij-${tag}.zip"
          source_zip="$(find backend-intellij/build/distributions -maxdepth 1 -name '*.zip' -print -quit)"
          [[ -n "$source_zip" ]] || { echo "No IDEA plugin zip found" >&2; exit 1; }
          mkdir -p dist
          cp "$source_zip" "dist/${asset_name}"
          gh release upload "$tag" "dist/${asset_name}" --clobber
          python3 - "dist/${asset_name}" "dist/build-provenance-intellij.json" <<'PY'
          import hashlib, json, os, sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "intellij",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload plugin artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: intellij-plugin-${{ github.run_id }}
          path: dist/
          if-no-files-found: warn

  build-standalone-backend:
    name: Build standalone backend
    needs: [prepare-release]
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Build standalone backend
        run: ./kast.sh build backend -Pversion="${{ needs.prepare-release.outputs.release_version }}"

      - name: Upload standalone backend asset
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-standalone-${tag}.zip"
          source_zip="dist/backend.zip"
          [[ -f "$source_zip" ]] || { echo "Backend zip not found: $source_zip" >&2; exit 1; }
          ln "$source_zip" "dist/${asset_name}"
          gh release upload "$tag" "dist/${asset_name}" --clobber
          python3 - "dist/${asset_name}" "dist/build-provenance-standalone.json" <<'PY'
          import hashlib, json, os, sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "standalone",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
          rm -f "dist/${asset_name}"

      - name: Upload standalone backend artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: standalone-backend-${{ github.run_id }}
          path: dist/
          if-no-files-found: warn

  build-headless-backend:
    name: Build headless backend
    needs: [prepare-release]
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - uses: actions/cache@v5
        with:
          path: ~/.gradle/kast/intellij-distributions
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Build headless backend
        run: ./kast.sh build headless -Pversion="${{ needs.prepare-release.outputs.release_version }}"

      - name: Upload headless backend asset
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-headless-${tag}.zip"
          source_zip="dist/headless.zip"
          [[ -f "$source_zip" ]] || { echo "Headless backend zip not found: $source_zip" >&2; exit 1; }
          ln "$source_zip" "dist/${asset_name}"
          gh release upload "$tag" "dist/${asset_name}" --clobber
          python3 - "dist/${asset_name}" "dist/build-provenance-headless.json" <<'PY'
          import hashlib, json, os, sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "headless",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
          rm -f "dist/${asset_name}"

      - name: Upload headless backend artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: headless-backend-${{ github.run_id }}
          path: dist/
          if-no-files-found: warn

  build-ubuntu-debian-bundle:
    name: Build Ubuntu/Debian bundle
    needs:
      - prepare-release
      - build-cli
      - build-standalone-backend
    if: always() && needs.prepare-release.result == 'success' && needs.build-cli.result == 'success' && needs.build-standalone-backend.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Download Linux x64 CLI artifact
        uses: actions/download-artifact@v7
        with:
          name: rust-cli-linux-x64-${{ github.run_id }}
          path: cli-artifact

      - name: Download standalone backend artifact
        uses: actions/download-artifact@v7
        with:
          name: standalone-backend-${{ github.run_id }}
          path: standalone-artifact

      - name: Package Ubuntu/Debian bundle
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          cli_asset="cli-artifact/kast-${tag}-linux-x64.zip"
          backend_asset="standalone-artifact/backend.zip"
          bundle_asset="dist/kast-ubuntu-debian-x86_64-${tag}.tar.gz"
          [[ -f "$cli_asset" ]] || { echo "Missing CLI asset: ${cli_asset}" >&2; exit 1; }
          [[ -f "$backend_asset" ]] || { echo "Missing standalone backend artifact: ${backend_asset}" >&2; exit 1; }
          ./scripts/package-ubuntu-debian-bundle.sh \
            --cli-archive "$cli_asset" \
            --backend-archive "$backend_asset" \
            --version "$tag" \
            --output "$bundle_asset"

      - name: Validate Ubuntu/Debian bundle in Ubuntu container
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          for container_image in ubuntu:22.04 ubuntu:24.04; do
            KAST_UBUNTU_DEBIAN_VERSION="$tag" \
            KAST_UBUNTU_DEBIAN_CONTAINER_IMAGE="$container_image" \
            KAST_UBUNTU_DEBIAN_JAVA_VERSION=21 \
            BUNDLE_PATH="dist/kast-ubuntu-debian-x86_64-${tag}.tar.gz" \
            ./scripts/validate-ubuntu-debian-bundle-in-docker.sh
          done

      - name: Upload Ubuntu/Debian bundle assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          bundle_asset="dist/kast-ubuntu-debian-x86_64-${tag}.tar.gz"
          gh release upload "$tag" "$bundle_asset" "${bundle_asset}.sha256" --clobber
          python3 - "$bundle_asset" "dist/build-provenance-ubuntu-debian.json" <<'PY'
          import hashlib, json, os, sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "ubuntu-debian-x86_64",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload Ubuntu/Debian bundle artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-debian-bundle-${{ github.run_id }}
          path: dist/
          if-no-files-found: warn

  build-ubuntu-debian-headless-bundle:
    name: Build Ubuntu/Debian headless bundle
    needs:
      - prepare-release
      - build-cli
      - build-headless-backend
    if: always() && needs.prepare-release.result == 'success' && needs.build-cli.result == 'success' && needs.build-headless-backend.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Download Linux x64 CLI artifact
        uses: actions/download-artifact@v7
        with:
          name: rust-cli-linux-x64-${{ github.run_id }}
          path: cli-artifact

      - name: Download headless backend artifact
        uses: actions/download-artifact@v7
        with:
          name: headless-backend-${{ github.run_id }}
          path: headless-artifact

      - name: Package Ubuntu/Debian headless bundle
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          cli_asset="cli-artifact/kast-${tag}-linux-x64.zip"
          backend_asset="headless-artifact/headless.zip"
          bundle_asset="dist/kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz"
          [[ -f "$cli_asset" ]] || { echo "Missing CLI asset: ${cli_asset}" >&2; exit 1; }
          [[ -f "$backend_asset" ]] || { echo "Missing headless backend artifact: ${backend_asset}" >&2; exit 1; }
          ./scripts/package-ubuntu-debian-headless-bundle.sh \
            --cli-archive "$cli_asset" \
            --backend-archive "$backend_asset" \
            --version "$tag" \
            --output "$bundle_asset"

      - name: Validate Ubuntu/Debian headless bundle in Ubuntu container
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          for container_image in ubuntu:22.04 ubuntu:24.04; do
            KAST_UBUNTU_DEBIAN_VERSION="$tag" \
            KAST_UBUNTU_DEBIAN_CONTAINER_IMAGE="$container_image" \
            KAST_UBUNTU_DEBIAN_JAVA_VERSION=21 \
            BUNDLE_PATH="dist/kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz" \
            ./scripts/validate-ubuntu-debian-headless-bundle-in-docker.sh
          done

      - name: Upload Ubuntu/Debian headless bundle assets
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          bundle_asset="dist/kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz"
          gh release upload "$tag" "$bundle_asset" "${bundle_asset}.sha256" --clobber
          python3 - "$bundle_asset" "dist/build-provenance-ubuntu-debian-headless.json" <<'PY'
          import hashlib, json, os, sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "ubuntu-debian-headless-x86_64",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Upload Ubuntu/Debian headless bundle artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ubuntu-debian-headless-bundle-${{ github.run_id }}
          path: dist/
          if-no-files-found: warn

  publish-release:
    name: Publish release
    needs:
      - prepare-release
      - publish-maven-central
      - build-cli
      - build-intellij-plugin
      - build-standalone-backend
      - build-headless-backend
      - build-ubuntu-debian-bundle
      - build-ubuntu-debian-headless-bundle
    if: always() && needs.prepare-release.result == 'success' && needs.publish-maven-central.result == 'success' && needs.build-cli.result == 'success' && needs.build-intellij-plugin.result == 'success' && needs.build-standalone-backend.result == 'success' && needs.build-headless-backend.result == 'success' && needs.build-ubuntu-debian-bundle.result == 'success' && needs.build-ubuntu-debian-headless-bundle.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download CLI provenance
        uses: actions/download-artifact@v7
        with:
          path: provenance-cli
          pattern: rust-cli-*-${{ github.run_id }}
          merge-multiple: true

      - name: Download IDEA plugin provenance
        uses: actions/download-artifact@v7
        with:
          path: provenance-intellij
          pattern: intellij-plugin-*
          merge-multiple: true

      - name: Download standalone backend provenance
        uses: actions/download-artifact@v7
        with:
          path: provenance-standalone
          pattern: standalone-backend-*
          merge-multiple: true

      - name: Download headless backend provenance
        uses: actions/download-artifact@v7
        with:
          path: provenance-headless
          pattern: headless-backend-*
          merge-multiple: true

      - name: Download Ubuntu/Debian bundle provenance
        uses: actions/download-artifact@v7
        with:
          path: provenance-ubuntu-debian
          pattern: ubuntu-debian-bundle-*
          merge-multiple: true

      - name: Download Ubuntu/Debian headless bundle provenance
        uses: actions/download-artifact@v7
        with:
          path: provenance-ubuntu-debian-headless
          pattern: ubuntu-debian-headless-bundle-*
          merge-multiple: true

      - name: Assemble combined provenance
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/assemble-release-provenance.py \
            --output dist/build-provenance.json \
            provenance-cli \
            provenance-headless \
            provenance-intellij \
            provenance-standalone \
            provenance-ubuntu-debian \
            provenance-ubuntu-debian-headless

      - name: Upload combined provenance
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          gh release upload "$tag" dist/build-provenance.json --clobber

      - name: Generate and upload SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          expected_assets=(
            "kast-${tag}-linux-x64.zip"
            "kast-${tag}-linux-arm64.zip"
            "kast-${tag}-macos-x64.zip"
            "kast-${tag}-macos-arm64.zip"
            "kast-ubuntu-debian-x86_64-${tag}.tar.gz"
            "kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz"
            "kast-headless-${tag}.zip"
            "kast-intellij-${tag}.zip"
            "kast-standalone-${tag}.zip"
          )
          expected_sidecars=(
            "kast-ubuntu-debian-x86_64-${tag}.tar.gz.sha256"
            "kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz.sha256"
          )
          rm -rf release-assets
          mkdir -p release-assets
          gh release download "$tag" --dir release-assets --pattern '*.zip'
          gh release download "$tag" --dir release-assets --pattern '*.tar.gz'
          gh release download "$tag" --dir release-assets --pattern '*.tar.gz.sha256'
          gh release download "$tag" --dir release-assets --pattern 'build-provenance.json'
          for asset in "${expected_assets[@]}"; do
            [[ -f "release-assets/${asset}" ]] || { echo "Missing release asset: ${asset}" >&2; exit 1; }
          done
          for sidecar in "${expected_sidecars[@]}"; do
            [[ -f "release-assets/${sidecar}" ]] || { echo "Missing release checksum sidecar: ${sidecar}" >&2; exit 1; }
          done
          (cd release-assets && sha256sum "${expected_assets[@]}") > SHA256SUMS
          cp SHA256SUMS release-assets/SHA256SUMS
          ./scripts/verify-release-assets.sh --release-dir release-assets --tag "$tag"
          gh release upload "$tag" SHA256SUMS --clobber

      - name: Publish draft release with provenance annotation
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          release_flags=("--draft=false")
          if [[ "$tag" == *-* ]]; then
            release_flags+=(--prerelease)
          else
            release_flags+=(--latest)
          fi
          gh release edit "$tag" "${release_flags[@]}" \
            --notes "$(gh release view "$tag" --json body -q .body)

          ---
          **Build provenance:** [CI Run #${{ github.run_number }}]($run_url)"

      - name: Render and push Homebrew tap
        if: ${{ !contains(needs.prepare-release.outputs.release_tag, '-') }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          [[ -n "${GH_TOKEN:-}" ]] || { echo "Missing HOMEBREW_TAP_TOKEN secret" >&2; exit 1; }
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          sha_for() {
            local asset="$1"
            awk -v name="$asset" '$2 == name { print $1 }' SHA256SUMS
          }
          sha_linux_x64="$(sha_for "kast-${tag}-linux-x64.zip")"
          sha_linux_arm64="$(sha_for "kast-${tag}-linux-arm64.zip")"
          sha_macos_x64="$(sha_for "kast-${tag}-macos-x64.zip")"
          sha_macos_arm64="$(sha_for "kast-${tag}-macos-arm64.zip")"
          sha_plugin="$(sha_for "kast-intellij-${tag}.zip")"
          for value in "$sha_linux_x64" "$sha_linux_arm64" "$sha_macos_x64" "$sha_macos_arm64" "$sha_plugin"; do
            [[ -n "$value" ]] || { echo "Missing Homebrew checksum input" >&2; exit 1; }
          done

          gh repo clone amichne/homebrew-kast homebrew-tap -- --depth 1
          git -C homebrew-tap remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/amichne/homebrew-kast.git"
          rsync -a --delete packaging/homebrew/Formula/ homebrew-tap/Formula/
          rsync -a --delete packaging/homebrew/Casks/ homebrew-tap/Casks/
          cp packaging/homebrew/README.md homebrew-tap/README.md
          cp packaging/homebrew/release-state.json homebrew-tap/release-state.json
          rm -rf homebrew-tap/.github/scripts
          rm -f homebrew-tap/.github/workflows/publish-aligned-release.yml
          rm -f homebrew-tap/.github/workflows/update-formula.yml

          KAST_TAP_ROOT=homebrew-tap \
          VERSION="$tag" \
          SHA256_MACOS_X64="$sha_macos_x64" \
          SHA256_MACOS_ARM64="$sha_macos_arm64" \
          SHA256_LINUX_X64="$sha_linux_x64" \
          SHA256_LINUX_ARM64="$sha_linux_arm64" \
          SHA256_PLUGIN="$sha_plugin" \
          packaging/homebrew/scripts/update-formulas.py

          ruby -c homebrew-tap/Formula/kast.rb
          ruby -c homebrew-tap/Casks/kast-plugin.rb
          git -C homebrew-tap diff --check

          tap_status="$(git -C homebrew-tap status --porcelain --untracked-files=all)"
          if [[ -z "$tap_status" ]]; then
            echo "Homebrew tap already up to date for ${tag}"
            exit 0
          fi
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add -A
          git -C homebrew-tap diff --cached --check
          git -C homebrew-tap commit -m "kast ${tag}"
          git -C homebrew-tap push
