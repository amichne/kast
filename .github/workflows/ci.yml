name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflow-contracts:
    name: Workflow release contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Test release workflow contract
        shell: bash
        run: ./.github/scripts/test-release-workflow-contract.sh

      - name: Test docs navigation contract
        shell: bash
        run: ./.github/scripts/test-docs-navigation-contract.sh

      - name: Test release asset verifier
        shell: bash
        run: ./.github/scripts/test-release-asset-verifier.sh

      - name: Test release preflight helper
        shell: bash
        run: ./.github/scripts/test-release-preflight.sh

  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: workflow-contracts
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/intellij-distributions
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Test and build portable distribution
        run: >
          ./gradlew
          :analysis-api:test
          :analysis-server:test
          :backend-standalone:test
          :kast-cli:test
          :kast-cli:portableDistZip

      - name: Upload build-and-test test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-and-test-reports-${{ matrix.os }}
          path: |
            **/build/test-results/test/*.xml
            **/build/reports/tests/test/
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload portable distribution
        uses: actions/upload-artifact@v6
        with:
          name: kast-portable-${{ matrix.os }}
          path: kast-cli/build/distributions/kast-cli-*-portable.zip
          if-no-files-found: error
          retention-days: 1

  native-cli:
    name: Native CLI
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"

      - uses: gradle/actions/setup-gradle@v5

      - name: Build native CLI
        run: ./gradlew :kast-cli:nativeCompile

      - name: Smoke native CLI
        shell: bash
        run: ./scripts/smoke-native-cli.sh kast-cli/build/native/nativeCompile/kast

  analysis-server-transport:
    name: Analysis server transport
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Smoke analysis-server socket transport
        run: >
          ./gradlew
          :analysis-server:test
          --tests io.github.amichne.kast.server.AnalysisServerSocketTest

  test-intellij-plugin:
    name: IntelliJ plugin
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/intellij-distributions
            ~/.cache/pluginVerifier/ides
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Test and verify IntelliJ plugin
        run: >
          ./gradlew
          :backend-intellij:test
          -PexcludeTags=performance
          :backend-intellij:buildPlugin
          :backend-intellij:verifyPluginStructure
          :backend-intellij:verifyPluginXmlPresent
          :backend-intellij:verifyPlugin

      - name: Upload IntelliJ plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: kast-intellij-plugin
          path: backend-intellij/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 1

      - name: Run IntelliJ performance baselines
        run: ./gradlew :backend-intellij:test -PincludeTags=performance

  smoke-kast-cli:
    name: Smoke CLI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Download portable distribution
        uses: actions/download-artifact@v7
        with:
          name: kast-portable-${{ matrix.os }}
          path: kast-cli/build/distributions

      - name: Smoke portable Kast distribution
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="$RUNNER_TEMP/kast-dist"
          rm -rf "$dist_dir"
          mkdir -p "$dist_dir"
          unzip -q kast-cli/build/distributions/kast-cli-*-portable.zip -d "$dist_dir"
          "$dist_dir/kast-cli/kast-cli" --help

      - name: Test installer selector
        shell: bash
        run: ./.github/scripts/test-installer-selector.sh

      - name: Smoke installer
        shell: bash
        run: ./.github/scripts/smoke-installer.sh

      - name: Smoke headless agent installer
        shell: bash
        run: ./scripts/smoke-headless-agent-install.sh

      - name: Smoke headless agent bundle
        shell: bash
        run: ./scripts/smoke-headless-agent-bundle.sh

  eval-agent-routing:
    name: Eval agent routing
    runs-on: ubuntu-latest
    needs: smoke-kast-cli
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Download portable distribution
        uses: actions/download-artifact@v7
        with:
          name: kast-portable-ubuntu-latest
          path: kast-cli/build/distributions

      - name: Prepare kast binary
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="$RUNNER_TEMP/kast-dist"
          rm -rf "$dist_dir"
          mkdir -p "$dist_dir"
          unzip -q kast-cli/build/distributions/kast-cli-*-portable.zip -d "$dist_dir"
          echo "KAST_BIN=$dist_dir/kast-cli/kast-cli" >> "$GITHUB_ENV"

      - name: Run skill evaluation
        shell: bash
        run: |
          set -euo pipefail
          "$KAST_BIN" eval skill --skill-dir="$GITHUB_WORKSPACE/.agents/skills/kast" --format=json > "$RUNNER_TEMP/eval-result.json"
          echo "=== Eval Result ==="
          cat "$RUNNER_TEMP/eval-result.json" | python3 -c "import sys, json; d=json.load(sys.stdin); print(f'Score: {d[\"summary\"][\"score\"]}/100 ({d[\"summary\"][\"grade\"]})')"

      - name: Upload eval result
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: skill-eval-result
          path: |
            ${{ runner.temp }}/eval-result.json
          retention-days: 30
