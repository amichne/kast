interface:
  display_name: "Kast"
  short_description: "Structured Kotlin semantic analysis via packaged kast wrappers"
  default_prompt: >
    Locate the packaged kast skill root, then use the wrapper scripts in
    scripts/ for resolve, references, callers, diagnostics, impact, and rename
    workflows. Trust the wrapper JSON on stdout and inspect log_file only when
    ok=false or daemon notes matter. Use raw kast CLI only when a wrapper does
    not exist.

tools:
  - name: kast-resolve
    script: scripts/kast-resolve.sh
    description: "Resolve a symbol by name, returning declaration metadata and file position."
    parameters:
      - name: workspace-root
        type: string
        required: true
        description: "Absolute path to the workspace root."
      - name: symbol
        type: string
        required: true
        description: "Fully qualified or simple name of the symbol to resolve."
      - name: file
        type: string
        required: false
        description: "File path hint (absolute, workspace-relative, or glob) to narrow resolution scope."
      - name: kind
        type: string
        required: false
        description: "Restrict to a declaration kind: class, function, or property."
      - name: containing-type
        type: string
        required: false
        description: "FQN of the containing type for disambiguation."

  - name: kast-references
    script: scripts/kast-references.sh
    description: "Find all references to a symbol across the workspace."
    parameters:
      - name: workspace-root
        type: string
        required: true
        description: "Absolute path to the workspace root."
      - name: symbol
        type: string
        required: true
        description: "Fully qualified or simple name of the symbol."
      - name: include-declaration
        type: boolean
        required: false
        description: "Include the declaration site in the reference list (default: true)."
      - name: file
        type: string
        required: false
        description: "File path hint to narrow resolution scope."
      - name: kind
        type: string
        required: false
        description: "Restrict to a declaration kind: class, function, or property."
      - name: containing-type
        type: string
        required: false
        description: "FQN of the containing type for disambiguation."

  - name: kast-callers
    script: scripts/kast-callers.sh
    description: "Expand call hierarchy for a symbol. Returns an ok-keyed JSON tree with traversal stats."
    parameters:
      - name: workspace-root
        type: string
        required: true
        description: "Absolute path to the workspace root."
      - name: symbol
        type: string
        required: true
        description: "Fully qualified or simple name of the symbol."
      - name: direction
        type: string
        required: false
        description: "Call direction: 'incoming' (callers) or 'outgoing' (callees). Default: incoming."
      - name: depth
        type: integer
        required: false
        description: "Maximum traversal depth. Default: 2."
      - name: max-total-calls
        type: integer
        required: false
        description: "Cap total nodes in the result tree. Omit to use the backend default."
      - name: max-children-per-node
        type: integer
        required: false
        description: "Cap children per node. Omit to use the backend default."
      - name: timeout-millis
        type: integer
        required: false
        description: "Traversal timeout in milliseconds. Omit to use the backend default."
      - name: file
        type: string
        required: false
        description: "File path hint to narrow resolution scope."
      - name: kind
        type: string
        required: false
        description: "Restrict to a declaration kind: class, function, or property."
      - name: containing-type
        type: string
        required: false
        description: "FQN of the containing type for disambiguation."

  - name: kast-impact
    script: scripts/kast-impact.sh
    description: "Assess edit impact for a symbol before modifying it. Returns references and optionally incoming callers."
    parameters:
      - name: workspace-root
        type: string
        required: true
        description: "Absolute path to the workspace root."
      - name: symbol
        type: string
        required: true
        description: "Fully qualified or simple name of the symbol."
      - name: include-callers
        type: boolean
        required: false
        description: "Include the incoming call hierarchy in the result (default: true)."
      - name: caller-depth
        type: integer
        required: false
        description: "Depth for the incoming call hierarchy when include-callers=true. Default: 2."
      - name: file
        type: string
        required: false
        description: "File path hint to narrow resolution scope."
      - name: kind
        type: string
        required: false
        description: "Restrict to a declaration kind: class, function, or property."
      - name: containing-type
        type: string
        required: false
        description: "FQN of the containing type for disambiguation."

  - name: kast-diagnostics
    script: scripts/kast-diagnostics.sh
    description: "Run diagnostics on one or more Kotlin files. Returns ok, clean, error_count, warning_count, and a diagnostics array."
    parameters:
      - name: workspace-root
        type: string
        required: true
        description: "Absolute path to the workspace root."
      - name: file-paths
        type: string
        required: true
        description: "Comma-separated list of absolute (or workspace-relative) file paths to diagnose."

  - name: kast-rename
    script: scripts/kast-rename.sh
    description: >
      Run the full rename workflow end-to-end: resolve symbol → plan → apply edits → diagnostics.
      Accepts a symbol name (symbol mode, recommended) or an exact file-path and offset (offset mode).
      Returns ok-keyed JSON with edit_count, affected_files, apply_result, and a diagnostics summary.
      Exits non-zero when ERROR-severity diagnostics remain after apply.
    parameters:
      - name: workspace-root
        type: string
        required: true
        description: "Absolute path to the workspace root."
      - name: new-name
        type: string
        required: true
        description: "New name for the symbol."
      - name: symbol
        type: string
        required: false
        description: "Symbol name to rename (symbol mode). Provide this OR file-path+offset."
      - name: file-path
        type: string
        required: false
        description: "Absolute path to the file containing the symbol (offset mode)."
      - name: offset
        type: integer
        required: false
        description: "Zero-based UTF-16 offset of the symbol in the file (offset mode)."
      - name: file
        type: string
        required: false
        description: "File path hint to narrow symbol resolution scope (symbol mode only)."
      - name: kind
        type: string
        required: false
        description: "Restrict resolution to a declaration kind: class, function, or property (symbol mode only)."
      - name: containing-type
        type: string
        required: false
        description: "FQN of the containing type for disambiguation (symbol mode only)."

routing_rules:
  - intent: "resolve a symbol"
    tool: kast-resolve
    no_fallback: true
  - intent: "find references"
    tool: kast-references
    no_fallback: true
  - intent: "call hierarchy / who calls / incoming callers / outgoing callers"
    tool: kast-callers
    no_fallback: true
  - intent: "assess edit impact"
    tool: kast-impact
    no_fallback: true
  - intent: "run diagnostics"
    tool: kast-diagnostics
    no_fallback: true
  - intent: "rename a symbol"
    tool: kast-rename
    no_fallback: true

constraints:
  prohibited_substitutions:
    - pattern: "grep|rg|ripgrep"
      for: "symbol identity, reference finding, or call hierarchy"
      reason: "Text search cannot resolve overloads, type aliases, or cross-module visibility."
    - pattern: "ast-grep"
      for: "symbol resolution or reference finding"
      reason: "AST pattern matching lacks semantic type information."
    - pattern: "cat + manual parsing"
      for: "any structured analysis task"
      reason: "Brittle and loses semantic context."
  text_search_whitelist:
    - "Finding file paths by name or glob"
    - "Searching non-Kotlin files (markdown, YAML, JSON, shell scripts)"
    - "Searching string literals or comments within Kotlin files"
