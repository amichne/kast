  symbol/query:
    category: symbol
    dataSource: sqlite
    failureReasons:
    - INDEX_UNAVAILABLE
    - INVALID_FILTER
    - QUERY_TOO_BROAD
    - AMBIGUOUS_ANCHOR
    - ANCHOR_NOT_FOUND
    - SEMANTIC_UNAVAILABLE
    - TIMEOUT
    failureType: SYMBOL_QUERY_FAILURE
    method: symbol/query
    notes:
    - Use this as the public source-index search surface before file reads or lower-level internal requests.
    - Hard filters are enforced by source-index and compiler facts, never by semantic score.
    - Nested filters include gradleProject, relativePathPrefix, productionOnly, excludePatterns, and usageFacets.
    - usageFacets is the supported public filter for computed declaration facets; symbol/query does not expose clusterKinds.
    - Token matching is computed from query text and indexed declaration fields.
    - Graph depth defaults to 1 and is capped at 2 in the first implementation.
    - Semantic discovery reports available=false when no semantic candidate provider is configured.
    request:
      fields:
        anchor:
          fields:
            filePath:
              nullable: true
              optional: true
              type: string
            fqName:
              nullable: true
              optional: true
              type: string
            offset:
              nullable: true
              optional: true
              type: integer
            symbol:
              nullable: true
              optional: true
              type: string
          optional: true
          type: object
        filters:
          fields:
            excludePatterns:
              description: Glob patterns matched against module path or relative path; matching declarations are excluded.
              items: string
              optional: true
              type: array
            fileGlob:
              nullable: true
              optional: true
              type: string
            fqNamePrefix:
              nullable: true
              optional: true
              type: string
            gradleProject:
              description: Gradle project path filter. Matches an exact project such as :lib or child projects such as :lib:payments; an optional source-set suffix like [main] is ignored.
              nullable: true
              optional: true
              type: string
            kinds:
              items:
                enum:
                - CLASS
                - INTERFACE
                - OBJECT
                - FUNCTION
                - PROPERTY
                - TYPEALIAS
                - ENUM_CLASS
                - ENUM_ENTRY
                - CONSTRUCTOR
                type: string
              optional: true
              type: array
            modulePath:
              nullable: true
              optional: true
              type: string
            packagePrefix:
              nullable: true
              optional: true
              type: string
            productionOnly:
              description: Restricts results to sourceSet=main and excludes build logic locations such as buildSrc and build-logic.
              optional: true
              type: boolean
            relativePathPrefix:
              description: Matches the workspace-root-relative path prefix from path_prefixes plus filename, using normalized slash-separated segments.
              nullable: true
              optional: true
              type: string
            sourceSet:
              nullable: true
              optional: true
              type: string
            usageFacets:
              description: Filters by computed declaration facets derived from declarations, references, metadata, and supertypes.
              items:
                enum:
                - PUBLIC_API
                - INTERNAL_API
                - MODULE_PRIVATE
                - BRIDGE
                - BUILD_LOGIC
                type: string
              optional: true
              type: array
            visibility:
              items:
                enum:
                - PUBLIC
                - INTERNAL
                - PROTECTED
                - PRIVATE
                - LOCAL
                type: string
              optional: true
              type: array
          optional: true
          type: object
        graph:
          fields:
            depth:
              optional: true
              type: integer
            direction:
              enum:
              - INCOMING
              - OUTGOING
              - BOTH
              optional: true
              type: string
            edgeKinds:
              items:
                enum:
                - CALL
                - TYPE_REF
                - INHERITANCE
                - OVERRIDE
                - IMPORT
                - ANNOTATION
                - UNKNOWN
                type: string
              optional: true
              type: array
            maxEdgesPerResult:
              optional: true
              type: integer
          optional: true
          type: object
        includeEvidence:
          optional: true
          type: boolean
        includeNextRequests:
          optional: true
          type: boolean
        limit:
          optional: true
          type: integer
        modes:
          items:
            enum:
            - exact
            - lexical
            - structural
            - graph
            - semantic
            type: string
          optional: true
          type: array
        query:
          type: string
        semantic:
          fields:
            enabled:
              optional: true
              type: boolean
            maxCandidates:
              optional: true
              type: integer
            profile:
              enum:
              - identity
              - behavior
              - api_usage
              optional: true
              type: string
          optional: true
          type: object
        workspaceRoot:
          nullable: true
          optional: true
          type: string
      required:
      - query
    responseType: KastSymbolQueryResponse
    successType: SYMBOL_QUERY_SUCCESS
    summary: Query compiler-indexed declarations with symbolic hard filters, fielded lexical/name matching, bounded graph relationship evidence, and optional semantic discovery evidence
    tool:
      description: Search the Kotlin source index for declarations by name, lexical text, graph evidence, and hard filters. Start here for unknown symbols, broad navigation, and .kt/.kts discovery before reading files or lower-level internal requests.
      name: kast_symbol_query
