            - code [ref=e196]: "Use the packaged `kast` skill to resolve the symbol at /absolute/path/to/src/main/kotlin/sample/Use.kt offset 41 in workspace /absolute/path/to/workspace. Return the fully qualified name, kind, declaration file, line, column, and type if present."
