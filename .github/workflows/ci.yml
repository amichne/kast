name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-contracts:
    name: Workflow release contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Install Rust for command-surface contracts
        uses: dtolnay/rust-toolchain@stable

      - name: Cache local-authority Rust builds
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: cli-rs -> target
          cache-bin: "false"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test release workflow contract
        shell: bash
        run: ./.github/scripts/test-release-workflow-contract.sh

      - name: Test JetBrains plugin repository contract
        shell: bash
        run: ./.github/scripts/test-jetbrains-plugin-repository-contract.sh

      - name: Test Kast build contract
        shell: bash
        run: ./.github/scripts/test-kast-build-contract.sh

      - name: Test docs navigation contract
        shell: bash
        run: ./.github/scripts/test-docs-navigation-contract.sh

      - name: Test docs content contract
        shell: bash
        run: ./.github/scripts/test-docs-content-contract.sh

      - name: Test macOS installer contract
        shell: bash
        run: ./.github/scripts/test-macos-installer-contract.sh

      - name: Test local development refresh contract
        shell: bash
        run: ./.github/scripts/test-local-development-refresh-contract.sh

      - name: Test development CLI and IDEA profile install contract
        shell: bash
        run: ./.github/scripts/test-development-cli-install-contract.sh

      - name: Test installed selector handle workflow
        shell: bash
        run: ./.github/scripts/test-selector-handle-installed-workflow.sh

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies for authority gate
        run: pip install -r requirements-docs.txt

      - name: Test CLI and plugin authority cutover contract
        shell: bash
        run: ./.github/scripts/test-cli-plugin-authority-cutover-contract.sh

      - name: Test Kast routing evals
        shell: bash
        run: ./.github/scripts/test-kast-routing-evals.sh

      - name: Test release asset verifier
        shell: bash
        run: ./.github/scripts/test-release-asset-verifier.sh

      - name: Test release provenance assembler
        shell: bash
        run: ./.github/scripts/test-release-provenance-assembler.sh

      - name: Test CI artifact ledger
        shell: bash
        run: ./.github/scripts/test-ci-artifact-ledger.sh

      - name: Ensure zstd is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zstd
          fi

      - name: Test headless runtime packagers
        shell: bash
        run: ./.github/scripts/test-headless-runtime-packagers.sh

      - name: Test CI Gradle retry helper
        shell: bash
        run: ./.github/scripts/test-ci-gradle-retry.sh

      - name: Test Homebrew package renderer
        shell: bash
        run: packaging/homebrew/scripts/test-formulas.py

  local-development-semantic-e2e:
    name: Local development installed semantic E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Exercise refreshed installed semantics
        shell: bash
        run: ./.github/scripts/test-local-development-semantic-e2e.sh

  runtime-contracts:
    name: Runtime command and bundle contracts
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test terminal command contract
        shell: bash
        run: ./.github/scripts/test-terminal-command-contract.sh

      - name: Test Kast Copilot plugin package
        shell: bash
        run: ./.github/scripts/test-kast-copilot-plugin.sh

      - name: Smoke Ubuntu/Debian bundle contract
        shell: bash
        run: ./scripts/smoke-ubuntu-debian-bundle.sh

  runtime-compatibility-contract:
    name: Runtime compatibility matrix
    runs-on: macos-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test runtime compatibility contract
        shell: bash
        run: ./.github/scripts/test-runtime-compatibility-contract.sh

  maven-publication-contract:
    name: Maven publication metadata
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Publish public modules to Maven local
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :build-logic:test
          :analysis-api:publishToMavenLocal
          :analysis-server:publishToMavenLocal
          :index-store:publishToMavenLocal
          -Pkast.publish.target=local
          -Pversion=0.0.0-ci

      - name: Record Maven publication validation ledger
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ci-ledgers
          printf 'gitSha=%s\nsourceRef=%s\nworkflowRunId=%s\n' \
            "$GITHUB_SHA" \
            "$GITHUB_REF" \
            "$GITHUB_RUN_ID" \
            > dist/ci-ledgers/maven-publication-validation.txt
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/ci-ledgers/maven-publication.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind ci-maven-publication-validation \
            --artifact-name ci-maven-publication-validation \
            --artifact-path dist/ci-ledgers/maven-publication-validation.txt \
            --producer-job maven-publication-contract \
            --build-command-id ci-maven-publish-to-local

      - name: Upload Maven publication validation ledger
        uses: actions/upload-artifact@v6
        with:
          name: ci-artifact-ledger-maven-publication
          path: dist/ci-ledgers/maven-publication.json
          if-no-files-found: error
          retention-days: 3

  rust-cli:
    name: Rust CLI
    runs-on: ubuntu-22.04
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust formatting
        working-directory: cli-rs
        run: cargo fmt --all -- --check

      - name: Check Rust lints
        working-directory: cli-rs
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test Rust CLI
        working-directory: cli-rs
        run: cargo test --locked --all-targets --all-features

      - name: Build Rust CLI
        working-directory: cli-rs
        run: KAST_VERSION=0.0.0-ci cargo build --release --locked

      - name: Test LSP config smoke
        shell: bash
        run: >
          KAST_LSP_TEST_COMMAND="$GITHUB_WORKSPACE/cli-rs/target/release/kast"
          KAST_LSP_REQUEST_TIMEOUT_MS=1000
          node ./.github/scripts/test-lsp-config.mjs

      - name: Test LSP pivot gates
        shell: bash
        run: >
          KAST_LSP_TEST_COMMAND="$GITHUB_WORKSPACE/cli-rs/target/release/kast"
          KAST_LSP_REQUEST_TIMEOUT_MS=1000
          ./.github/scripts/test-lsp-pivot-gates.sh

      - name: Package Rust CLI CI asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist cli-rs/target/package/kast-v0.0.0-ci-linux-x64
          cp cli-rs/target/release/kast cli-rs/target/package/kast-v0.0.0-ci-linux-x64/kast
          chmod 755 cli-rs/target/package/kast-v0.0.0-ci-linux-x64/kast
          (cd cli-rs/target/package/kast-v0.0.0-ci-linux-x64 && zip -9 -q "$GITHUB_WORKSPACE/dist/kast-v0.0.0-ci-linux-x64.zip" kast)
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/ci-ledgers/rust-cli-linux-x64.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind ci-rust-cli-linux-x64 \
            --artifact-name kast-rust-cli-linux-x64 \
            --artifact-path dist/kast-v0.0.0-ci-linux-x64.zip \
            --producer-job rust-cli \
            --build-command-id ci-rust-cli-release-build

      - name: Upload Rust CLI CI asset
        uses: actions/upload-artifact@v6
        with:
          name: kast-rust-cli-linux-x64
          path: dist/kast-v0.0.0-ci-linux-x64.zip
          if-no-files-found: error
          retention-days: 1

      - name: Upload Rust CLI CI ledger
        uses: actions/upload-artifact@v6
        with:
          name: ci-artifact-ledger-rust-cli-linux-x64
          path: dist/ci-ledgers/rust-cli-linux-x64.json
          if-no-files-found: error
          retention-days: 3

  build-and-test-linux:
    name: Build & test (ubuntu-latest)
    needs: workflow-contracts
    uses: ./.github/workflows/ci-build-and-test.yml
    with:
      runner: ubuntu-latest

  build-and-test-macos:
    name: Build & test (macos-latest)
    needs: workflow-contracts
    uses: ./.github/workflows/ci-build-and-test.yml
    with:
      runner: macos-latest

  install-ubuntu-debian-container:
    name: Ubuntu/Debian install container (${{ matrix.container-image }}, Java ${{ matrix.java-version }})
    runs-on: ubuntu-24.04
    needs:
      - build-and-test-linux
      - rust-cli
    strategy:
      fail-fast: false
      matrix:
        container-image:
          - ubuntu:22.04
          - ubuntu:24.04
        java-version:
          - "21"
    steps:
      - uses: actions/checkout@v5

      - name: Download headless backend distribution
        uses: actions/download-artifact@v7
        with:
          name: kast-headless-ubuntu-latest
          path: backend-headless/build/distributions

      - name: Download Rust CLI CI asset
        uses: actions/download-artifact@v7
        with:
          name: kast-rust-cli-linux-x64
          path: dist

      - name: Download Rust CLI CI ledger
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-rust-cli-linux-x64
          path: ci-ledgers

      - name: Download headless backend ledger
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-headless-ubuntu-latest
          path: ci-ledgers

      - name: Resolve Rust CLI CI asset
        shell: bash
        run: |
          set -euo pipefail
          cli_asset="dist/kast-v0.0.0-ci-linux-x64.zip"
          [[ -f "$cli_asset" ]] || { echo "Missing Rust CLI CI asset: ${cli_asset}" >&2; exit 1; }
          printf 'KAST_RUST_CLI_TAG=%s\n' "v0.0.0-ci" >> "$GITHUB_ENV"
          printf 'KAST_UBUNTU_DEBIAN_CI_BUNDLE_TAG=%s\n' "v0.7.11-ci" >> "$GITHUB_ENV"
          printf 'KAST_RUST_CLI_ASSET=%s\n' "$cli_asset" >> "$GITHUB_ENV"

      - name: Package Ubuntu/Debian CI bundle
        shell: bash
        run: |
          set -euo pipefail
          backend_asset="$(find backend-headless/build/distributions -maxdepth 1 -name 'backend-headless-*-portable.zip' -print -quit)"
          [[ -n "$backend_asset" ]] || { echo "Missing headless backend portable zip" >&2; exit 1; }
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger ci-ledgers/rust-cli-linux-x64.json \
            --ledger ci-ledgers/headless-ubuntu-latest.json \
            --git-sha "$GITHUB_SHA" \
            --require-kind ci-rust-cli-linux-x64 \
            --require-kind ci-headless-ubuntu-latest \
            --artifact "ci-rust-cli-linux-x64=${KAST_RUST_CLI_ASSET}" \
            --artifact "ci-headless-ubuntu-latest=${backend_asset}"
          bundle_asset="dist/kast-ubuntu-debian-headless-x86_64-${KAST_UBUNTU_DEBIAN_CI_BUNDLE_TAG}.tar.gz"

          packager_dir="${RUNNER_TEMP}/kast-ci-packager"
          rm -rf "$packager_dir"
          mkdir -p "$packager_dir"
          python3 -m zipfile -e "$KAST_RUST_CLI_ASSET" "$packager_dir"
          packager_bin="${packager_dir}/kast"
          [[ -f "$packager_bin" ]] || { echo "Missing extracted Rust CLI binary: ${packager_bin}" >&2; exit 1; }
          chmod 755 "$packager_bin"

          "$packager_bin" \
            developer release package ubuntu-debian-bundle \
            --repo-root "$PWD" \
            --cli-archive "$KAST_RUST_CLI_ASSET" \
            --backend-archive "$backend_asset" \
            --version "$KAST_UBUNTU_DEBIAN_CI_BUNDLE_TAG" \
            --bundle-output "$bundle_asset"

          printf 'KAST_UBUNTU_DEBIAN_BUNDLE=%s\n' "$bundle_asset" >> "$GITHUB_ENV"

      - name: Validate Ubuntu/Debian bundle in Ubuntu container
        env:
          KAST_UBUNTU_DEBIAN_CONTAINER_IMAGE: ${{ matrix.container-image }}
          KAST_UBUNTU_DEBIAN_JAVA_VERSION: ${{ matrix.java-version }}
        shell: bash
        run: BUNDLE_PATH="$KAST_UBUNTU_DEBIAN_BUNDLE" ./scripts/validate-ubuntu-debian-bundle-in-docker.sh

  kast-action-runtime-contract:
    name: kast-action runtime contract
    runs-on: ubuntu-latest
    needs:
      - build-and-test-linux
      - rust-cli
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Free disk for kast-action runtime installation
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Ensure zstd is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zstd
          fi

      - name: Download headless backend distribution
        uses: actions/download-artifact@v7
        with:
          name: kast-headless-ubuntu-latest
          path: backend-headless/build/distributions

      - name: Download Rust CLI CI asset
        uses: actions/download-artifact@v7
        with:
          name: kast-rust-cli-linux-x64
          path: dist

      - name: Download Rust CLI CI ledger
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-rust-cli-linux-x64
          path: ci-ledgers

      - name: Download headless backend ledger
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-headless-ubuntu-latest
          path: ci-ledgers

      - name: Package kast-action runtime inputs
        id: package-runtime
        shell: bash
        run: |
          set -euo pipefail
          runtime_version="$(python3 -c 'import json; from pathlib import Path; print(json.loads(Path("packaging/homebrew/release-state.json").read_text(encoding="utf-8"))["current_release"].removeprefix("v"))')"
          cli_asset="dist/kast-v0.0.0-ci-linux-x64.zip"
          backend_asset="$(find backend-headless/build/distributions -maxdepth 1 -name 'backend-headless-*-portable.zip' -print -quit)"
          [[ -f "$cli_asset" ]] || { echo "Missing Rust CLI CI asset: ${cli_asset}" >&2; exit 1; }
          [[ -n "$backend_asset" ]] || { echo "Missing headless backend portable zip" >&2; exit 1; }
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger ci-ledgers/rust-cli-linux-x64.json \
            --ledger ci-ledgers/headless-ubuntu-latest.json \
            --git-sha "$GITHUB_SHA" \
            --require-kind ci-rust-cli-linux-x64 \
            --require-kind ci-headless-ubuntu-latest \
            --artifact "ci-rust-cli-linux-x64=${cli_asset}" \
            --artifact "ci-headless-ubuntu-latest=${backend_asset}"

          ./scripts/package-headless-runtime.sh \
            --cli-archive "$cli_asset" \
            --backend-archive "$backend_asset" \
            --version "$runtime_version" \
            --output "dist/kast-headless-linux-x64.tar.zst" \
            --manifest-output "dist/kast-runtime-manifest.json"

          gradle_seed="${RUNNER_TEMP}/gradle-ro-seed"
          rm -rf "$gradle_seed"
          mkdir -p "$gradle_seed/caches/modules-2/files-2.1/headless/smoke"
          printf '%s\n' "fixture" > "$gradle_seed/caches/modules-2/files-2.1/headless/smoke/artifact.pom"
          ./scripts/package-gradle-ro-cache.sh \
            --gradle-user-home "$gradle_seed" \
            --output "dist/gradle-ro-dep-cache.tar.zst"

          (cd dist && sha256sum -c kast-headless-linux-x64.sha256)
          (cd dist && sha256sum -c gradle-ro-dep-cache.sha256)
          printf 'runtime_version=%s\n' "$runtime_version" >> "$GITHUB_OUTPUT"
          printf 'runtime_sha=%s\n' "$(awk '{ print $1 }' dist/kast-headless-linux-x64.sha256)" >> "$GITHUB_OUTPUT"
          printf 'gradle_cache_sha=%s\n' "$(awk '{ print $1 }' dist/gradle-ro-dep-cache.sha256)" >> "$GITHUB_OUTPUT"

      - name: Reclaim verified runtime packaging inputs
        shell: bash
        run: |
          set -euo pipefail
          cli_asset="dist/kast-v0.0.0-ci-linux-x64.zip"
          backend_asset="$(find backend-headless/build/distributions -maxdepth 1 -name 'backend-headless-*-portable.zip' -print -quit)"
          [[ -f "$cli_asset" ]] || { echo "Missing consumed Rust CLI CI asset: ${cli_asset}" >&2; exit 1; }
          [[ -n "$backend_asset" ]] || { echo "Missing consumed headless backend portable zip" >&2; exit 1; }

          printf '%s\n' "Disk use before reclaiming verified runtime inputs:"
          df -h /
          du -sh "$backend_asset" "$cli_asset" "$GRADLE_USER_HOME/caches" 2>/dev/null || true

          rm -f "$backend_asset" "$cli_asset"
          rm -rf \
            "$GRADLE_USER_HOME"/caches/build-cache-* \
            "$GRADLE_USER_HOME"/caches/transforms-* \
            "$GRADLE_USER_HOME"/caches/*/transforms

          printf '%s\n' "Disk use after reclaiming verified runtime inputs and rebuildable Gradle state:"
          df -h /

      - name: Install packaged runtime with kast-action
        uses: amichne/kast-action@v2
        with:
          version: ${{ steps.package-runtime.outputs.runtime_version }}
          artifact-url: file://${{ github.workspace }}/dist/kast-headless-linux-x64.tar.zst
          artifact-sha256: ${{ steps.package-runtime.outputs.runtime_sha }}
          manifest-url: file://${{ github.workspace }}/dist/kast-runtime-manifest.json
          gradle-ro-cache-url: file://${{ github.workspace }}/dist/gradle-ro-dep-cache.tar.zst
          gradle-ro-cache-sha256: ${{ steps.package-runtime.outputs.gradle_cache_sha }}
          install-dir: ${{ runner.temp }}/kast-install
          fail-on-cache-miss: "true"
          strict: "true"

      - name: Validate kast-action installed runtime
        shell: bash
        run: |
          set -euo pipefail
          test -L "${RUNNER_TEMP}/kast-install/current"
          scripts/verify-setup-kast-install.sh \
            --install-dir "${RUNNER_TEMP}/kast-install/current" \
            --workspace-id kast-action-ci-smoke \
            --module-name kast-action-smoke \
            --gradle-root "$GITHUB_WORKSPACE"

  analysis-server-transport:
    name: Analysis server transport
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Smoke analysis-server socket transport
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :analysis-server:test
          --tests io.github.amichne.kast.server.AnalysisServerSocketTest

  test-idea-plugin:
    name: IDEA plugin
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Free disk for IDEA plugin verification
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Cache IntelliJ plugin verification inputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/shared-idea-distributions
            ~/.gradle/kast/backend-idea-distributions
            ~/.cache/pluginVerifier/ides
          key: idea-plugin-inputs-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            idea-plugin-inputs-${{ runner.os }}-

      - name: Test IDEA plugin
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :backend-idea:test
          -PexcludeTags=performance

      - name: Build and verify IDEA plugin distribution
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :backend-idea:buildPlugin
          :backend-idea:verifyPluginStructure
          :backend-idea:verifyPluginXmlPresent
          :backend-idea:verifyPlugin

      - name: Upload IDEA plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: kast-idea-plugin
          path: backend-idea/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 1

      - name: Record IDEA plugin ledger
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ci-ledgers
          plugin_asset="$(find backend-idea/build/distributions -maxdepth 1 -name '*.zip' -print -quit)"
          [[ -n "$plugin_asset" ]] || { echo "Missing IDEA plugin zip" >&2; exit 1; }
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/ci-ledgers/idea-plugin.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind ci-idea-plugin \
            --artifact-name kast-idea-plugin \
            --artifact-path "$plugin_asset" \
            --producer-job test-idea-plugin \
            --build-command-id ci-idea-plugin-build

      - name: Upload IDEA plugin ledger
        uses: actions/upload-artifact@v6
        with:
          name: ci-artifact-ledger-idea-plugin
          path: dist/ci-ledgers/idea-plugin.json
          if-no-files-found: error
          retention-days: 3

      - name: Test IDEA plugin signing and immutability contract
        shell: bash
        run: ./.github/scripts/test-idea-plugin-signing-contract.sh

      - name: Run IDEA plugin performance baselines
        run: ./scripts/ci-gradle-retry.sh ./gradlew :backend-idea:test -PincludeTags=performance
