name: Release
run-name: >-
  Release
  ${{
    github.event_name == 'workflow_dispatch'
      && format('{0} ({1})', inputs.release_type, github.ref_name)
      || github.ref_name
  }}

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_type:
        description: >
          Release type. Stable releases increment the latest vX.Y.Z tag.
          Beta releases append the short commit SHA.
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch
          - beta

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Preflight release automation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          cache-cleanup: always

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify the sole setup contract
        run: .github/scripts/test-setup-contract.sh

      - name: Validate JVM source before creating a tag
        if: github.event_name == 'workflow_dispatch'
        run: >
          ./scripts/ci-gradle-retry.sh ./gradlew test
          --no-daemon
          --stacktrace

  bump-version:
    name: Bump version (${{ inputs.release_type }})
    needs: [release-preflight]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}

      - name: Compute next semver tag and push
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          release_type="${{ inputs.release_type }}"
          short_sha="${GITHUB_SHA:0:7}"
          latest_stable="$(git tag --list 'v*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)"
          if [[ -z "$latest_stable" ]]; then
            latest_stable="v0.0.0"
          fi
          base="${latest_stable#v}"
          IFS='.' read -r major minor patch <<< "$base"
          major="${major:-0}"
          minor="${minor:-0}"
          patch="${patch:-0}"

          case "$release_type" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              new_tag="v${major}.${minor}.${patch}"
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              new_tag="v${major}.${minor}.${patch}"
              ;;
            patch)
              patch=$((patch + 1))
              new_tag="v${major}.${minor}.${patch}"
              ;;
            beta)
              patch=$((patch + 1))
              new_tag="v${major}.${minor}.${patch}-beta.${short_sha}"
              ;;
            *)
              echo "Unknown release_type: ${release_type}" >&2
              exit 1
              ;;
          esac

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$new_tag"
          git push origin "$new_tag"
          printf 'release_tag=%s\n' "$new_tag" >> "$GITHUB_OUTPUT"

  prepare-release:
    name: Prepare release
    needs: [release-preflight, bump-version]
    if: always() && github.event_name == 'push' && needs.release-preflight.result == 'success' && needs.bump-version.result == 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.release-tag.outputs.value }}
      release_version: ${{ steps.release-tag.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ needs.bump-version.outputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          [[ "$tag" == v* ]] || { echo "release tag must start with v: $tag" >&2; exit 1; }
          printf 'value=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release-tag.outputs.value }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release already exists: $tag"
          else
            gh release create "$tag" \
              --draft \
              --verify-tag \
              --title "$tag" \
              --generate-notes
          fi

  validate-jvm:
    name: Validate JVM and Maven publications
    needs: [prepare-release]
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Run JVM tests and local publication checks
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          test
          :analysis-api:publishToMavenLocal
          :analysis-server:publishToMavenLocal
          :index-store:publishToMavenLocal
          -Pkast.publish.target=local
          -Pversion="${{ needs.prepare-release.outputs.release_version }}"
          --no-daemon
          --stacktrace

      - name: Record release Maven validation ledger
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ci-ledgers
          printf 'gitSha=%s\nreleaseTag=%s\nworkflowRunId=%s\n' \
            "$GITHUB_SHA" \
            "${{ needs.prepare-release.outputs.release_tag }}" \
            "$GITHUB_RUN_ID" \
            > dist/ci-ledgers/release-maven-publication-validation.txt
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/ci-ledgers/release-maven-publication.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "refs/tags/${{ needs.prepare-release.outputs.release_tag }}" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind release-maven-publication-validation \
            --artifact-name release-maven-publication-validation \
            --artifact-path dist/ci-ledgers/release-maven-publication-validation.txt \
            --producer-job validate-jvm \
            --build-command-id release-maven-publish-to-local

      - name: Upload release Maven validation ledger
        uses: actions/upload-artifact@v6
        with:
          name: release-artifact-ledger-maven-publication
          path: dist/ci-ledgers/release-maven-publication.json
          if-no-files-found: error
          retention-days: 7

  build-openapi-spec:
    name: Build OpenAPI spec
    needs:
      - prepare-release
      - validate-jvm
    if: always() && needs.prepare-release.result == 'success' && needs.validate-jvm.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Stage OpenAPI spec
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          stageOpenApiSpec
          -Pversion="${{ needs.prepare-release.outputs.release_version }}"
          --no-daemon
          --stacktrace

      - name: Generate OpenAPI provenance
        shell: bash
        run: |
          set -euo pipefail
          python3 - "dist/openapi.yaml" "dist/build-provenance-openapi.json" <<'PY'
          import hashlib
          import json
          import os
          import sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "openapi",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/build-ledger-openapi.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "refs/tags/${{ needs.prepare-release.outputs.release_tag }}" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind release-openapi \
            --artifact-name openapi.yaml \
            --artifact-path dist/openapi.yaml \
            --producer-job build-openapi-spec \
            --build-command-id release-stage-openapi-spec

      - name: Upload OpenAPI release asset
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger dist/build-ledger-openapi.json \
            --git-sha "$GITHUB_SHA" \
            --require-kind release-openapi \
            --artifact release-openapi=dist/openapi.yaml
          .github/scripts/upload-immutable-release-asset.sh \
            --tag "$tag" \
            --asset dist/openapi.yaml

      - name: Upload OpenAPI workflow artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: openapi-spec-${{ github.run_id }}
          path: dist/
          if-no-files-found: error

  publish-maven-central:
    name: Publish Maven Central
    needs:
      - prepare-release
      - validate-jvm
    if: always() && needs.prepare-release.result == 'success' && needs.validate-jvm.result == 'success'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Download release Maven validation ledger
        uses: actions/download-artifact@v7
        with:
          name: release-artifact-ledger-maven-publication
          path: ci-ledgers

      - name: Verify release Maven validation ledger
        shell: bash
        run: >
          scripts/verify-ci-artifact-ledger.py verify
          --ledger ci-ledgers/release-maven-publication.json
          --git-sha "$GITHUB_SHA"
          --require-kind release-maven-publication-validation

      - name: Check Maven Central publication state
        id: maven-state
        shell: bash
        run: |
          set -euo pipefail
          set +e
          state="$(scripts/verify-maven-central.sh \
            --version "${{ needs.prepare-release.outputs.release_version }}" \
            --classify)"
          verifier_exit="$?"
          set -e
          if [[ "$verifier_exit" -ne 0 ]]; then
            if [[ "$state" == "partial" ]]; then
              echo "::warning::Maven Central has a partial publication for ${{ needs.prepare-release.outputs.release_version }}; waiting for all modules."
              if scripts/verify-maven-central.sh \
                --version "${{ needs.prepare-release.outputs.release_version }}" \
                --attempts 30 \
                --delay-seconds 20; then
                state="all"
              else
                echo "::warning::Maven Central remains partial; final Maven verification will decide the job result."
              fi
            else
              exit "$verifier_exit"
            fi
          fi
          printf 'state=%s\n' "$state" >> "$GITHUB_OUTPUT"
          if [[ "$state" == "all" ]]; then
            echo "Maven Central already has all public modules for ${{ needs.prepare-release.outputs.release_version }}."
          fi

      - name: Check Maven Central and signing secrets
        if: steps.maven-state.outputs.state == 'none'
        id: gate
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for secret_name in \
            ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME \
            ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD \
            SIGNING_GPG_KEY_NAME \
            SIGNING_GPG_PRIVATE_KEY \
            SIGNING_GPG_PASSPHRASE
          do
            if [[ -z "${!secret_name:-}" ]]; then
              echo "Missing ${secret_name} secret"
              missing=1
            fi
          done
          if [[ "$missing" -eq 1 ]]; then
            echo "::error::Missing Maven Central or signing secrets and release modules are not yet published."
            exit 1
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_PASSPHRASE: ${{ secrets.SIGNING_GPG_PASSPHRASE }}

      - name: Import GPG key
        if: steps.maven-state.outputs.state == 'none' && steps.gate.outputs.publish == 'true'
        env:
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
        shell: bash
        run: |
          set -euo pipefail
          if ! printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | gpg --batch --import; then
            printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          fi
          gpg --list-secret-keys --keyid-format=long "$SIGNING_GPG_KEY_NAME"

      - name: Publish to Maven Central
        if: steps.maven-state.outputs.state == 'none' && steps.gate.outputs.publish == 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
          SIGNING_GPG_PASSPHRASE: ${{ secrets.SIGNING_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          signing_args=(-Psigning.gnupg.keyName="$SIGNING_GPG_KEY_NAME")
          if [[ -n "${SIGNING_GPG_PASSPHRASE:-}" ]]; then
            signing_args+=(-Psigning.gnupg.passphrase="$SIGNING_GPG_PASSPHRASE")
          fi
          set +e
          ./scripts/ci-gradle-retry.sh ./gradlew publishAndReleaseToMavenCentral "${signing_args[@]}" \
            -Pkast.publish.target=release \
            -Pversion="${{ needs.prepare-release.outputs.release_version }}" \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace
          publish_exit="$?"
          set -e
          if [[ "$publish_exit" -ne 0 ]]; then
            echo "::warning::Gradle Maven Central publication exited with ${publish_exit}; verifying published coordinates before final Maven verification."
          fi
          set +e
          scripts/verify-maven-central.sh \
            --version "${{ needs.prepare-release.outputs.release_version }}" \
            --attempts 30 \
            --delay-seconds 20
          verify_exit="$?"
          set -e
          if [[ "$verify_exit" -eq 0 && "$publish_exit" -ne 0 ]]; then
            echo "Maven Central verification passed after Gradle exited with ${publish_exit}."
          elif [[ "$verify_exit" -ne 0 ]]; then
            echo "::warning::Maven Central verification did not pass in the publish step; final Maven verification will decide the job result."
          fi

      - name: Verify Maven Central publication
        shell: bash
        run: |
          scripts/verify-maven-central.sh \
            --version "${{ needs.prepare-release.outputs.release_version }}" \
            --attempts 30 \
            --delay-seconds 20

  build-cli:
    name: Build Rust CLI asset (${{ matrix.asset_id }})
    needs: [prepare-release]
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_id: linux-x64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - asset_id: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - asset_id: macos-x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - asset_id: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Rust CLI
        working-directory: cli-rs
        shell: bash
        run: |
          set -euo pipefail
          KAST_VERSION="${{ needs.prepare-release.outputs.release_version }}" \
            cargo build --release --locked --target "${{ matrix.target }}"

      - name: Smoke Rust CLI
        working-directory: cli-rs
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/kast"
          "$bin" --help >/dev/null
          "$bin" version | grep -F "Kast CLI" >/dev/null

      - name: Package CLI asset
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-${tag}-${{ matrix.asset_id }}.zip"
          staging_dir="$RUNNER_TEMP/kast-${{ matrix.asset_id }}"
          rm -rf "$staging_dir" dist
          mkdir -p "$staging_dir" dist
          cp "cli-rs/target/${{ matrix.target }}/release/kast" "$staging_dir/kast"
          chmod 755 "$staging_dir/kast"
          (cd "$staging_dir" && zip -9 -q "$GITHUB_WORKSPACE/dist/${asset_name}" kast)
          python3 - "$GITHUB_WORKSPACE/dist/${asset_name}" "dist/build-provenance-cli-${{ matrix.asset_id }}.json" <<'PY'
          import hashlib
          import json
          import os
          import sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          output = Path(sys.argv[2])
          digest = hashlib.sha256(asset.read_bytes()).hexdigest()
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "cli-${{ matrix.asset_id }}",
              "assetName": asset.name,
              "assetDigest": "sha256:" + digest,
          }
          output.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
          scripts/verify-ci-artifact-ledger.py record \
            --output "dist/build-ledger-cli-${{ matrix.asset_id }}.json" \
            --git-sha "$GITHUB_SHA" \
            --source-ref "refs/tags/${tag}" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind "release-cli-${{ matrix.asset_id }}" \
            --artifact-name "$asset_name" \
            --artifact-path "dist/${asset_name}" \
            --producer-job "build-cli-${{ matrix.asset_id }}" \
            --build-command-id "release-rust-cli-${{ matrix.asset_id }}"

      - name: Upload CLI asset
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger "dist/build-ledger-cli-${{ matrix.asset_id }}.json" \
            --git-sha "$GITHUB_SHA" \
            --require-kind "release-cli-${{ matrix.asset_id }}" \
            --artifact "release-cli-${{ matrix.asset_id }}=dist/kast-${tag}-${{ matrix.asset_id }}.zip"
          .github/scripts/upload-immutable-release-asset.sh \
            --tag "$tag" \
            --asset "dist/kast-${tag}-${{ matrix.asset_id }}.zip"

      - name: Upload CLI build artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: rust-cli-${{ matrix.asset_id }}-${{ github.run_id }}
          path: dist/
          if-no-files-found: warn

  build-idea-plugin:
    name: Build IDEA plugin
    needs: [prepare-release]
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Free disk for IDEA plugin build
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Cache IDEA plugin build inputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/shared-idea-distributions
            ~/.gradle/kast/backend-idea-distributions
          key: release-idea-plugin-inputs-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            release-idea-plugin-inputs-${{ runner.os }}-

      - name: Build unsigned IDEA plugin
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :backend-idea:buildPlugin
          -Pversion="${{ needs.prepare-release.outputs.release_version }}"

      - name: Upload IDEA plugin and update feed
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          version="${{ needs.prepare-release.outputs.release_version }}"
          asset_name="kast-idea-${tag}.zip"
          mapfile -t source_zips < <(
            find backend-idea/build/distributions -maxdepth 1 -name '*.zip' -print | sort
          )
          [[ "${#source_zips[@]}" -eq 1 ]] || {
            echo "Expected exactly one IDEA plugin zip, found ${#source_zips[@]}" >&2
            exit 1
          }
          mkdir -p dist
          asset_path="dist/${asset_name}"
          feed_path="dist/updatePlugins.xml"
          cp "${source_zips[0]}" "$asset_path"
          sed \
            -e "s/#tag#/${tag}/g" \
            -e "s/#version#/${version}/g" \
            packaging/jetbrains/updatePlugins.xml > "$feed_path"
          gh release upload "$tag" "$asset_path" "$feed_path" --clobber

  build-headless-backend:
    name: Build headless backend
    needs: [prepare-release]
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Free disk for headless backend release
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Cache headless backend runtime inputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/shared-idea-distributions
            ~/.gradle/kast/headless-idea-distributions
          key: release-headless-runtime-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            release-headless-runtime-${{ runner.os }}-

      - name: Build headless backend
        run: ./kast.sh build headless -Pversion="${{ needs.prepare-release.outputs.release_version }}"

      - name: Ensure zstd is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zstd
          fi

      - name: Package Gradle read-only dependency cache
        shell: bash
        run: |
          set -euo pipefail
          cache_dir="dist/gradle-ro-cache"
          gradle_user_home="$RUNNER_TEMP/gradle-ro-release-seed"
          rm -rf "$cache_dir"
          mkdir -p "$cache_dir"
          rm -rf "$gradle_user_home"
          mkdir -p "$gradle_user_home"
          GRADLE_USER_HOME="$gradle_user_home" ./scripts/ci-gradle-retry.sh ./gradlew dependencies --no-daemon
          GRADLE_USER_HOME="$gradle_user_home" ./scripts/ci-gradle-retry.sh ./gradlew buildEnvironment --no-daemon
          ./scripts/package-gradle-ro-cache.sh \
            --gradle-user-home "$gradle_user_home" \
            --output "${cache_dir}/gradle-ro-dep-cache.tar.zst"
          (cd "$cache_dir" && sha256sum -c gradle-ro-dep-cache.sha256)
          cache_size="$(wc -c < "${cache_dir}/gradle-ro-dep-cache.tar.zst" | tr -d '[:space:]')"
          if [[ "$cache_size" -gt 2147483647 ]]; then
            echo "Gradle read-only cache artifact is too large for GitHub Releases: ${cache_size} bytes" >&2
            exit 1
          fi
          check_dir="$RUNNER_TEMP/gradle-ro-release-check"
          rm -rf "$check_dir"
          mkdir -p "$check_dir"
          tar --zstd -xf "${cache_dir}/gradle-ro-dep-cache.tar.zst" -C "$check_dir"
          test -d "$check_dir/gradle-ro/modules-2"
          if find "$check_dir/gradle-ro" \( -name '*.lock' -o -name 'gc.properties' \) -print -quit | grep -q .; then
            echo "Gradle read-only cache artifact contains lock or GC metadata" >&2
            exit 1
          fi
          python3 - "${cache_dir}/gradle-ro-dep-cache.tar.zst" "${cache_dir}/build-provenance-gradle-ro-cache.json" <<'PY'
          import hashlib, json, os, sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "gradle-ro-cache",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
          [[ -f dist/headless.zip ]] || { echo "Missing headless backend artifact: dist/headless.zip" >&2; exit 1; }
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/build-ledger-headless-backend.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "refs/tags/${{ needs.prepare-release.outputs.release_tag }}" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind release-headless-backend \
            --artifact-name headless.zip \
            --artifact-path dist/headless.zip \
            --producer-job build-headless-backend \
            --build-command-id release-headless-backend-build
          scripts/verify-ci-artifact-ledger.py record \
            --output "${cache_dir}/build-ledger-gradle-ro-cache.json" \
            --git-sha "$GITHUB_SHA" \
            --source-ref "refs/tags/${{ needs.prepare-release.outputs.release_tag }}" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind release-gradle-ro-cache \
            --artifact-name gradle-ro-dep-cache.tar.zst \
            --artifact-path "${cache_dir}/gradle-ro-dep-cache.tar.zst" \
            --producer-job build-headless-backend \
            --build-command-id release-gradle-ro-cache

      - name: Upload headless backend artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: headless-backend-${{ github.run_id }}
          path: dist/
          if-no-files-found: warn

  build-linux-headless-tarball:
    name: Build Linux headless tarball
    needs:
      - prepare-release
      - build-cli
      - build-headless-backend
      - build-idea-plugin
    if: always() && needs.prepare-release.result == 'success' && needs.build-cli.result == 'success' && needs.build-headless-backend.result == 'success' && needs.build-idea-plugin.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - name: Download headless backend artifact
        uses: actions/download-artifact@v7
        with:
          name: headless-backend-${{ github.run_id }}
          path: headless-backend

      - name: Download Linux CLI release artifact
        uses: actions/download-artifact@v7
        with:
          name: rust-cli-linux-x64-${{ github.run_id }}
          path: release-assets

      - name: Ensure zstd is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zstd
          fi

      - name: Package Linux headless tarball
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          version="${{ needs.prepare-release.outputs.release_version }}"
          cli_asset="release-assets/kast-${tag}-linux-x64.zip"
          backend_asset="headless-backend/headless.zip"
          plugin_asset="release-assets/kast-idea-${tag}.zip"
          gradle_cache_dir="headless-backend/gradle-ro-cache"
          gradle_cache_asset="${gradle_cache_dir}/gradle-ro-dep-cache.tar.zst"
          gradle_cache_sidecar="${gradle_cache_dir}/gradle-ro-dep-cache.sha256"
          gradle_cache_provenance="${gradle_cache_dir}/build-provenance-gradle-ro-cache.json"
          bundle_asset="dist/kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz"
          rm -rf dist
          mkdir -p dist
          [[ -f "$backend_asset" ]] || { echo "Missing headless backend artifact: ${backend_asset}" >&2; exit 1; }
          gh release download "$tag" --pattern "kast-idea-${tag}.zip" --dir release-assets
          [[ -f "$plugin_asset" ]] || { echo "Missing IDEA plugin artifact: ${plugin_asset}" >&2; exit 1; }
          [[ -f "$gradle_cache_asset" ]] || { echo "Missing Gradle read-only cache artifact: ${gradle_cache_asset}" >&2; exit 1; }
          [[ -f "$gradle_cache_sidecar" ]] || { echo "Missing Gradle read-only cache checksum: ${gradle_cache_sidecar}" >&2; exit 1; }
          [[ -f "$gradle_cache_provenance" ]] || { echo "Missing Gradle read-only cache provenance: ${gradle_cache_provenance}" >&2; exit 1; }
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger release-assets/build-ledger-cli-linux-x64.json \
            --ledger headless-backend/build-ledger-headless-backend.json \
            --ledger "${gradle_cache_dir}/build-ledger-gradle-ro-cache.json" \
            --git-sha "$GITHUB_SHA" \
            --require-kind release-cli-linux-x64 \
            --require-kind release-headless-backend \
            --require-kind release-gradle-ro-cache \
            --artifact "release-cli-linux-x64=${cli_asset}" \
            --artifact "release-headless-backend=${backend_asset}" \
            --artifact "release-gradle-ro-cache=${gradle_cache_asset}"
          packager_dir="${RUNNER_TEMP}/kast-release-packager"
          rm -rf "$packager_dir"
          mkdir -p "$packager_dir"
          python3 -m zipfile -e "$cli_asset" "$packager_dir"
          packager_bin="${packager_dir}/kast"
          [[ -f "$packager_bin" ]] || { echo "Missing extracted Rust CLI binary: ${packager_bin}" >&2; exit 1; }
          chmod 755 "$packager_bin"

          "$packager_bin" \
            developer release package ubuntu-debian-bundle \
            --repo-root "$PWD" \
            --cli-archive "$cli_asset" \
            --backend-archive "$backend_asset" \
            --plugin-archive "$plugin_asset" \
            --version "$tag" \
            --bundle-output "$bundle_asset"
          ./scripts/package-headless-runtime.sh \
            --cli-archive "$cli_asset" \
            --backend-archive "$backend_asset" \
            --version "$version" \
            --output "dist/kast-headless-linux-x64.tar.zst" \
            --manifest-output "dist/kast-runtime-manifest.json"
          mkdir -p dist/provenance
          cp "$gradle_cache_asset" dist/gradle-ro-dep-cache.tar.zst
          cp "$gradle_cache_sidecar" dist/gradle-ro-dep-cache.sha256
          cp "$gradle_cache_provenance" dist/provenance/build-provenance-gradle-ro-cache.json
          (cd dist && sha256sum -c gradle-ro-dep-cache.sha256)
          python3 - "$bundle_asset" "dist/provenance/build-provenance-ubuntu-debian-headless.json" <<'PY'
          import hashlib, json, os, sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "ubuntu-debian-headless-x86_64",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
          python3 - "dist/kast-headless-linux-x64.tar.zst" "dist/provenance/build-provenance-headless-linux-x64.json" <<'PY'
          import hashlib, json, os, sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "headless-linux-x64",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
          python3 - "dist/kast-runtime-manifest.json" "dist/provenance/build-provenance-runtime-manifest.json" <<'PY'
          import hashlib, json, os, sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "runtime-manifest",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/build-ledger-ubuntu-debian-headless.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "refs/tags/${tag}" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind release-ubuntu-debian-headless-x86_64 \
            --artifact-name "$(basename -- "$bundle_asset")" \
            --artifact-path "$bundle_asset" \
            --producer-job build-linux-headless-tarball \
            --build-command-id release-ubuntu-debian-headless-package
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/build-ledger-headless-linux-x64.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "refs/tags/${tag}" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind release-headless-linux-x64 \
            --artifact-name kast-headless-linux-x64.tar.zst \
            --artifact-path dist/kast-headless-linux-x64.tar.zst \
            --producer-job build-linux-headless-tarball \
            --build-command-id release-headless-linux-x64-package
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/build-ledger-runtime-manifest.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "refs/tags/${tag}" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind release-runtime-manifest \
            --artifact-name kast-runtime-manifest.json \
            --artifact-path dist/kast-runtime-manifest.json \
            --producer-job build-linux-headless-tarball \
            --build-command-id release-runtime-manifest
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/build-ledger-gradle-ro-cache.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "refs/tags/${tag}" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind release-gradle-ro-cache \
            --artifact-name gradle-ro-dep-cache.tar.zst \
            --artifact-path dist/gradle-ro-dep-cache.tar.zst \
            --producer-job build-linux-headless-tarball \
            --build-command-id release-gradle-ro-cache-promote

      - name: Validate Linux headless tarball
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          for container_image in ubuntu:22.04 ubuntu:24.04; do
            KAST_UBUNTU_DEBIAN_VERSION="$tag" \
            KAST_UBUNTU_DEBIAN_CONTAINER_IMAGE="$container_image" \
            KAST_UBUNTU_DEBIAN_JAVA_VERSION=21 \
            ./scripts/verify-setup-bundle.sh \
              "dist/kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz"
          done
          (cd dist && sha256sum -c kast-headless-linux-x64.sha256)
          (cd dist && sha256sum -c gradle-ro-dep-cache.sha256)
          tar --zstd -tf dist/kast-headless-linux-x64.tar.zst | grep -F './bin/kast'
          rm -rf "$RUNNER_TEMP/gradle-ro-release-check"
          mkdir -p "$RUNNER_TEMP/gradle-ro-release-check"
          tar --zstd -xf dist/gradle-ro-dep-cache.tar.zst -C "$RUNNER_TEMP/gradle-ro-release-check"
          test -d "$RUNNER_TEMP/gradle-ro-release-check/gradle-ro/modules-2"
          if find "$RUNNER_TEMP/gradle-ro-release-check/gradle-ro" \( -name '*.lock' -o -name 'gc.properties' \) -print -quit | grep -q .; then
            echo "Gradle read-only cache artifact contains lock or GC metadata" >&2
            exit 1
          fi
          python3 - dist/kast-runtime-manifest.json dist/kast-headless-linux-x64.tar.zst <<'PY'
          import hashlib, json, sys
          from pathlib import Path
          manifest = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          artifact_sha = hashlib.sha256(Path(sys.argv[2]).read_bytes()).hexdigest()
          if manifest.get("artifactSha256") != artifact_sha:
              raise SystemExit("runtime manifest artifactSha256 does not match tarball")
          PY

      - name: Upload Linux headless tarball
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          bundle_asset="dist/kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz"
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger dist/build-ledger-ubuntu-debian-headless.json \
            --ledger dist/build-ledger-headless-linux-x64.json \
            --ledger dist/build-ledger-runtime-manifest.json \
            --ledger dist/build-ledger-gradle-ro-cache.json \
            --git-sha "$GITHUB_SHA" \
            --require-kind release-ubuntu-debian-headless-x86_64 \
            --require-kind release-headless-linux-x64 \
            --require-kind release-runtime-manifest \
            --require-kind release-gradle-ro-cache \
            --artifact "release-ubuntu-debian-headless-x86_64=${bundle_asset}" \
            --artifact release-headless-linux-x64=dist/kast-headless-linux-x64.tar.zst \
            --artifact release-runtime-manifest=dist/kast-runtime-manifest.json \
            --artifact release-gradle-ro-cache=dist/gradle-ro-dep-cache.tar.zst
          for asset in \
            "$bundle_asset" \
            "${bundle_asset}.sha256" \
            dist/kast-headless-linux-x64.tar.zst \
            dist/kast-headless-linux-x64.sha256 \
            dist/kast-runtime-manifest.json
          do
            .github/scripts/upload-immutable-release-asset.sh \
              --tag "$tag" \
              --asset "$asset"
          done

      - name: Upload Linux headless tarball artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: linux-headless-tarball-${{ github.run_id }}
          path: dist/
          if-no-files-found: warn

  publish-release:
    name: Publish release
    needs:
      - prepare-release
      - validate-jvm
      - build-openapi-spec
      - build-cli
      - build-idea-plugin
      - build-headless-backend
      - build-linux-headless-tarball
    if: always() && needs.prepare-release.result == 'success' && needs.validate-jvm.result == 'success' && needs.build-openapi-spec.result == 'success' && needs.build-cli.result == 'success' && needs.build-idea-plugin.result == 'success' && needs.build-headless-backend.result == 'success' && needs.build-linux-headless-tarball.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download CLI provenance
        uses: actions/download-artifact@v7
        with:
          path: provenance-cli
          pattern: rust-cli-*-${{ github.run_id }}
          merge-multiple: true

      - name: Download Linux headless tarball provenance
        uses: actions/download-artifact@v7
        with:
          path: provenance-linux-headless
          pattern: linux-headless-tarball-*
          merge-multiple: true

      - name: Download OpenAPI provenance
        uses: actions/download-artifact@v7
        with:
          path: provenance-openapi
          pattern: openapi-spec-*
          merge-multiple: true

      - name: Verify release build ledgers
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger provenance-cli/build-ledger-cli-linux-x64.json \
            --ledger provenance-cli/build-ledger-cli-linux-arm64.json \
            --ledger provenance-cli/build-ledger-cli-macos-x64.json \
            --ledger provenance-cli/build-ledger-cli-macos-arm64.json \
            --ledger provenance-linux-headless/build-ledger-ubuntu-debian-headless.json \
            --ledger provenance-linux-headless/build-ledger-headless-linux-x64.json \
            --ledger provenance-linux-headless/build-ledger-runtime-manifest.json \
            --ledger provenance-linux-headless/build-ledger-gradle-ro-cache.json \
            --ledger provenance-openapi/build-ledger-openapi.json \
            --git-sha "$GITHUB_SHA" \
            --require-kind release-cli-linux-x64 \
            --require-kind release-cli-linux-arm64 \
            --require-kind release-cli-macos-x64 \
            --require-kind release-cli-macos-arm64 \
            --require-kind release-ubuntu-debian-headless-x86_64 \
            --require-kind release-headless-linux-x64 \
            --require-kind release-runtime-manifest \
            --require-kind release-gradle-ro-cache \
            --require-kind release-openapi \
            --artifact "release-cli-linux-x64=provenance-cli/kast-${tag}-linux-x64.zip" \
            --artifact "release-cli-linux-arm64=provenance-cli/kast-${tag}-linux-arm64.zip" \
            --artifact "release-cli-macos-x64=provenance-cli/kast-${tag}-macos-x64.zip" \
            --artifact "release-cli-macos-arm64=provenance-cli/kast-${tag}-macos-arm64.zip" \
            --artifact "release-ubuntu-debian-headless-x86_64=provenance-linux-headless/kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz" \
            --artifact "release-headless-linux-x64=provenance-linux-headless/kast-headless-linux-x64.tar.zst" \
            --artifact "release-runtime-manifest=provenance-linux-headless/kast-runtime-manifest.json" \
            --artifact "release-gradle-ro-cache=provenance-linux-headless/gradle-ro-dep-cache.tar.zst" \
            --artifact "release-openapi=provenance-openapi/openapi.yaml"

      - name: Upload Gradle read-only cache release asset
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          cache_asset="provenance-linux-headless/gradle-ro-dep-cache.tar.zst"
          cache_sidecar="provenance-linux-headless/gradle-ro-dep-cache.sha256"
          [[ -f "$cache_asset" ]] || { echo "Missing Gradle read-only cache artifact: ${cache_asset}" >&2; exit 1; }
          [[ -f "$cache_sidecar" ]] || { echo "Missing Gradle read-only cache checksum: ${cache_sidecar}" >&2; exit 1; }
          (cd provenance-linux-headless && sha256sum -c gradle-ro-dep-cache.sha256)
          for asset in "$cache_asset" "$cache_sidecar"; do
            .github/scripts/upload-immutable-release-asset.sh \
              --tag "$tag" \
              --asset "$asset"
          done

      - name: Build and upload setup bundles for every CLI platform
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          source_bundle="provenance-linux-headless/kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz"
          work="$RUNNER_TEMP/kast-setup-bundles"
          rm -rf "$work"
          mkdir -p "$work/source" "$work/backend/backend-headless" "$work/packager"
          tar -xzf "$source_bundle" -C "$work/source"
          source_root="$(find "$work/source" -mindepth 1 -maxdepth 1 -type d -print -quit)"
          backend_root="$(find "$source_root/lib/backends" -mindepth 1 -maxdepth 1 -type d -name 'headless-*' -print -quit)"
          cp -R "$backend_root/." "$work/backend/backend-headless/"
          (cd "$work/backend" && zip -X -0 -q -r "$work/backend.zip" backend-headless)
          gh release download "$tag" --pattern "kast-idea-${tag}.zip" --dir "$work"
          python3 -m zipfile -e "provenance-cli/kast-${tag}-linux-x64.zip" "$work/packager"
          chmod 755 "$work/packager/kast"
          mkdir -p dist/provenance
          for platform in linux-x64 linux-arm64 macos-x64 macos-arm64; do
            asset="dist/kast-${platform}-${tag}.tar.gz"
            "$work/packager/kast" developer release package ubuntu-debian-bundle \
              --repo-root "$PWD" \
              --cli-archive "provenance-cli/kast-${tag}-${platform}.zip" \
              --backend-archive "$work/backend.zip" \
              --plugin-archive "$work/kast-idea-${tag}.zip" \
              --platform "$platform" \
              --version "$tag" \
              --bundle-output "$asset"
            python3 - "$asset" "dist/provenance/build-provenance-setup-${platform}.json" "$platform" <<'PY'
          import hashlib, json, os, sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": f"setup-{sys.argv[3]}",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
            .github/scripts/upload-immutable-release-asset.sh --tag "$tag" --asset "$asset"
            .github/scripts/upload-immutable-release-asset.sh --tag "$tag" --asset "${asset}.sha256"
          done

      - name: Assemble combined provenance
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/assemble-release-provenance.py \
            --output dist/build-provenance.json \
            --tag "${{ needs.prepare-release.outputs.release_tag }}" \
            provenance-cli \
            provenance-linux-headless \
            provenance-openapi \
            dist/provenance

      - name: Upload combined provenance
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          .github/scripts/upload-immutable-release-asset.sh \
            --tag "$tag" \
            --asset dist/build-provenance.json

      - name: Generate and upload SHA256SUMS
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          rm -rf release-assets
          mkdir -p release-assets
          gh release download "$tag" --dir release-assets --pattern '*.zip'
          gh release download "$tag" --dir release-assets --pattern '*.tar.gz' || true
          gh release download "$tag" --dir release-assets --pattern '*.tar.zst' || true
          gh release download "$tag" --dir release-assets --pattern '*.sha256' || true
          gh release download "$tag" --dir release-assets --pattern 'openapi.yaml'
          gh release download "$tag" --dir release-assets --pattern 'kast-runtime-manifest.json'
          gh release download "$tag" --dir release-assets --pattern 'build-provenance.json'
          mapfile -t expected_assets < <(python3 - release-assets/build-provenance.json <<'PY'
          import json
          import sys
          from pathlib import Path
          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          for entry in payload.get("builds", []):
              asset = entry.get("assetName")
              if isinstance(asset, str):
                  print(asset)
          PY
          )
          expected_sidecars=()
          for asset in "${expected_assets[@]}"; do
            if [[ "$asset" == *.tar.gz ]]; then
              expected_sidecars+=("${asset}.sha256")
            elif [[ "$asset" == *.tar.zst ]]; then
              expected_sidecars+=("${asset%.tar.zst}.sha256")
            fi
          done
          for asset in "${expected_assets[@]}"; do
            [[ -f "release-assets/${asset}" ]] || { echo "Missing release asset: ${asset}" >&2; exit 1; }
          done
          for sidecar in "${expected_sidecars[@]}"; do
            [[ -f "release-assets/${sidecar}" ]] || { echo "Missing release checksum sidecar: ${sidecar}" >&2; exit 1; }
          done
          (cd release-assets && sha256sum "${expected_assets[@]}") > SHA256SUMS
          cp SHA256SUMS release-assets/SHA256SUMS
          ./scripts/verify-release-assets.sh --release-dir release-assets --tag "$tag"
          .github/scripts/upload-immutable-release-asset.sh \
            --tag "$tag" \
            --asset SHA256SUMS

      - name: Publish draft release with provenance annotation
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          release_flags=("--draft=false")
          if [[ "$tag" == *-* ]]; then
            release_flags+=(--prerelease)
          else
            release_flags+=(--latest)
          fi
          gh release edit "$tag" "${release_flags[@]}" \
            --notes "$(gh release view "$tag" --json body -q .body)

          ---
          **Build provenance:** [CI Run #${{ github.run_number }}]($run_url)"

  verify-release-state:
    name: Verify published release state
    needs:
      - prepare-release
      - publish-release
    if: always() && needs.prepare-release.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Verify published release state
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ needs.publish-release.result }}" != "success" ]]; then
            echo "::error::Publish release finished with result ${{ needs.publish-release.result }}."
            exit 1
          fi
          scripts/verify-release-state.sh \
            --tag "${{ needs.prepare-release.outputs.release_tag }}" \
            --repository "${{ github.repository }}"
