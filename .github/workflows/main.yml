name: Sync upstream

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Sync from amichne/kast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/amichne/kast.git

      - name: Fetch upstream
        run: git fetch upstream
      - name: Sync main from upstream
        run: |
          git checkout -B main upstream/main
      - name: Push to fork
        run: git push origin main --force
