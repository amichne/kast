name: CI build and test

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & test (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Free disk for headless backend distribution
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Cache IntelliJ runtime distributions
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/headless-idea-distributions
            ~/.gradle/kast/shared-idea-distributions
            ~/.gradle/kast/backend-idea-distributions
          key: intellij-runtime-Linux-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            intellij-runtime-Linux-

      - name: Test JVM backend modules
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :analysis-api:test
          :analysis-server:test
          :backend-shared:compileKotlin
          :backend-headless:test

      - name: Upload build-and-test test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-and-test-reports-ubuntu-latest
          path: |
            **/build/test-results/test/*.xml
            **/build/reports/tests/test/
          if-no-files-found: ignore
          retention-days: 3
