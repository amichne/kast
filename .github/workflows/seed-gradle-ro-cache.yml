name: Seed Gradle read-only dependency cache

on:
  workflow_dispatch:
  schedule:
    - cron: "17 8 * * 1"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: seed-gradle-ro-cache
  cancel-in-progress: true

jobs:
  seed-gradle-ro-cache:
    name: Seed Gradle read-only dependency cache
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-disabled: true

      - name: Ensure zstd is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zstd
          fi

      - name: Warm dependency cache
        shell: bash
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/gradle-ro-seed
        run: |
          set -euo pipefail
          rm -rf "$GRADLE_USER_HOME"
          mkdir -p "$GRADLE_USER_HOME"
          if [[ -x ./.ci/seed-gradle-cache.sh ]]; then
            ./.ci/seed-gradle-cache.sh
          else
            ./scripts/ci-gradle-retry.sh ./gradlew dependencies --no-daemon
            ./scripts/ci-gradle-retry.sh ./gradlew buildEnvironment --no-daemon
          fi
          scripts/package-gradle-ro-cache.sh \
            --gradle-user-home "$GRADLE_USER_HOME" \
            --output dist/gradle-ro-dep-cache.tar.zst

      - name: Verify Gradle cache artifact
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && sha256sum -c gradle-ro-dep-cache.sha256)
          rm -rf "$RUNNER_TEMP/gradle-ro-check"
          mkdir -p "$RUNNER_TEMP/gradle-ro-check"
          tar --zstd -xf dist/gradle-ro-dep-cache.tar.zst -C "$RUNNER_TEMP/gradle-ro-check"
          test -d "$RUNNER_TEMP/gradle-ro-check/gradle-ro/modules-2"
          if find "$RUNNER_TEMP/gradle-ro-check/gradle-ro" \( -name '*.lock' -o -name 'gc.properties' \) -print -quit | grep -q .; then
            echo "Gradle cache artifact contains lock or GC metadata" >&2
            exit 1
          fi

      - name: Upload Gradle read-only dependency cache
        uses: actions/upload-artifact@v6
        with:
          name: gradle-ro-dep-cache
          path: |
            dist/gradle-ro-dep-cache.tar.zst
            dist/gradle-ro-dep-cache.sha256
          if-no-files-found: error
          retention-days: 14
