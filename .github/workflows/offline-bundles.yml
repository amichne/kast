name: Offline Bundles
run-name: Offline bundles ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to package, for example v1.2.3"
        required: true
        type: string
      publish_to_release:
        description: "Append the offline bundle assets to the existing release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: offline-bundles-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build-offline-bundles:
    name: Build offline bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.version }}

      - name: Download and verify release inputs
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.version }}"
          [[ "$tag" == v* ]] || { echo "version must start with v: $tag" >&2; exit 1; }
          gh release view "$tag" >/dev/null
          rm -rf release-assets dist
          mkdir -p release-assets dist
          gh release download "$tag" --dir release-assets --pattern '*.zip'
          gh release download "$tag" --dir release-assets --pattern '*.tar.gz' || true
          gh release download "$tag" --dir release-assets --pattern '*.tar.gz.sha256' || true
          gh release download "$tag" --dir release-assets --pattern 'SHA256SUMS'
          gh release download "$tag" --dir release-assets --pattern 'build-provenance.json'
          ./scripts/verify-release-assets.sh --release-dir release-assets --tag "$tag"

      - name: Package Ubuntu/Debian offline bundle
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.version }}"
          cli_asset="release-assets/kast-${tag}-linux-x64.zip"
          backend_asset="release-assets/kast-headless-${tag}.zip"
          bundle_asset="dist/kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz"
          ./scripts/package-ubuntu-debian-bundle.sh \
            --cli-archive "$cli_asset" \
            --backend-archive "$backend_asset" \
            --version "$tag" \
            --output "$bundle_asset"
          mkdir -p dist/provenance
          python3 - "$bundle_asset" "dist/provenance/build-provenance-ubuntu-debian-headless.json" <<'PY'
          import hashlib, json, os, sys
          from pathlib import Path
          asset = Path(sys.argv[1])
          payload = {
              "runId": os.environ["GITHUB_RUN_ID"],
              "runNumber": os.environ["GITHUB_RUN_NUMBER"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "sha": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "workflowRef": os.environ["GITHUB_WORKFLOW_REF"],
              "actor": os.environ["GITHUB_ACTOR"],
              "platformId": "ubuntu-debian-headless-x86_64",
              "assetName": asset.name,
              "assetDigest": "sha256:" + hashlib.sha256(asset.read_bytes()).hexdigest(),
          }
          Path(sys.argv[2]).write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY

      - name: Validate Ubuntu/Debian offline bundle
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.version }}"
          for container_image in ubuntu:22.04 ubuntu:24.04; do
            KAST_UBUNTU_DEBIAN_VERSION="$tag" \
            KAST_UBUNTU_DEBIAN_CONTAINER_IMAGE="$container_image" \
            KAST_UBUNTU_DEBIAN_JAVA_VERSION=21 \
            BUNDLE_PATH="dist/kast-ubuntu-debian-headless-x86_64-${tag}.tar.gz" \
            ./scripts/validate-ubuntu-debian-bundle-in-docker.sh
          done

      - name: Upload offline bundle artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: offline-bundles-${{ inputs.version }}-${{ github.run_id }}
          path: dist/
          if-no-files-found: warn

      - name: Verify and append offline bundles to release
        if: ${{ inputs.publish_to_release }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || github.token }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          tag="${{ inputs.version }}"
          bundle_files=(dist/*.tar.gz dist/*.tar.gz.sha256)
          [[ "${#bundle_files[@]}" -gt 0 ]] || { echo "No offline bundle assets were built" >&2; exit 1; }
          cp "${bundle_files[@]}" release-assets/
          ./scripts/merge-release-provenance.py \
            --base release-assets/build-provenance.json \
            --output dist/build-provenance.json \
            dist/provenance
          cp dist/build-provenance.json release-assets/build-provenance.json
          mapfile -t expected_assets < <(python3 - release-assets/build-provenance.json <<'PY'
          import json
          import sys
          from pathlib import Path
          payload = json.loads(Path(sys.argv[1]).read_text(encoding="utf-8"))
          for entry in payload.get("builds", []):
              asset = entry.get("assetName")
              if isinstance(asset, str):
                  print(asset)
          PY
          )
          expected_sidecars=()
          for asset in "${expected_assets[@]}"; do
            if [[ "$asset" == *.tar.gz ]]; then
              expected_sidecars+=("${asset}.sha256")
            fi
          done
          for asset in "${expected_assets[@]}"; do
            [[ -f "release-assets/${asset}" ]] || { echo "Missing release asset: ${asset}" >&2; exit 1; }
          done
          for sidecar in "${expected_sidecars[@]}"; do
            [[ -f "release-assets/${sidecar}" ]] || { echo "Missing release checksum sidecar: ${sidecar}" >&2; exit 1; }
          done
          (cd release-assets && sha256sum "${expected_assets[@]}") > release-assets/SHA256SUMS
          ./scripts/verify-release-assets.sh --release-dir release-assets --tag "$tag"
          gh release upload "$tag" "${bundle_files[@]}" release-assets/build-provenance.json release-assets/SHA256SUMS --clobber
