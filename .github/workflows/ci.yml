name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflow-contracts:
    name: Workflow release contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Test release workflow contract
        shell: bash
        run: ./.github/scripts/test-release-workflow-contract.sh

      - name: Test standalone profile workflow contract
        shell: bash
        run: ./.github/scripts/test-standalone-profile-workflow-contract.sh

      - name: Test standalone profile harness contract
        shell: bash
        run: ./.github/scripts/test-standalone-profile-harness-contract.sh

      - name: Test docs navigation contract
        shell: bash
        run: ./.github/scripts/test-docs-navigation-contract.sh

      - name: Test docs content contract
        shell: bash
        run: ./.github/scripts/test-docs-content-contract.sh

      - name: Test workspace repo coordination
        shell: bash
        run: ./.github/scripts/test-workspace-sync-status.sh

      - name: Test release asset verifier
        shell: bash
        run: ./.github/scripts/test-release-asset-verifier.sh

      - name: Test release provenance assembler
        shell: bash
        run: ./.github/scripts/test-release-provenance-assembler.sh

      - name: Test Homebrew package renderer
        shell: bash
        run: packaging/homebrew/scripts/test-formulas.py

      - name: Smoke Ubuntu/Debian bundle contract
        shell: bash
        run: ./scripts/smoke-ubuntu-debian-bundle.sh

      - name: Smoke Ubuntu/Debian headless bundle contract
        shell: bash
        run: ./scripts/smoke-ubuntu-debian-headless-bundle.sh

  maven-publication-contract:
    name: Maven publication metadata
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Publish public modules to Maven local
        run: >
          ./gradlew
          :build-logic:test
          :analysis-api:publishToMavenLocal
          :analysis-server:publishToMavenLocal
          :index-store:publishToMavenLocal
          -Pkast.publish.target=local
          -Pversion=0.0.0-ci

  rust-cli:
    name: Rust CLI
    runs-on: ubuntu-22.04
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check Rust formatting
        working-directory: cli-rs
        run: cargo fmt --all -- --check

      - name: Check Rust lints
        working-directory: cli-rs
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test Rust CLI
        working-directory: cli-rs
        run: cargo test --locked --all-targets --all-features

      - name: Build Rust CLI
        working-directory: cli-rs
        run: KAST_VERSION=0.0.0-ci cargo build --release --locked

      - name: Package Rust CLI CI asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist cli-rs/target/package/kast-v0.0.0-ci-linux-x64
          cp cli-rs/target/release/kast cli-rs/target/package/kast-v0.0.0-ci-linux-x64/kast
          chmod 755 cli-rs/target/package/kast-v0.0.0-ci-linux-x64/kast
          (cd cli-rs/target/package/kast-v0.0.0-ci-linux-x64 && zip -9 -q "$GITHUB_WORKSPACE/dist/kast-v0.0.0-ci-linux-x64.zip" kast)

      - name: Upload Rust CLI CI asset
        uses: actions/upload-artifact@v6
        with:
          name: kast-rust-cli-linux-x64
          path: dist/kast-v0.0.0-ci-linux-x64.zip
          if-no-files-found: error
          retention-days: 1

  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: workflow-contracts
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/intellij-distributions
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Restore standalone daemon distribution cache
        id: standalone-dist-cache
        uses: actions/cache@v5
        with:
          path: backend-standalone/build/distributions
          key: ${{ runner.os }}-standalone-daemon-dist-${{ hashFiles('**/*.gradle.kts', 'gradle/**/*.toml', 'gradle/wrapper/gradle-wrapper.properties', 'gradle.properties', 'build-logic/src/**', 'analysis-api/src/**', 'analysis-server/src/**', 'index-store/src/**', 'backend-shared/src/**', 'backend-standalone/src/**') }}

      - name: Restore headless backend distribution cache
        id: headless-dist-cache
        uses: actions/cache@v5
        with:
          path: backend-headless/build/distributions
          key: ${{ runner.os }}-headless-backend-dist-${{ hashFiles('**/*.gradle.kts', 'gradle/**/*.toml', 'gradle/wrapper/gradle-wrapper.properties', 'gradle.properties', 'build-logic/src/**', 'analysis-api/src/**', 'analysis-server/src/**', 'index-store/src/**', 'backend-shared/src/**', 'backend-intellij/src/**', 'backend-headless/src/**') }}

      - name: Test standalone daemon modules
        run: >
          ./gradlew
          :analysis-api:test
          :analysis-server:test
          :backend-standalone:test
          :backend-headless:test

      - name: Build standalone daemon distribution
        if: steps.standalone-dist-cache.outputs.cache-hit != 'true'
        run: ./gradlew :backend-standalone:portableDistZip

      - name: Build headless backend distribution
        if: steps.headless-dist-cache.outputs.cache-hit != 'true'
        run: ./gradlew :backend-headless:portableDistZip

      - name: Validate cached standalone daemon distribution
        if: steps.standalone-dist-cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -n "$(find backend-standalone/build/distributions -maxdepth 1 -name 'backend-standalone-*-portable.zip' -print -quit)"

      - name: Validate cached headless backend distribution
        if: steps.headless-dist-cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -n "$(find backend-headless/build/distributions -maxdepth 1 -name 'backend-headless-*-portable.zip' -print -quit)"

      - name: Upload build-and-test test reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-and-test-reports-${{ matrix.os }}
          path: |
            **/build/test-results/test/*.xml
            **/build/reports/tests/test/
          if-no-files-found: ignore
          retention-days: 3

      - name: Upload standalone daemon distribution
        uses: actions/upload-artifact@v6
        with:
          name: kast-standalone-${{ matrix.os }}
          path: backend-standalone/build/distributions/backend-standalone-*-portable.zip
          if-no-files-found: error
          retention-days: 1

      - name: Upload headless backend distribution
        uses: actions/upload-artifact@v6
        with:
          name: kast-headless-${{ matrix.os }}
          path: backend-headless/build/distributions/backend-headless-*-portable.zip
          if-no-files-found: error
          retention-days: 1

  install-ubuntu-debian-container:
    name: Ubuntu/Debian install container (${{ matrix.container-image }}, Java ${{ matrix.java-version }})
    runs-on: ubuntu-24.04
    needs:
      - build-and-test
      - rust-cli
    strategy:
      fail-fast: false
      matrix:
        container-image:
          - ubuntu:22.04
          - ubuntu:24.04
        java-version:
          - "21"
    steps:
      - uses: actions/checkout@v5

      - name: Download standalone daemon distribution
        uses: actions/download-artifact@v7
        with:
          name: kast-standalone-ubuntu-latest
          path: backend-standalone/build/distributions

      - name: Download Rust CLI CI asset
        uses: actions/download-artifact@v7
        with:
          name: kast-rust-cli-linux-x64
          path: dist

      - name: Resolve Rust CLI CI asset
        shell: bash
        run: |
          set -euo pipefail
          cli_asset="dist/kast-v0.0.0-ci-linux-x64.zip"
          [[ -f "$cli_asset" ]] || { echo "Missing Rust CLI CI asset: ${cli_asset}" >&2; exit 1; }
          printf 'KAST_RUST_CLI_TAG=%s\n' "v0.0.0-ci" >> "$GITHUB_ENV"
          printf 'KAST_RUST_CLI_ASSET=%s\n' "$cli_asset" >> "$GITHUB_ENV"

      - name: Package Ubuntu/Debian CI bundle
        shell: bash
        run: |
          set -euo pipefail
          backend_asset="$(find backend-standalone/build/distributions -maxdepth 1 -name 'backend-standalone-*-portable.zip' -print -quit)"
          [[ -n "$backend_asset" ]] || { echo "Missing standalone backend portable zip" >&2; exit 1; }
          bundle_asset="dist/kast-ubuntu-debian-x86_64-${KAST_RUST_CLI_TAG}.tar.gz"

          ./scripts/package-ubuntu-debian-bundle.sh \
            --cli-archive "$KAST_RUST_CLI_ASSET" \
            --backend-archive "$backend_asset" \
            --version "$KAST_RUST_CLI_TAG" \
            --output "$bundle_asset"

          printf 'KAST_UBUNTU_DEBIAN_BUNDLE=%s\n' "$bundle_asset" >> "$GITHUB_ENV"

      - name: Validate Ubuntu/Debian bundle in Ubuntu container
        env:
          KAST_UBUNTU_DEBIAN_CONTAINER_IMAGE: ${{ matrix.container-image }}
          KAST_UBUNTU_DEBIAN_JAVA_VERSION: ${{ matrix.java-version }}
        shell: bash
        run: BUNDLE_PATH="$KAST_UBUNTU_DEBIAN_BUNDLE" ./scripts/validate-ubuntu-debian-bundle-in-docker.sh

  install-ubuntu-debian-headless-container:
    name: Ubuntu/Debian headless install container (${{ matrix.container-image }}, Java ${{ matrix.java-version }})
    runs-on: ubuntu-24.04
    needs:
      - build-and-test
      - rust-cli
    strategy:
      fail-fast: false
      matrix:
        container-image:
          - ubuntu:22.04
          - ubuntu:24.04
        java-version:
          - "21"
    steps:
      - uses: actions/checkout@v5

      - name: Download headless backend distribution
        uses: actions/download-artifact@v7
        with:
          name: kast-headless-ubuntu-latest
          path: backend-headless/build/distributions

      - name: Download Rust CLI CI asset
        uses: actions/download-artifact@v7
        with:
          name: kast-rust-cli-linux-x64
          path: dist

      - name: Resolve Rust CLI CI asset
        shell: bash
        run: |
          set -euo pipefail
          cli_asset="dist/kast-v0.0.0-ci-linux-x64.zip"
          [[ -f "$cli_asset" ]] || { echo "Missing Rust CLI CI asset: ${cli_asset}" >&2; exit 1; }
          printf 'KAST_RUST_CLI_TAG=%s\n' "v0.0.0-ci" >> "$GITHUB_ENV"
          printf 'KAST_RUST_CLI_ASSET=%s\n' "$cli_asset" >> "$GITHUB_ENV"

      - name: Package Ubuntu/Debian headless CI bundle
        shell: bash
        run: |
          set -euo pipefail
          backend_asset="$(find backend-headless/build/distributions -maxdepth 1 -name 'backend-headless-*-portable.zip' -print -quit)"
          [[ -n "$backend_asset" ]] || { echo "Missing headless backend portable zip" >&2; exit 1; }
          bundle_asset="dist/kast-ubuntu-debian-headless-x86_64-${KAST_RUST_CLI_TAG}.tar.gz"

          ./scripts/package-ubuntu-debian-headless-bundle.sh \
            --cli-archive "$KAST_RUST_CLI_ASSET" \
            --backend-archive "$backend_asset" \
            --version "$KAST_RUST_CLI_TAG" \
            --output "$bundle_asset"

          printf 'KAST_UBUNTU_DEBIAN_HEADLESS_BUNDLE=%s\n' "$bundle_asset" >> "$GITHUB_ENV"

      - name: Validate Ubuntu/Debian headless bundle in Ubuntu container
        env:
          KAST_UBUNTU_DEBIAN_CONTAINER_IMAGE: ${{ matrix.container-image }}
          KAST_UBUNTU_DEBIAN_JAVA_VERSION: ${{ matrix.java-version }}
        shell: bash
        run: BUNDLE_PATH="$KAST_UBUNTU_DEBIAN_HEADLESS_BUNDLE" ./scripts/validate-ubuntu-debian-headless-bundle-in-docker.sh

  analysis-server-transport:
    name: Analysis server transport
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Smoke analysis-server socket transport
        run: >
          ./gradlew
          :analysis-server:test
          --tests io.github.amichne.kast.server.AnalysisServerSocketTest

  test-intellij-plugin:
    name: IDEA plugin
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/intellij-distributions
            ~/.cache/pluginVerifier/ides
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Restore IDEA plugin distribution cache
        id: intellij-plugin-dist-cache
        uses: actions/cache@v5
        with:
          path: backend-intellij/build/distributions
          key: ${{ runner.os }}-intellij-plugin-dist-${{ hashFiles('**/*.gradle.kts', 'gradle/**/*.toml', 'gradle/wrapper/gradle-wrapper.properties', 'gradle.properties', 'build-logic/src/**', 'analysis-api/src/**', 'analysis-server/src/**', 'index-store/src/**', 'backend-shared/src/**', 'backend-intellij/src/**') }}

      - name: Test IDEA plugin
        run: >
          ./gradlew
          :backend-intellij:test
          -PexcludeTags=performance

      - name: Build and verify IDEA plugin distribution
        if: steps.intellij-plugin-dist-cache.outputs.cache-hit != 'true'
        run: >
          ./gradlew
          :backend-intellij:buildPlugin
          :backend-intellij:verifyPluginStructure
          :backend-intellij:verifyPluginXmlPresent
          :backend-intellij:verifyPlugin

      - name: Validate cached IDEA plugin distribution
        if: steps.intellij-plugin-dist-cache.outputs.cache-hit == 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -n "$(find backend-intellij/build/distributions -maxdepth 1 -name '*.zip' -print -quit)"

      - name: Upload IDEA plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: kast-intellij-plugin
          path: backend-intellij/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 1

      - name: Run IDEA plugin performance baselines
        run: ./gradlew :backend-intellij:test -PincludeTags=performance

  smoke-standalone-daemon:
    name: Smoke standalone daemon (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Download standalone daemon distribution
        uses: actions/download-artifact@v7
        with:
          name: kast-standalone-${{ matrix.os }}
          path: backend-standalone/build/distributions

      - name: Smoke standalone daemon distribution
        shell: bash
        run: |
          set -euo pipefail
          dist_dir="$RUNNER_TEMP/kast-dist"
          rm -rf "$dist_dir"
          mkdir -p "$dist_dir"
          unzip -q backend-standalone/build/distributions/backend-standalone-*-portable.zip -d "$dist_dir"
          test -x "$dist_dir/backend-standalone/kast-standalone"
          test -f "$dist_dir/backend-standalone/runtime-libs/classpath.txt"
