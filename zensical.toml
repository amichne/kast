[project]
site_name = "Kast"
site_description = """
IDE-grade Kotlin code intelligence for terminals, CI, and IDEs.
"""
site_author = "amichne"
site_url = "https://kast.michne.com/"
repo_url = "https://github.com/amichne/kast"
repo_name = "amichne/kast"
edit_uri = "edit/main/docs"
docs_dir = "docs"
site_dir = "site"
copyright = """
Copyright &copy; 2026 amichne
"""
nav = [
  { "Overview" = "index.md" },
  { "Install" = [
    { "Developer machine" = "getting-started/install.md" },
    { "Headless Linux server" = "getting-started/headless-linux.md" },
  ]},
  { "Quickstart" = "getting-started/quickstart.md" },
  { "Commands" = [
    { "Overview" = "commands/index.md" },
    { "Lifecycle" = "commands/lifecycle.md" },
    { "Install and repair" = "commands/install-repair.md" },
    { "Repository demo" = "commands/demo.md" },
    { "Agent automation" = "commands/agent.md" },
    { "Metrics" = "commands/metrics.md" },
    { "LSP" = "commands/lsp.md" },
  ]},
  { "Recipes" = "recipes.md" },
  { "Troubleshooting" = "troubleshooting.md" },
  { "Distribution" = "distribution/runtime-artifact-contract.md" },
]

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
[project.markdown_extensions.pymdownx.tabbed.slugify]
object = "pymdownx.slugs.slugify"
kwds = { case = "lower" }

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "material.extensions.emoji.twemoji"
emoji_generator = "material.extensions.emoji.to_svg"

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.theme]
language = "en"
features = [
  "content.action.edit",
  "content.action.view",
  "content.code.copy",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.icon]
logo = "lucide/network"
repo = "fontawesome/brands/github"
edit = "material/file-edit-outline"
view = "material/file-eye-outline"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
