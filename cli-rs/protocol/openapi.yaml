          "$ref": "#/components/schemas/WorkspaceFilesPublicContinuationIdentity"
        pageToken:
          "$ref": "#/components/schemas/WorkspaceFilesPublicPageToken"
      additionalProperties: false
      required:
        - action
        - identity
        - pageToken
