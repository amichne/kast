# Workspace coordination manifest for generated or mirrored repositories that
# move with Kast but are not part of this Git history.

[repos.kast]
path = "."
remote = "git@github.com:amichne/kast.git"
branch = "main"
role = "JVM daemon, IDEA plugin, JSON-RPC contract, docs, and release assembly"

[repos.homebrew-kast]
path = "../homebrew-kast"
remote = "git@github.com:amichne/homebrew-kast.git"
branch = "main"
role = "Generated Homebrew tap mirror for Kast release artifacts"
