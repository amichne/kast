      type: string
      minLength: 1
    BackendName:
      type: string
      minLength: 1
    NormalizedQuery:
      type: string
      minLength: 1
    Projection:
      type: string
      minLength: 1
    Limit:
      type: integer
      format: int32
      minimum: 1
      maximum: 200
    WorkspaceFilesPublicContinuationState:
      type: object
      properties:
        identity:
          "$ref": "#/components/schemas/WorkspaceFilesPublicContinuationIdentity"
        compositionStampDigest:
          "$ref": "#/components/schemas/CompositionStampDigest"
        lastRelativePath:
          "$ref": "#/components/schemas/LastRelativePath"
        cumulativeReturnedCount:
          "$ref": "#/components/schemas/CumulativeReturnedCount"
      additionalProperties: false
      required:
        - identity
        - compositionStampDigest
        - lastRelativePath
        - cumulativeReturnedCount
    CompositionStampDigest:
      type: string
      minLength: 64
      maxLength: 64
      pattern: "^[0-9a-f]{64}$"
    LastRelativePath:
      type: string
      minLength: 1
      pattern: "^(?!/)(?![A-Za-z]:)(?![.]{1,2}(?:/|$))(?!.*(?:/)[.]{1,2}(?:/|$))(?!.*//)[^\\\\\\u0000-\\u001F\\u007F-\\u009F]+$"
    CumulativeReturnedCount:
      type: integer
      format: int32
      minimum: 0
