name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-contracts:
    name: Workflow release contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Capture immutable local source snapshot
        shell: bash
        run: |
          set -euo pipefail
          scripts/capture-local-source-snapshot.py \
            --source-root "$GITHUB_WORKSPACE" \
            --output-file dist/local-source/source-snapshot.json \
            >/dev/null
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/ci-ledgers/local-source-snapshot.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind ci-local-source-snapshot \
            --artifact-name kast-local-source-snapshot \
            --artifact-path dist/local-source/source-snapshot.json \
            --producer-job workflow-contracts \
            --build-command-id ci-static-local-source-snapshot

      - name: Upload immutable local source snapshot
        uses: actions/upload-artifact@v6
        with:
          name: kast-local-source-snapshot
          path: dist/local-source/source-snapshot.json
          if-no-files-found: error
          retention-days: 3

      - name: Upload immutable local source snapshot ledger
        uses: actions/upload-artifact@v6
        with:
          name: ci-artifact-ledger-local-source-snapshot
          path: dist/ci-ledgers/local-source-snapshot.json
          if-no-files-found: error
          retention-days: 3

      - name: Test release workflow contract
        shell: bash
        run: ./.github/scripts/test-release-workflow-contract.sh

      - name: Test CI workflow graph model
        shell: bash
        run: ./.github/scripts/test-ci-workflow-model.sh

      - name: Test JetBrains plugin repository contract
        shell: bash
        run: ./.github/scripts/test-jetbrains-plugin-repository-contract.sh

      - name: Test Kast build contract
        shell: bash
        run: ./.github/scripts/test-kast-build-contract.sh

      - name: Test docs navigation contract
        shell: bash
        run: ./.github/scripts/test-docs-navigation-contract.sh

      - name: Test docs content contract
        shell: bash
        run: ./.github/scripts/test-docs-content-contract.sh

      - name: Test macOS installer contract
        shell: bash
        run: ./.github/scripts/test-macos-installer-contract.sh

      - name: Test Kast routing evals
        shell: bash
        run: ./.github/scripts/test-kast-routing-evals.sh

      - name: Test release asset verifier
        shell: bash
        run: ./.github/scripts/test-release-asset-verifier.sh

      - name: Test release provenance assembler
        shell: bash
        run: ./.github/scripts/test-release-provenance-assembler.sh

      - name: Test Codex plugin package contract
        shell: bash
        run: ./.github/scripts/test-codex-plugin-package-contract.sh

      - name: Test CI artifact ledger
        shell: bash
        run: ./.github/scripts/test-ci-artifact-ledger.sh

      - name: Ensure zstd is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zstd
          fi

      - name: Test headless runtime packagers
        shell: bash
        run: ./.github/scripts/test-headless-runtime-packagers.sh

      - name: Test CI Gradle retry helper
        shell: bash
        run: ./.github/scripts/test-ci-gradle-retry.sh

      - name: Test Homebrew package renderer
        shell: bash
        run: packaging/homebrew/scripts/test-formulas.py

  local-authority-contracts:
    name: Local development authority contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Install Rust for local-authority contracts
        uses: dtolnay/rust-toolchain@stable

      - name: Cache local-authority Rust builds
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: cli-rs -> target
          cache-bin: "false"
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test local development refresh contract
        shell: bash
        run: ./.github/scripts/test-local-development-refresh-contract.sh

      - name: Test development CLI and IDEA profile install contract
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: ./.github/scripts/test-development-cli-install-contract.sh

      - name: Test CLI and plugin authority cutover contract
        shell: bash
        run: ./.github/scripts/test-cli-plugin-authority-cutover-contract.sh

  runtime-contracts:
    name: Runtime command and bundle contracts
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test terminal command contract
        shell: bash
        run: ./.github/scripts/test-terminal-command-contract.sh

      - name: Test Kast Copilot plugin package
        shell: bash
        run: ./.github/scripts/test-kast-copilot-plugin.sh

      - name: Smoke Ubuntu/Debian bundle contract
        shell: bash
        run: ./scripts/smoke-ubuntu-debian-bundle.sh

  runtime-compatibility-contract:
    name: Runtime compatibility matrix
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - name: Test runtime compatibility contract
        shell: bash
        run: ./.github/scripts/test-runtime-compatibility-contract.sh

  maven-publication-contract:
    name: Maven publication metadata
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Publish public modules to Maven local
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :build-logic:test
          :analysis-api:publishToMavenLocal
          :analysis-server:publishToMavenLocal
          :index-store:publishToMavenLocal
          -Pkast.publish.target=local
          -Pversion=0.0.0-ci

      - name: Record Maven publication validation ledger
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ci-ledgers
          printf 'gitSha=%s\nsourceRef=%s\nworkflowRunId=%s\n' \
            "$GITHUB_SHA" \
            "$GITHUB_REF" \
            "$GITHUB_RUN_ID" \
            > dist/ci-ledgers/maven-publication-validation.txt
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/ci-ledgers/maven-publication.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind ci-maven-publication-validation \
            --artifact-name ci-maven-publication-validation \
            --artifact-path dist/ci-ledgers/maven-publication-validation.txt \
            --producer-job maven-publication-contract \
            --build-command-id ci-maven-publish-to-local

      - name: Upload Maven publication validation ledger
        uses: actions/upload-artifact@v6
        with:
          name: ci-artifact-ledger-maven-publication
          path: dist/ci-ledgers/maven-publication.json
          if-no-files-found: error
          retention-days: 3

  rust-cli:
    name: Rust CLI
    runs-on: ubuntu-22.04
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust validation builds
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: cli-rs -> target
          shared-key: rust-cli-validation
          cache-bin: "false"

      - name: Check Rust formatting
        working-directory: cli-rs
        run: cargo fmt --all -- --check

      - name: Check Rust lints
        working-directory: cli-rs
        run: cargo clippy --locked --all-targets --all-features -- -D warnings

      - name: Test Rust CLI
        working-directory: cli-rs
        run: cargo test --locked --all-targets --all-features

      - name: Check generated Codex plugin assets
        shell: bash
        run: cargo run --manifest-path cli-rs/Cargo.toml --locked --bin kast -- developer codex generate --check

  source-bound-cli:
    name: Source-bound release CLI
    runs-on: ubuntu-22.04
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - name: Download local source snapshot
        uses: actions/download-artifact@v7
        with:
          name: kast-local-source-snapshot
          path: build/ci-inputs

      - name: Download local source snapshot ledger
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-local-source-snapshot
          path: build/ci-input-ledgers

      - name: Verify local source snapshot
        id: local-source-snapshot
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger build/ci-input-ledgers/local-source-snapshot.json \
            --git-sha "$GITHUB_SHA" \
            --require-kind ci-local-source-snapshot \
            --artifact ci-local-source-snapshot=build/ci-inputs/source-snapshot.json
          source_sha256="$(python3 -c 'import json; from pathlib import Path; print(json.loads(Path("build/ci-inputs/source-snapshot.json").read_text(encoding="utf-8"))["sourceTreeSha256"])')"
          printf 'source_sha256=%s\n' "$source_sha256" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache source-bound release build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: cli-rs -> target
          shared-key: source-bound-cli-release
          cache-bin: "false"

      - name: Build Rust CLI
        working-directory: cli-rs
        run: >
          KAST_VERSION=0.0.0-ci
          KAST_LOCAL_SOURCE_SHA256="${{ steps.local-source-snapshot.outputs.source_sha256 }}"
          cargo build --release --locked

      - name: Validate generated CLI contracts
        run: cli-rs/target/release/kast developer release generate contract --check

      - name: Package Codex plugin CI asset
        shell: bash
        run: |
          set -euo pipefail
          staging_dir="$RUNNER_TEMP/kast-codex-plugin-ci"
          asset_name="kast-codex-plugin-v0.0.0-ci.zip"
          rm -rf "$staging_dir"
          mkdir -p "$staging_dir" dist/ci-ledgers
          cli-rs/target/release/kast developer codex generate \
            --release \
            --output-dir "$staging_dir"
          (cd "$staging_dir" && zip -X -9 -q -r "$GITHUB_WORKSPACE/dist/${asset_name}" marketplace.json .agents/plugins/marketplace.json plugins/kast)
          .github/scripts/verify-codex-plugin-package.py \
            --archive "dist/${asset_name}" \
            --version 0.0.0-ci
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/ci-ledgers/codex-plugin.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind ci-codex-plugin \
            --artifact-name kast-codex-plugin \
            --artifact-path "dist/${asset_name}" \
            --producer-job source-bound-cli \
            --build-command-id ci-codex-plugin-generate

      - name: Test LSP config smoke
        shell: bash
        run: >
          KAST_LSP_TEST_COMMAND="$GITHUB_WORKSPACE/cli-rs/target/release/kast"
          KAST_LSP_REQUEST_TIMEOUT_MS=1000
          node ./.github/scripts/test-lsp-config.mjs

      - name: Test LSP pivot gates
        shell: bash
        run: >
          KAST_LSP_TEST_COMMAND="$GITHUB_WORKSPACE/cli-rs/target/release/kast"
          KAST_LSP_REQUEST_TIMEOUT_MS=1000
          ./.github/scripts/test-lsp-pivot-gates.sh

      - name: Package Rust CLI CI asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist cli-rs/target/package/kast-v0.0.0-ci-linux-x64
          cp cli-rs/target/release/kast cli-rs/target/package/kast-v0.0.0-ci-linux-x64/kast
          chmod 755 cli-rs/target/package/kast-v0.0.0-ci-linux-x64/kast
          (cd cli-rs/target/package/kast-v0.0.0-ci-linux-x64 && zip -9 -q "$GITHUB_WORKSPACE/dist/kast-v0.0.0-ci-linux-x64.zip" kast)
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/ci-ledgers/rust-cli-linux-x64.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind ci-rust-cli-linux-x64 \
            --artifact-name kast-rust-cli-linux-x64 \
            --artifact-path dist/kast-v0.0.0-ci-linux-x64.zip \
            --producer-job source-bound-cli \
            --build-command-id ci-rust-cli-release-build

      - name: Upload Rust CLI CI asset
        uses: actions/upload-artifact@v6
        with:
          name: kast-rust-cli-linux-x64
          path: dist/kast-v0.0.0-ci-linux-x64.zip
          if-no-files-found: error
          retention-days: 1

      - name: Upload Rust CLI CI ledger
        uses: actions/upload-artifact@v6
        with:
          name: ci-artifact-ledger-rust-cli-linux-x64
          path: dist/ci-ledgers/rust-cli-linux-x64.json
          if-no-files-found: error
          retention-days: 3

      - name: Upload Codex plugin CI asset
        uses: actions/upload-artifact@v6
        with:
          name: kast-codex-plugin
          path: dist/kast-codex-plugin-v0.0.0-ci.zip
          if-no-files-found: error
          retention-days: 1

      - name: Upload Codex plugin CI ledger
        uses: actions/upload-artifact@v6
        with:
          name: ci-artifact-ledger-codex-plugin
          path: dist/ci-ledgers/codex-plugin.json
          if-no-files-found: error
          retention-days: 3

  build-and-test-linux:
    name: Build & test (ubuntu-latest)
    needs: workflow-contracts
    uses: ./.github/workflows/ci-build-and-test.yml
    with:
      runner: ubuntu-latest

  build-and-test-macos:
    name: Build & test (macos-latest)
    needs: workflow-contracts
    uses: ./.github/workflows/ci-build-and-test.yml
    with:
      runner: macos-latest

  prepared-generation:
    name: Prepared source-attested generation
    runs-on: ubuntu-24.04
    needs:
      - workflow-contracts
      - source-bound-cli
      - source-bound-headless-backend
    steps:
      - uses: actions/checkout@v5

      - name: Ensure zstd is available for prepared generation packaging
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zstd
          fi

      - name: Download local source snapshot
        uses: actions/download-artifact@v7
        with:
          name: kast-local-source-snapshot
          path: build/ci-inputs

      - name: Download local source snapshot ledger
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-local-source-snapshot
          path: build/ci-input-ledgers

      - name: Download Rust CLI CI asset
        uses: actions/download-artifact@v7
        with:
          name: kast-rust-cli-linux-x64
          path: build/ci-inputs

      - name: Download Rust CLI CI ledger
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-rust-cli-linux-x64
          path: build/ci-input-ledgers

      - name: Download source-bound headless backend
        uses: actions/download-artifact@v7
        with:
          name: kast-headless-ubuntu-latest
          path: build/ci-inputs

      - name: Download source-bound headless backend ledger
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-headless-ubuntu-latest
          path: build/ci-input-ledgers

      - name: Verify generation producer inputs
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger build/ci-input-ledgers/local-source-snapshot.json \
            --ledger build/ci-input-ledgers/rust-cli-linux-x64.json \
            --ledger build/ci-input-ledgers/headless-ubuntu-latest.json \
            --git-sha "$GITHUB_SHA" \
            --require-kind ci-local-source-snapshot \
            --require-kind ci-rust-cli-linux-x64 \
            --require-kind ci-headless-ubuntu-latest \
            --artifact ci-local-source-snapshot=build/ci-inputs/source-snapshot.json \
            --artifact ci-rust-cli-linux-x64=build/ci-inputs/kast-v0.0.0-ci-linux-x64.zip \
            --artifact ci-headless-ubuntu-latest=build/ci-inputs/kast-local-source-bound-backend.zip

      - name: Assemble and package prepared generation
        shell: bash
        run: |
          set -euo pipefail
          scripts/assemble-prepared-local-generation.sh \
            --source-root "$GITHUB_WORKSPACE" \
            --source-snapshot build/ci-inputs/source-snapshot.json \
            --cli-archive build/ci-inputs/kast-v0.0.0-ci-linux-x64.zip \
            --backend-archive build/ci-inputs/kast-local-source-bound-backend.zip \
            --prepared-generation build/ci-prepared-generation \
            --output dist/kast-local-prepared-generation.tar.zst

      - name: Record prepared generation output ledgers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ci-ledgers/prepared-generation
          record_output() {
            local kind="$1"
            local name="$2"
            local path="$3"
            local command_id="$4"
            scripts/verify-ci-artifact-ledger.py record \
              --output "dist/ci-ledgers/prepared-generation/${kind}.json" \
              --git-sha "$GITHUB_SHA" \
              --source-ref "$GITHUB_REF" \
              --workflow-run-id "$GITHUB_RUN_ID" \
              --artifact-kind "$kind" \
              --artifact-name "$name" \
              --artifact-path "$path" \
              --producer-job prepared-generation \
              --build-command-id "$command_id"
          }
          record_output ci-prepared-local-generation kast-prepared-local-generation \
            dist/kast-local-prepared-generation.tar.zst ci-assemble-prepared-local-generation

      - name: Upload prepared local generation
        uses: actions/upload-artifact@v6
        with:
          name: kast-prepared-local-generation
          path: |
            dist/kast-local-prepared-generation.tar.zst
            dist/kast-local-prepared-generation.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

      - name: Upload prepared generation ledgers
        uses: actions/upload-artifact@v6
        with:
          name: ci-artifact-ledger-prepared-generation
          path: dist/ci-ledgers/prepared-generation
          if-no-files-found: error
          retention-days: 3

  prepared-ubuntu-debian-bundle:
    name: Prepared Ubuntu and Debian bundle
    runs-on: ubuntu-24.04
    needs:
      - prepared-generation
    steps:
      - uses: actions/checkout@v5

      - name: Ensure zstd is available for prepared generation extraction
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zstd
          fi

      - name: Download prepared local generation
        uses: actions/download-artifact@v7
        with:
          name: kast-prepared-local-generation
          path: ${{ runner.temp }}/kast-prepared-generation

      - name: Download prepared generation ledger
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-prepared-generation
          path: ${{ runner.temp }}/kast-prepared-generation-ledger

      - name: Verify prepared generation input
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger "$RUNNER_TEMP/kast-prepared-generation-ledger/ci-prepared-local-generation.json" \
            --git-sha "$GITHUB_SHA" \
            --require-kind ci-prepared-local-generation \
            --artifact "ci-prepared-local-generation=$RUNNER_TEMP/kast-prepared-generation/kast-local-prepared-generation.tar.zst"
          (cd "$RUNNER_TEMP/kast-prepared-generation" && sha256sum -c kast-local-prepared-generation.sha256)

      - name: Package prepared Ubuntu and Debian bundle
        shell: bash
        run: |
          set -euo pipefail
          KAST_UBUNTU_DEBIAN_CI_BUNDLE_TAG="v0.7.11-ci"
          printf 'KAST_UBUNTU_DEBIAN_CI_BUNDLE_TAG=%s\n' "$KAST_UBUNTU_DEBIAN_CI_BUNDLE_TAG" >> "$GITHUB_ENV"
          scripts/package-prepared-local-generation-derivatives.sh \
            --kind ubuntu-debian-bundle \
            --source-root "$GITHUB_WORKSPACE" \
            --prepared-generation-archive "$RUNNER_TEMP/kast-prepared-generation/kast-local-prepared-generation.tar.zst" \
            --dist-directory dist \
            --bundle-version "$KAST_UBUNTU_DEBIAN_CI_BUNDLE_TAG"

      - name: Record prepared bundle ledger
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ci-ledgers/prepared-ubuntu-debian-bundle
          record_output() {
            local kind="$1"
            local name="$2"
            local path="$3"
            local command_id="$4"
            scripts/verify-ci-artifact-ledger.py record \
              --output "dist/ci-ledgers/prepared-ubuntu-debian-bundle/${kind}.json" \
              --git-sha "$GITHUB_SHA" \
              --source-ref "$GITHUB_REF" \
              --workflow-run-id "$GITHUB_RUN_ID" \
              --artifact-kind "$kind" \
              --artifact-name "$name" \
              --artifact-path "$path" \
              --producer-job prepared-ubuntu-debian-bundle \
              --build-command-id "$command_id"
          }
          record_output ci-ubuntu-debian-bundle kast-ubuntu-debian-ci-bundle \
            "dist/kast-ubuntu-debian-headless-x86_64-${KAST_UBUNTU_DEBIAN_CI_BUNDLE_TAG}.tar.gz" ci-package-ubuntu-debian-bundle

      - name: Upload prepared Ubuntu and Debian bundle
        uses: actions/upload-artifact@v6
        with:
          name: kast-ubuntu-debian-ci-bundle
          path: |
            dist/kast-ubuntu-debian-headless-x86_64-v0.7.11-ci.tar.gz
            dist/kast-ubuntu-debian-headless-x86_64-v0.7.11-ci.tar.gz.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

      - name: Upload prepared bundle ledger
        uses: actions/upload-artifact@v6
        with:
          name: ci-artifact-ledger-prepared-ubuntu-debian-bundle
          path: dist/ci-ledgers/prepared-ubuntu-debian-bundle
          if-no-files-found: error
          retention-days: 3

  source-bound-headless-backend:
    name: Source-bound headless backend
    runs-on: ubuntu-24.04
    needs:
      - workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - name: Download local source snapshot
        uses: actions/download-artifact@v7
        with:
          name: kast-local-source-snapshot
          path: build/ci-inputs

      - name: Download local source snapshot ledger
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-local-source-snapshot
          path: build/ci-input-ledgers

      - name: Verify local source snapshot
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger build/ci-input-ledgers/local-source-snapshot.json \
            --git-sha "$GITHUB_SHA" \
            --require-kind ci-local-source-snapshot \
            --artifact ci-local-source-snapshot=build/ci-inputs/source-snapshot.json

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Cache source-bound IntelliJ runtime distribution
        uses: actions/cache@v5
        with:
          path: ~/.gradle/kast/headless-idea-distributions
          key: intellij-runtime-Linux-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            intellij-runtime-Linux-

      - name: Build source-bound headless backend distribution
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          packageSourceBoundDevelopmentBackend
          -PkastLocalSourceSnapshot=build/ci-inputs/source-snapshot.json
          -PkastHeadlessIdeaHomeProfile=agent

      - name: Assert source-bound distribution excludes fat jar
        shell: bash
        run: |
          set -euo pipefail
          if find backend-headless/build/portable-dist -name '*-all.jar' -print -quit | grep -q .; then
            echo "Source-bound headless distribution must not contain fat jars" >&2
            find backend-headless/build/portable-dist -name '*-all.jar' -print >&2
            exit 1
          fi

      - name: Upload source-bound headless backend distribution
        uses: actions/upload-artifact@v6
        with:
          name: kast-headless-ubuntu-latest
          path: build/distributions/kast-local-source-bound-backend.zip
          if-no-files-found: error
          compression-level: 0
          retention-days: 1

      - name: Record source-bound headless backend ledger
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ci-ledgers
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/ci-ledgers/headless-ubuntu-latest.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind ci-headless-ubuntu-latest \
            --artifact-name kast-headless-ubuntu-latest \
            --artifact-path build/distributions/kast-local-source-bound-backend.zip \
            --producer-job source-bound-headless-backend \
            --build-command-id ci-headless-source-bound-development

      - name: Upload source-bound headless backend ledger
        uses: actions/upload-artifact@v6
        with:
          name: ci-artifact-ledger-headless-ubuntu-latest
          path: dist/ci-ledgers/headless-ubuntu-latest.json
          if-no-files-found: error
          retention-days: 3

  install-ubuntu-debian-container:
    name: Ubuntu/Debian install container (${{ matrix.container-image }}, Java ${{ matrix.java-version }})
    runs-on: ubuntu-24.04
    needs:
      - prepared-ubuntu-debian-bundle
    strategy:
      fail-fast: false
      matrix:
        container-image:
          - ubuntu:22.04
          - ubuntu:24.04
        java-version:
          - "21"
    steps:
      - uses: actions/checkout@v5

      - name: Download prepared Ubuntu and Debian bundle
        uses: actions/download-artifact@v7
        with:
          name: kast-ubuntu-debian-ci-bundle
          path: dist

      - name: Download prepared generation ledgers
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-prepared-ubuntu-debian-bundle
          path: ci-ledgers

      - name: Verify prepared Ubuntu and Debian bundle
        shell: bash
        run: |
          set -euo pipefail
          bundle_asset="dist/kast-ubuntu-debian-headless-x86_64-v0.7.11-ci.tar.gz"
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger ci-ledgers/ci-ubuntu-debian-bundle.json \
            --git-sha "$GITHUB_SHA" \
            --require-kind ci-ubuntu-debian-bundle \
            --artifact "ci-ubuntu-debian-bundle=${bundle_asset}"
          printf 'KAST_UBUNTU_DEBIAN_BUNDLE=%s\n' "$bundle_asset" >> "$GITHUB_ENV"

      - name: Validate Ubuntu/Debian bundle in Ubuntu container
        env:
          KAST_UBUNTU_DEBIAN_CONTAINER_IMAGE: ${{ matrix.container-image }}
          KAST_UBUNTU_DEBIAN_JAVA_VERSION: ${{ matrix.java-version }}
        shell: bash
        run: BUNDLE_PATH="$KAST_UBUNTU_DEBIAN_BUNDLE" ./scripts/validate-ubuntu-debian-bundle-in-docker.sh

  kast-action-runtime-contract:
    name: kast-action runtime contract
    runs-on: ubuntu-latest
    needs:
      - prepared-generation
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Ensure zstd is available
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zstd
          fi

      - name: Download prepared local generation
        uses: actions/download-artifact@v7
        with:
          name: kast-prepared-local-generation
          path: ${{ runner.temp }}/kast-prepared-generation

      - name: Download prepared generation ledger
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-prepared-generation
          path: ${{ runner.temp }}/kast-prepared-generation-ledger

      - name: Verify prepared generation input
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger "$RUNNER_TEMP/kast-prepared-generation-ledger/ci-prepared-local-generation.json" \
            --git-sha "$GITHUB_SHA" \
            --require-kind ci-prepared-local-generation \
            --artifact "ci-prepared-local-generation=$RUNNER_TEMP/kast-prepared-generation/kast-local-prepared-generation.tar.zst"
          (cd "$RUNNER_TEMP/kast-prepared-generation" && sha256sum -c kast-local-prepared-generation.sha256)

      - name: Package prepared kast-action runtime inputs
        shell: bash
        run: |
          set -euo pipefail
          runtime_version="$(python3 -c 'import json; from pathlib import Path; print(json.loads(Path("packaging/homebrew/release-state.json").read_text(encoding="utf-8"))["current_release"].removeprefix("v"))')"
          scripts/package-prepared-local-generation-derivatives.sh \
            --kind kast-action-runtime \
            --source-root "$GITHUB_WORKSPACE" \
            --prepared-generation-archive "$RUNNER_TEMP/kast-prepared-generation/kast-local-prepared-generation.tar.zst" \
            --dist-directory dist \
            --runtime-version "$runtime_version"

      - name: Record prepared kast-action runtime ledgers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ci-ledgers/kast-action-runtime
          record_output() {
            local kind="$1"
            local path="$2"
            local command_id="$3"
            scripts/verify-ci-artifact-ledger.py record \
              --output "dist/ci-ledgers/kast-action-runtime/${kind}.json" \
              --git-sha "$GITHUB_SHA" \
              --source-ref "$GITHUB_REF" \
              --workflow-run-id "$GITHUB_RUN_ID" \
              --artifact-kind "$kind" \
              --artifact-name kast-action-runtime-inputs \
              --artifact-path "$path" \
              --producer-job kast-action-runtime-contract \
              --build-command-id "$command_id"
          }
          record_output ci-headless-runtime \
            dist/kast-headless-linux-x64.tar.zst ci-package-headless-runtime
          record_output ci-headless-runtime-manifest \
            dist/kast-runtime-manifest.json ci-package-headless-runtime
          record_output ci-gradle-ro-cache \
            dist/gradle-ro-dep-cache.tar.zst ci-package-gradle-ro-cache

      - name: Verify prepared kast-action runtime inputs
        id: verify-runtime
        shell: bash
        run: |
          set -euo pipefail
          runtime_version="$(python3 -c 'import json; from pathlib import Path; print(json.loads(Path("packaging/homebrew/release-state.json").read_text(encoding="utf-8"))["current_release"].removeprefix("v"))')"
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger dist/ci-ledgers/kast-action-runtime/ci-headless-runtime.json \
            --ledger dist/ci-ledgers/kast-action-runtime/ci-headless-runtime-manifest.json \
            --ledger dist/ci-ledgers/kast-action-runtime/ci-gradle-ro-cache.json \
            --git-sha "$GITHUB_SHA" \
            --require-kind ci-headless-runtime \
            --require-kind ci-headless-runtime-manifest \
            --require-kind ci-gradle-ro-cache \
            --artifact ci-headless-runtime=dist/kast-headless-linux-x64.tar.zst \
            --artifact ci-headless-runtime-manifest=dist/kast-runtime-manifest.json \
            --artifact ci-gradle-ro-cache=dist/gradle-ro-dep-cache.tar.zst
          (cd dist && sha256sum -c kast-headless-linux-x64.sha256)
          (cd dist && sha256sum -c gradle-ro-dep-cache.sha256)
          printf 'runtime_version=%s\n' "$runtime_version" >> "$GITHUB_OUTPUT"
          printf 'runtime_sha=%s\n' "$(awk '{ print $1 }' dist/kast-headless-linux-x64.sha256)" >> "$GITHUB_OUTPUT"
          printf 'gradle_cache_sha=%s\n' "$(awk '{ print $1 }' dist/gradle-ro-dep-cache.sha256)" >> "$GITHUB_OUTPUT"

      - name: Install packaged runtime with kast-action
        uses: amichne/kast-action@v2
        with:
          version: ${{ steps.verify-runtime.outputs.runtime_version }}
          artifact-url: file://${{ github.workspace }}/dist/kast-headless-linux-x64.tar.zst
          artifact-sha256: ${{ steps.verify-runtime.outputs.runtime_sha }}
          manifest-url: file://${{ github.workspace }}/dist/kast-runtime-manifest.json
          gradle-ro-cache-url: file://${{ github.workspace }}/dist/gradle-ro-dep-cache.tar.zst
          gradle-ro-cache-sha256: ${{ steps.verify-runtime.outputs.gradle_cache_sha }}
          install-dir: ${{ runner.temp }}/kast-install
          fail-on-cache-miss: "true"
          strict: "true"

      - name: Validate kast-action installed runtime
        shell: bash
        run: |
          set -euo pipefail
          test -L "${RUNNER_TEMP}/kast-install/current"
          scripts/verify-setup-kast-install.sh \
            --install-dir "${RUNNER_TEMP}/kast-install/current" \
            --workspace-id kast-action-ci-smoke \
            --module-name kast-action-smoke \
            --gradle-root "$GITHUB_WORKSPACE"

  installed-semantic-fixture:
    name: Representative installed semantic fixture
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    needs:
      - prepared-generation
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Ensure zstd is available for prepared generation extraction
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v zstd >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends zstd
          fi

      - name: Download prepared local generation
        uses: actions/download-artifact@v7
        with:
          name: kast-prepared-local-generation
          path: ${{ runner.temp }}/kast-prepared-generation

      - name: Download prepared generation ledgers
        uses: actions/download-artifact@v7
        with:
          name: ci-artifact-ledger-prepared-generation
          path: ${{ runner.temp }}/kast-prepared-generation-ledger

      - name: Verify prepared local generation artifact
        shell: bash
        run: |
          set -euo pipefail
          scripts/verify-ci-artifact-ledger.py verify \
            --ledger "$RUNNER_TEMP/kast-prepared-generation-ledger/ci-prepared-local-generation.json" \
            --git-sha "$GITHUB_SHA" \
            --require-kind ci-prepared-local-generation \
            --artifact "ci-prepared-local-generation=$RUNNER_TEMP/kast-prepared-generation/kast-local-prepared-generation.tar.zst"
          (cd "$RUNNER_TEMP/kast-prepared-generation" && sha256sum -c kast-local-prepared-generation.sha256)

      - name: Exercise representative installed semantics
        env:
          KAST_PREPARED_GENERATION_ARCHIVE: ${{ runner.temp }}/kast-prepared-generation/kast-local-prepared-generation.tar.zst
          KAST_SEMANTIC_FIXTURE_EVIDENCE_DIR: ${{ github.workspace }}/build/installed-semantic-fixture-evidence
        shell: bash
        run: ./.github/scripts/test-local-development-semantic-fixture.sh

      - name: Upload representative semantic diagnostics
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: representative-installed-semantic-fixture-${{ github.run_id }}-${{ github.run_attempt }}
          path: build/installed-semantic-fixture-evidence
          if-no-files-found: warn
          retention-days: 5

  analysis-server-transport:
    name: Analysis server transport
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Smoke analysis-server socket transport
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :analysis-server:test
          --tests io.github.amichne.kast.server.AnalysisServerSocketTest

  test-idea-plugin:
    name: IDEA plugin
    runs-on: ubuntu-latest
    needs: workflow-contracts
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Free disk for IDEA plugin verification
        shell: bash
        run: |
          set -euo pipefail
          df -h /
          sudo rm -rf \
            /usr/local/lib/android \
            /usr/share/dotnet \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-cleanup: always

      - name: Cache IntelliJ plugin verification inputs
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/kast/shared-idea-distributions
            ~/.gradle/kast/backend-idea-distributions
            ~/.cache/pluginVerifier/ides
          key: idea-plugin-inputs-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            idea-plugin-inputs-${{ runner.os }}-

      - name: Test IDEA plugin
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :backend-idea:test
          -PexcludeTags=performance

      - name: Build and verify IDEA plugin distribution
        run: >
          ./scripts/ci-gradle-retry.sh
          ./gradlew
          :backend-idea:buildPlugin
          :backend-idea:verifyPluginStructure
          :backend-idea:verifyPluginXmlPresent
          :backend-idea:verifyPlugin

      - name: Upload IDEA plugin artifact
        uses: actions/upload-artifact@v6
        with:
          name: kast-idea-plugin
          path: backend-idea/build/distributions/*.zip
          if-no-files-found: error
          retention-days: 1

      - name: Record IDEA plugin ledger
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/ci-ledgers
          plugin_asset="$(find backend-idea/build/distributions -maxdepth 1 -name '*.zip' -print -quit)"
          [[ -n "$plugin_asset" ]] || { echo "Missing IDEA plugin zip" >&2; exit 1; }
          scripts/verify-ci-artifact-ledger.py record \
            --output dist/ci-ledgers/idea-plugin.json \
            --git-sha "$GITHUB_SHA" \
            --source-ref "$GITHUB_REF" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-kind ci-idea-plugin \
            --artifact-name kast-idea-plugin \
            --artifact-path "$plugin_asset" \
            --producer-job test-idea-plugin \
            --build-command-id ci-idea-plugin-build

      - name: Upload IDEA plugin ledger
        uses: actions/upload-artifact@v6
        with:
          name: ci-artifact-ledger-idea-plugin
          path: dist/ci-ledgers/idea-plugin.json
          if-no-files-found: error
          retention-days: 3

      - name: Test IDEA plugin signing and immutability contract
        shell: bash
        run: ./.github/scripts/test-idea-plugin-signing-contract.sh

      - name: Run IDEA plugin performance baselines
        run: ./scripts/ci-gradle-retry.sh ./gradlew :backend-idea:test -PincludeTags=performance
