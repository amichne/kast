name: Release
run-name: >-
  Release
  ${{
    github.event_name == 'workflow_dispatch'
      && format('{0} ({1})', inputs.release_type, github.ref_name)
      || github.ref_name
  }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_type:
        description: >
          Release type — automatically increments the latest semver tag.
          Beta appends the short commit SHA for uniqueness.
        required: true
        default: patch
        type: choice
        options:
          - major
          - minor
          - patch
          - beta

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    name: Preflight stable release automation
    runs-on: ubuntu-latest
    steps:
      - name: Classify release
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        shell: bash
        run: |
          set -euo pipefail

          requires_homebrew=false
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$RELEASE_TYPE" != "beta" ]]; then
              requires_homebrew=true
            fi
          elif [[ "$REF_NAME" == v* && "$REF_NAME" != *-* ]]; then
            requires_homebrew=true
          fi

          printf 'requires_homebrew=%s\n' "$requires_homebrew" >> "$GITHUB_OUTPUT"

      - name: Require Homebrew token for stable releases
        if: steps.classify.outputs.requires_homebrew == 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "::error::Missing HOMEBREW_TAP_TOKEN secret; stable releases cannot update amichne/homebrew-kast."
            exit 1
          fi

  # ── Step 0 (workflow_dispatch only): auto-increment semver and push new tag ──
  bump-version:
    name: Bump version (${{ inputs.release_type }})
    needs: [release-preflight]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.bump.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          # Use GITHUB_TOKEN — pushes made with it do NOT re-trigger tag-push
          # workflows, preventing recursive runs.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next semver tag and push
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          release_type="${{ inputs.release_type }}"
          short_sha="${GITHUB_SHA:0:7}"

          # Resolve the latest vX.Y.Z tag (ignore pre-release tags for the base).
          latest_stable="$(git tag --list 'v*' --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)"
          if [[ -z "$latest_stable" ]]; then
            latest_stable="v0.0.0"
          fi
          echo "Latest stable tag: ${latest_stable}"

          base="${latest_stable#v}"
          IFS='.' read -r major minor patch <<< "$base"
          major="${major:-0}"; minor="${minor:-0}"; patch="${patch:-0}"

          case "$release_type" in
            major)
              major=$((major + 1)); minor=0; patch=0
              new_tag="v${major}.${minor}.${patch}"
              ;;
            minor)
              minor=$((minor + 1)); patch=0
              new_tag="v${major}.${minor}.${patch}"
              ;;
            patch)
              patch=$((patch + 1))
              new_tag="v${major}.${minor}.${patch}"
              ;;
            beta)
              patch=$((patch + 1))
              new_tag="v${major}.${minor}.${patch}-beta.${short_sha}"
              ;;
            *)
              echo "Unknown release_type: ${release_type}" >&2
              exit 1
              ;;
          esac

          echo "New tag: ${new_tag}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$new_tag"
          git push origin "$new_tag"

          printf 'release_tag=%s\n' "$new_tag" >> "$GITHUB_OUTPUT"

  # ── Step 1: create draft GitHub release ──────────────────────────────────────
  prepare-release:
    name: Prepare release
    # Run after bump-version (workflow_dispatch) or directly (push tag).
    # 'always()' lets us proceed even when bump-version was skipped.
    needs: [release-preflight, bump-version]
    if: always() && needs.release-preflight.result == 'success' && (needs.bump-version.result == 'success' || needs.bump-version.result == 'skipped')
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.release-tag.outputs.value }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${{ needs.bump-version.outputs.release_tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$tag" || "$tag" != v* ]]; then
            echo "release tag must start with v; got '$tag'" >&2
            exit 1
          fi

          printf 'value=%s\n' "$tag" >> "$GITHUB_OUTPUT"

      - name: Ensure draft release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release-tag.outputs.value }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release already exists: $tag"
          else
            gh release create "$tag" \
              --draft \
              --verify-tag \
              --title "$tag" \
              --generate-notes
          fi

  build-and-upload:
    name: Build release asset (${{ matrix.asset_id }})
    needs: [prepare-release]
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_id: linux-x64
          - runner: macos-14
            asset_id: macos-arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: "true"

      - uses: gradle/actions/setup-gradle@v5

      - name: Build native Kast CLI release asset
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          ./gradlew :kast-cli:nativeCompile :kast-cli:portableDistZip
          ./scripts/smoke-native-cli.sh kast-cli/build/native/nativeCompile/kast
          ./kast.sh release \
            --tag "$tag" \
            --platform-id "${{ matrix.asset_id }}" \
            --skip-build \
            --native-binary "kast-cli/build/native/nativeCompile/kast"

      - name: Smoke native Kast release asset
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_path="dist/kast-${tag}-${{ matrix.asset_id }}.zip"
          dist_dir="$RUNNER_TEMP/kast-dist"
          rm -rf "$dist_dir"
          mkdir -p "$dist_dir"
          unzip -q "$asset_path" -d "$dist_dir"
          "$dist_dir/kast-cli/kast-cli" --help
          ./scripts/smoke-native-cli.sh "$dist_dir/kast-cli/kast-cli"
          if [[ -f "$dist_dir/kast-cli/runtime-libs/kast-shrunk.jar" ]]; then
            echo "Release asset must not contain ProGuard/R8 shrunk runtime libs" >&2
            exit 1
          fi
          if [[ -f "$dist_dir/kast-cli/runtime-libs/classpath.txt" ]] \
              && grep -Fq "kast-shrunk.jar" "$dist_dir/kast-cli/runtime-libs/classpath.txt"; then
            echo "Release asset classpath must not reference ProGuard/R8 shrunk runtime libs" >&2
            exit 1
          fi

      - name: Build standalone backend for headless agent bundle
        if: matrix.asset_id == 'linux-x64'
        shell: bash
        run: ./kast.sh build backend

      - name: Package headless agent bundle
        if: matrix.asset_id == 'linux-x64'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          ./scripts/package-headless-agent-bundle.sh \
            --cli-archive "dist/kast-${tag}-linux-x64.zip" \
            --backend-archive "dist/backend.zip" \
            --version "$tag" \
            --platform-id linux-x64 \
            --output "dist/kast-headless-agent-${tag}-linux-x64.zip"

      - name: Smoke headless agent bundle
        if: matrix.asset_id == 'linux-x64'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          bundle_path="dist/kast-headless-agent-${tag}-linux-x64.zip"
          extract_dir="$RUNNER_TEMP/kast-headless-agent-bundle"
          workspace_dir="$RUNNER_TEMP/kast-headless-agent-workspace"
          home_dir="$RUNNER_TEMP/kast-headless-agent-home"
          install_root="$RUNNER_TEMP/kast-headless-agent-install"

          rm -rf "$extract_dir" "$workspace_dir" "$home_dir" "$install_root"
          mkdir -p "$extract_dir" "$workspace_dir" "$home_dir"
          unzip -q "$bundle_path" -d "$extract_dir"
          git -C "$workspace_dir" init -q

          (
            cd "$workspace_dir"
            HOME="$home_dir" \
            SHELL=/bin/bash \
            KAST_AGENT_INSTALL_ROOT="$install_root" \
            KAST_AGENT_WORKSPACE="$workspace_dir" \
            "$extract_dir/install.sh"
          )

          "$install_root/bin/kast" --help >/dev/null

      - name: Write build provenance
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          mkdir -p dist
          asset_name="kast-${tag}-${{ matrix.asset_id }}.zip"
          digest="$(awk -v name="$asset_name" '$2 == name { print $1; found = 1 } END { if (!found) exit 1 }' dist/checksums.txt)"
          cat > dist/build-provenance-${{ matrix.asset_id }}.json <<PROVEOF
          {
            "runId": "${{ github.run_id }}",
            "runNumber": "${{ github.run_number }}",
            "runAttempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "workflowRef": "${{ github.workflow_ref }}",
            "actor": "${{ github.actor }}",
            "platformId": "${{ matrix.asset_id }}",
            "assetName": "${asset_name}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "assetDigest": "sha256:${digest}"
          }
          PROVEOF

          if [[ "${{ matrix.asset_id }}" == "linux-x64" ]]; then
            headless_asset_name="kast-headless-agent-${tag}-linux-x64.zip"
            headless_digest="$(sha256sum "dist/${headless_asset_name}" | awk '{ print $1 }')"
            cat > dist/build-provenance-headless-agent-linux-x64.json <<PROVEOF
          {
            "runId": "${{ github.run_id }}",
            "runNumber": "${{ github.run_number }}",
            "runAttempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "workflowRef": "${{ github.workflow_ref }}",
            "actor": "${{ github.actor }}",
            "platformId": "headless-agent-linux-x64",
            "assetName": "${headless_asset_name}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "assetDigest": "sha256:${headless_digest}"
          }
          PROVEOF
          fi

      - name: Upload release asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-${tag}-${{ matrix.asset_id }}.zip"
          asset_path="dist/${asset_name}"

          [[ -f "$asset_path" ]] || { echo "Release asset not found: $asset_path" >&2; exit 1; }
          gh release upload "$tag" "$asset_path" --clobber

      - name: Upload headless agent bundle
        if: matrix.asset_id == 'linux-x64'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_path="dist/kast-headless-agent-${tag}-linux-x64.zip"

          [[ -f "$asset_path" ]] || { echo "Headless agent bundle not found: $asset_path" >&2; exit 1; }
          gh release upload "$tag" "$asset_path" --clobber

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-asset-${{ matrix.asset_id }}-${{ github.run_id }}
          path: |
            dist/
            kast-cli/build/distributions/
          if-no-files-found: warn

  build-intellij-plugin:
    name: Build IDEA plugin
    needs: [prepare-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - uses: actions/cache@v5
        with:
          path: ~/.gradle/kast/intellij-distributions
          key: idea-dist-${{ hashFiles('gradle/libs.versions.toml') }}

      - name: Build IDEA plugin
        run: >
          ./gradlew
          :backend-intellij:buildPlugin
          :backend-intellij:verifyPluginStructure
          :backend-intellij:verifyPluginXmlPresent

      - name: Upload IDEA plugin asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-intellij-${tag}.zip"

          source_zip=""
          for candidate in backend-intellij/build/distributions/*.zip; do
            [[ -f "$candidate" ]] || continue
            source_zip="$candidate"
            break
          done
          [[ -n "$source_zip" ]] || { echo "No IDEA plugin zip found" >&2; exit 1; }

          mkdir -p dist
          cp "$source_zip" "dist/${asset_name}"
          gh release upload "$tag" "dist/${asset_name}" --clobber

      - name: Write plugin build provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-intellij-${tag}.zip"
          digest="$(sha256sum "dist/${asset_name}" | awk '{ print $1 }')"
          cat > dist/build-provenance-intellij.json <<PROVEOF
          {
            "runId": "${{ github.run_id }}",
            "runNumber": "${{ github.run_number }}",
            "runAttempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "workflowRef": "${{ github.workflow_ref }}",
            "actor": "${{ github.actor }}",
            "platformId": "intellij",
            "assetName": "${asset_name}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "assetDigest": "sha256:${digest}"
          }
          PROVEOF

      - name: Upload plugin artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: intellij-plugin-${{ github.run_id }}
          path: |
            dist/
            backend-intellij/build/distributions/
          if-no-files-found: warn

  build-standalone-backend:
    name: Build standalone backend
    needs: [prepare-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release_tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Build standalone backend
        run: ./kast.sh build backend

      - name: Upload standalone backend asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-standalone-${tag}.zip"

          source_zip="dist/backend.zip"
          [[ -f "$source_zip" ]] || { echo "Backend zip not found: $source_zip" >&2; exit 1; }

          mkdir -p dist
          cp "$source_zip" "dist/${asset_name}"
          gh release upload "$tag" "dist/${asset_name}" --clobber

      - name: Write standalone backend build provenance
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          asset_name="kast-standalone-${tag}.zip"
          digest="$(sha256sum "dist/${asset_name}" | awk '{ print $1 }')"
          cat > dist/build-provenance-standalone.json <<PROVEOF
          {
            "runId": "${{ github.run_id }}",
            "runNumber": "${{ github.run_number }}",
            "runAttempt": "${{ github.run_attempt }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "workflowRef": "${{ github.workflow_ref }}",
            "actor": "${{ github.actor }}",
            "platformId": "standalone",
            "assetName": "${asset_name}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "assetDigest": "sha256:${digest}"
          }
          PROVEOF

      - name: Upload standalone backend artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: standalone-backend-${{ github.run_id }}
          path: |
            dist/
            backend-standalone/build/distributions/
          if-no-files-found: warn

  publish-release:
    name: Publish release
    needs:
      - prepare-release
      - build-and-upload
      - build-intellij-plugin
      - build-standalone-backend
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all provenance artifacts
        uses: actions/download-artifact@v7
        with:
          path: provenance-artifacts
          pattern: release-asset-*

      - name: Download IDEA plugin provenance
        uses: actions/download-artifact@v7
        with:
          path: provenance-intellij
          pattern: intellij-plugin-*

      - name: Download standalone backend provenance
        uses: actions/download-artifact@v7
        with:
          path: provenance-standalone
          pattern: standalone-backend-*

      - name: Assemble combined provenance
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/assemble-release-provenance.py \
            --output dist/build-provenance.json \
            provenance-artifacts \
            provenance-intellij \
            provenance-standalone

      - name: Upload combined provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          gh release upload "$tag" dist/build-provenance.json --clobber

      - name: Generate and upload SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          expected_assets=(
            "kast-${tag}-linux-x64.zip"
            "kast-${tag}-macos-arm64.zip"
            "kast-headless-agent-${tag}-linux-x64.zip"
            "kast-intellij-${tag}.zip"
            "kast-standalone-${tag}.zip"
          )

          rm -rf release-assets
          mkdir -p release-assets
          gh release download "$tag" --dir release-assets --pattern '*.zip'
          for asset in "${expected_assets[@]}"; do
            [[ -f "release-assets/${asset}" ]] || { echo "Missing release asset: ${asset}" >&2; exit 1; }
          done
          (cd release-assets && sha256sum "${expected_assets[@]}") > SHA256SUMS
          cp SHA256SUMS release-assets/SHA256SUMS
          cp dist/build-provenance.json release-assets/build-provenance.json
          ./scripts/verify-release-assets.sh --release-dir release-assets --tag "$tag"
          gh release upload "$tag" SHA256SUMS --clobber

      - name: Publish draft release with provenance annotation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare-release.outputs.release_tag }}"
          run_url="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          release_flags=("--draft=false")
          if [[ "$tag" == *-* ]]; then
            release_flags+=(--prerelease)
          else
            release_flags+=(--latest)
          fi

          gh release edit "$tag" "${release_flags[@]}" \
            --notes "$(gh release view "$tag" --json body -q .body)

          ---
          **Build provenance:** [CI Run #${{ github.run_number }}]($run_url)"

      - name: Dispatch Homebrew tap update
        if: ${{ !contains(needs.prepare-release.outputs.release_tag, '-') }}
        id: homebrew-dispatch
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "Missing HOMEBREW_TAP_TOKEN secret; create a token that can dispatch amichne/homebrew-kast workflows." >&2
            exit 1
          fi

          dispatch_started="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          printf 'dispatch_started=%s\n' "$dispatch_started" >> "$GITHUB_OUTPUT"

          tag="${{ needs.prepare-release.outputs.release_tag }}"
          linux_asset="kast-${tag}-linux-x64.zip"
          macos_asset="kast-${tag}-macos-arm64.zip"
          sha_linux="$(awk -v name="$linux_asset" '$2 == name { print $1 }' SHA256SUMS)"
          sha_macos="$(awk -v name="$macos_asset" '$2 == name { print $1 }' SHA256SUMS)"

          [[ -n "$sha_linux" ]] || { echo "Missing SHA-256 for ${linux_asset}" >&2; exit 1; }
          [[ -n "$sha_macos" ]] || { echo "Missing SHA-256 for ${macos_asset}" >&2; exit 1; }

          gh api repos/amichne/homebrew-kast/dispatches \
            -f event_type=release-published \
            -f "client_payload[version]=${tag}" \
            -f "client_payload[sha256_linux_x64]=${sha_linux}" \
            -f "client_payload[sha256_macos_arm64]=${sha_macos}"

      - name: Wait for Homebrew tap update
        if: ${{ !contains(needs.prepare-release.outputs.release_tag, '-') }}
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          started="${{ steps.homebrew-dispatch.outputs.dispatch_started }}"
          deadline=$((SECONDS + 180))
          run_id=""

          while [[ -z "$run_id" && "$SECONDS" -lt "$deadline" ]]; do
            run_id="$(gh run list \
              --repo amichne/homebrew-kast \
              --workflow update-formula.yml \
              --event repository_dispatch \
              --branch main \
              --created ">=$started" \
              --limit 10 \
              --json databaseId,createdAt,displayTitle \
              --jq 'map(select(.displayTitle == "release-published")) | sort_by(.createdAt) | last | .databaseId // ""')"
            if [[ -z "$run_id" ]]; then
              sleep 5
            fi
          done

          [[ -n "$run_id" ]] || { echo "Timed out waiting for Homebrew tap workflow run to appear" >&2; exit 1; }
          gh run watch "$run_id" --repo amichne/homebrew-kast --exit-status --compact --interval 10
