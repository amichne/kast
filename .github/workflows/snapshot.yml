name: Publish Snapshot

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      snapshot-version:
        description: "Snapshot version, for example 0.8.0-SNAPSHOT"
        required: false
        type: string

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      snapshot-version: ${{ steps.snapshot-version.outputs.value }}
      publish-snapshot: ${{ steps.snapshot-version.outputs.publish }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Resolve snapshot version
        id: snapshot-version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ github.event.inputs.snapshot-version }}"
          require_snapshot=false
          publish_snapshot=false

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            require_snapshot=true
          fi

          if [[ -z "$version" ]]; then
            base="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || echo v0.0.0)"
            version="${base#v}-SNAPSHOT"
          fi

          if [[ "$require_snapshot" == "true" && "$version" != *-SNAPSHOT ]]; then
            echo "ERROR: snapshot version must end with -SNAPSHOT" >&2
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            publish_snapshot=true
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "main" && "$version" == *-SNAPSHOT ]]; then
            publish_snapshot=true
          fi

          printf 'value=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'publish=%s\n' "$publish_snapshot" >> "$GITHUB_OUTPUT"

      - name: Run tests and local publication checks
        run: >
          ./gradlew
          test
          :analysis-api:publishToMavenLocal
          :analysis-server:publishToMavenLocal
          :index-store:publishToMavenLocal
          -Pkast.publish.target=local
          -Pversion="${{ steps.snapshot-version.outputs.value }}"
          --no-daemon
          --stacktrace

  publish-github-packages:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.publish-snapshot == 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Check GitHub Packages signing secrets
        id: gate
        shell: bash
        env:
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
        run: |
          set -euo pipefail
          if [[ -z "${SIGNING_GPG_PRIVATE_KEY:-}" || -z "${SIGNING_GPG_KEY_NAME:-}" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        if: steps.gate.outputs.publish == 'true'
        env:
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
        shell: bash
        run: |
          set -euo pipefail
          if ! printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | gpg --batch --import; then
            printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          fi

      - name: Publish to GitHub Packages
        if: steps.gate.outputs.publish == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
          SIGNING_GPG_PASSPHRASE: ${{ secrets.SIGNING_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          signing_args=()
          if [[ -n "${SIGNING_GPG_KEY_NAME:-}" ]]; then
            signing_args=(-Psigning.gnupg.keyName="$SIGNING_GPG_KEY_NAME")
            if [[ -n "${SIGNING_GPG_PASSPHRASE:-}" ]]; then
              signing_args+=(-Psigning.gnupg.passphrase="$SIGNING_GPG_PASSPHRASE")
            fi
          fi
          ./gradlew publishAllPublicationsToGitHubPackagesRepository "${signing_args[@]}" \
            -Pkast.publish.target=github \
            -Pversion="${{ needs.validate.outputs.snapshot-version }}" \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace

  publish-maven-central:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.publish-snapshot == 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v5

      - name: Check Maven Central and signing secrets
        id: gate
        shell: bash
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
        run: |
          set -euo pipefail
          if [[ -z "${ORG_GRADLE_PROJECT_mavenCentralUsername:-}" || -z "${ORG_GRADLE_PROJECT_mavenCentralPassword:-}" || -z "${SIGNING_GPG_PRIVATE_KEY:-}" || -z "${SIGNING_GPG_KEY_NAME:-}" ]]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        if: steps.gate.outputs.publish == 'true'
        env:
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
        shell: bash
        run: |
          set -euo pipefail
          if ! printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | gpg --batch --import; then
            printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          fi

      - name: Publish to Maven Central snapshots
        if: steps.gate.outputs.publish == 'true'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
          SIGNING_GPG_PASSPHRASE: ${{ secrets.SIGNING_GPG_PASSPHRASE }}
        shell: bash
        run: |
          set -euo pipefail
          signing_args=()
          if [[ -n "${SIGNING_GPG_KEY_NAME:-}" ]]; then
            signing_args=(-Psigning.gnupg.keyName="$SIGNING_GPG_KEY_NAME")
            if [[ -n "${SIGNING_GPG_PASSPHRASE:-}" ]]; then
              signing_args+=(-Psigning.gnupg.passphrase="$SIGNING_GPG_PASSPHRASE")
            fi
          fi
          ./gradlew publishToMavenCentral "${signing_args[@]}" \
            -Pkast.publish.target=snapshot \
            -Pversion="${{ needs.validate.outputs.snapshot-version }}" \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace
